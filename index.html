/* Recursively expand all loaded nodes, and trigger loading on unloaded ones up to maxDepth */
async function autoExpandAll(container,depth){
  if(depth>4)return; /* safety limit — don't drill infinitely */
  const nodes=container.querySelectorAll(':scope > .tn');
  for(const node of nodes){
    const kids=node.querySelector(':scope > .tn-kids');
    const hdr=node.querySelector(':scope > .tn-h');
    if(!kids||!hdr)continue;
    const tog=hdr.querySelector('.tn-tog');
    if(!tog||!tog.textContent.trim())continue; /* leaf node */
    /* If not yet loaded, simulate click to load */
    if(!kids.children.length||kids.querySelector('.tn-loading')){
      hdr.click();
      /* Wait for children to load */
      await new Promise(r=>{
        const check=()=>{
          if(!kids.querySelector('.tn-loading')){r();return}
          setTimeout(check,100);
        };
        setTimeout(check,50);
      });
    }
    /* Ensure it's open */
    kids.classList.remove('shut');
    if(tog)tog.textContent='▾';
    /* Recurse into children */
    await autoExpandAll(kids,depth+1);
  }
}

/* Throttle for tree vernacular lookups: expanding a node can create dozens of
   genus/species children at once — cap concurrent GBIF/iNat calls so we don't
   hammer those APIs (cachedFetch still dedupes identical requests). */
const _treeVernQ=[]; let _treeVernActive=0; const _TREE_VERN_CONC=4;
function _queueTreeVern(task){
  return new Promise(resolve=>{
    _treeVernQ.push(async()=>{ try{resolve(await task())}catch(e){resolve(null)} });
    _drainTreeVern();
  });
}
function _drainTreeVern(){
  while(_treeVernActive<_TREE_VERN_CONC && _treeVernQ.length){
    const job=_treeVernQ.shift(); _treeVernActive++;
    job().finally(()=>{ _treeVernActive--; _drainTreeVern(); });
  }
}

/* Lazy resolution: only nodes scrolled into view trigger an API lookup, so
   expanding a node with hundreds of children doesn't fire hundreds of GBIF/iNat
   calls (which overloads those services). Curated names still resolve instantly. */
const _treeVernObserver = ('IntersectionObserver' in window) ? new IntersectionObserver(entries=>{
  for(const e of entries){
    if(e.isIntersecting){
      _treeVernObserver.unobserve(e.target);
      const fn=e.target._vernResolve; e.target._vernResolve=null;
      if(fn)fn();
    }
  }
},{rootMargin:'150px'}) : null;

/* Resolve and display a common name for a taxa tree node.
   - Class/order and curated families resolve instantly from _localVern (no network).
   - Uncurated families, genera and species are fetched via the shared resolver
     (lookupVern → GBIF + iNaturalist), cached in _vernCache — but ONLY once the node
     is visible (lazy), and throttled.
   - A genus with no name of its own falls back to its family's curated name. */
function _fillTreeVern(el,name,rank,ancestors){
  if(!el)return;
  const lo=name.toLowerCase();
  const ck=cleanTaxonTerm(name);
  const show=n=>{ if(el&&n&&!isGenericVern(n)) el.textContent=singularize(n); };
  const genusFamilyFallback=()=>{
    if(rank!=='genus')return;
    const fam=(ancestors?.family||'').toLowerCase();
    const fv=fam&&_localVern[fam];
    if(fv&&!isGenericVern(fv)) el.textContent=singularize(fv);
  };

  /* 1. Curated dictionary — instant and trusted (all classes/orders, common families) */
  const dict=_localVern[lo];
  /* Curated dictionary names are rank-appropriate by construction (e.g.
     Formicidae→"ant", Noctuidae→"owlet moth"), so trust them directly — do NOT
     gate on isGenericVern here. Family-level _localVern values are deliberately
     injected into _genericVernSet by the auto-populate IIFE so that GENUS lookups
     climb to subfamily/tribe; running that same gate over a FAMILY node's own
     curated name would wrongly blank the tile. Still singularize for display. */
  if(dict){ el.textContent=singularize(dict); return; }

  /* 2. Already cached (from a prior lookup anywhere) — instant, no network */
  if(_vernCache.has(ck)){
    const cached=_vernCache.get(ck);
    if(cached) show(cached); else genusFamilyFallback();
    return;
  }

  /* 3. Needs a network lookup — defer until the node is visible, then throttle. */
  const resolve=async()=>{
    if(_vernCache.has(ck)){ const c=_vernCache.get(ck); if(c){show(c);return} }
    const result=await _queueTreeVern(()=>lookupVern(name));
    const nm=result&&result.name;
    _vernCache.set(ck, nm||null);
    if(nm) show(nm); else genusFamilyFallback();
  };
  const target=el.closest('.tn-h')||el;
  if(_treeVernObserver){
    target._vernResolve=resolve;
    /* Observe only once the node is actually in the DOM — IntersectionObserver
       won't fire for elements observed while still detached (mkTreeNode builds
       them before appending). The caller attaches synchronously, so by the next
       frame the node is connected. */
    requestAnimationFrame(()=>{ if(target._vernResolve&&target.isConnected) _treeVernObserver.observe(target); });
  }
  else resolve(); /* no IntersectionObserver support — resolve eagerly */
}

function mkTreeNode(name,count,rank,ancestors,autoExpandPath){
  const div=document.createElement('div');div.className='tn'+(rank==='kingdom'?' root':'');
  const ri=RANKS.indexOf(rank);const isIt=ri>=6;const canDrill=ri<RANKS.length-1;
  const h=document.createElement('div');h.className='tn-h';
  h.innerHTML=`<span class="tn-tog">${canDrill?'▸':''}</span><span class="tn-nm${isIt?' it':''}">${esc(name)}</span><span class="tn-ct">${fmt(count)}</span><span class="tn-rk">${RLABEL[rank]||rank}</span><span class="tn-com"></span><div class="tn-btns"><button class="tn-b" data-a="filter">Filter</button><button class="tn-b g" data-a="guide">Browse</button></div>`;
  div.appendChild(h);
  /* Populate common name */
  const comEl=h.querySelector('.tn-com');
  _fillTreeVern(comEl,name,rank,ancestors);
  const kids=document.createElement('div');kids.className='tn-kids shut';let loaded=false;div.appendChild(kids);
  
  /* Load children into this node — shared by click and auto-expand */
  async function loadChildren(){
    if(loaded)return true;
    kids.innerHTML='<div class="tn-loading"><div class="mini-sp"></div>Loading…</div>';
    kids.classList.remove('shut');
    h.querySelector('.tn-tog').textContent='▾';
    try{
      const cf={...ancestors,[rank]:name};
      let items=[];let usedRank=null;
      for(let ti=ri+1;ti<RANKS.length;ti++){
        const tryRank=RANKS[ti];
        items=await fetchChildFacets(cf,tryRank);
        if(items.length){usedRank=tryRank;break}
      }
      kids.innerHTML='';
      if(!items.length||!usedRank){
        kids.innerHTML='<div style="font-size:12px;color:var(--muted);padding:4px 28px">No breakdown</div>';
      }else{
        /* Determine which child (if any) should auto-expand based on the filter path */
        let childAutoPath=null;
        if(autoExpandPath&&autoExpandPath.length>0){
          /* Find the next filter path entry that matches a child at usedRank */
          const nextStep=autoExpandPath.find(fp=>fp.rank===usedRank);
          if(nextStep){
            /* Pass remaining path entries beyond this rank */
            const nextIdx=autoExpandPath.indexOf(nextStep);
            childAutoPath=autoExpandPath.slice(nextIdx+1);
          }
        }
        items.forEach(it=>{
          const shouldAutoExpand=autoExpandPath&&autoExpandPath.some(fp=>fp.rank===usedRank&&fp.name===it.name);
          kids.appendChild(mkTreeNode(it.name,it.count,usedRank,cf,shouldAutoExpand?childAutoPath:null));
        });
      }
      loaded=true;
      return true;
    }catch(err){
      kids.innerHTML='<div style="font-size:12px;color:var(--red);padding:4px 28px">Error: '+esc(err.message)+'</div>';
      return false;
    }
  }
  
  h.addEventListener('click',async e=>{
    if(e.target.closest('.tn-btns'))return;if(!canDrill)return;
    if(!loaded){
      await loadChildren();
    }else{
      kids.classList.toggle('shut');
      h.querySelector('.tn-tog').textContent=kids.classList.contains('shut')?'▸':'▾';
    }
  });
  h.querySelector('[data-a="filter"]')?.addEventListener('click',()=>applyTaxonFilter(rank,name));
  h.querySelector('[data-a="guide"]')?.addEventListener('click',()=>{S.guideFocus={rank:RLABEL[rank],name};switchView('guide')});
  
  /* Auto-expand this node if it's on the filter path */
  if(autoExpandPath&&canDrill){
    /* Use microtask to allow DOM insertion first */
    Promise.resolve().then(()=>loadChildren());
  }
  
  return div;
}
function guideBack(){
  const f=S.guideFocus;
  if(f){
    const rk=f.rank.toLowerCase();
    const fId=RANK2FID[rk];
    if(fId){const sel=$('#'+fId);if(sel)sel.value='';
      const idx=FIDS.indexOf(fId);for(let i=idx;i<FIDS.length;i++){const el=$('#'+FIDS[i]);if(el)el.value=''}
    }
  }
  S.guideFocus=null;S.off=0;updateSearchRst();doSearch();
}

/* Set a filter dropdown without triggering a search (for guide browsing) */
function setFilterSilent(rank,name){
  const fId=RANK2FID[rank];if(!fId)return;const sel=$('#'+fId);if(!sel)return;
  let found=false;for(const o of sel.options)if(o.value===name){found=true;break}
  if(!found){const o=document.createElement('option');o.value=name;o.textContent=name;sel.appendChild(o)}
  sel.value=name;const idx=FIDS.indexOf(fId);for(let i=idx+1;i<FIDS.length;i++){const el=$('#'+FIDS[i]);if(el)el.value=''}
  S.off=0;S._searchStale=true;
}

function applyTaxonFilter(rank,name){
  const fId=RANK2FID[rank];if(!fId)return;const sel=$('#'+fId);if(!sel)return;
  let found=false;for(const o of sel.options)if(o.value===name){found=true;break}
  if(!found){const o=document.createElement('option');o.value=name;o.textContent=name;sel.appendChild(o)}
  sel.value=name;const idx=FIDS.indexOf(fId);for(let i=idx+1;i<FIDS.length;i++){const el=$('#'+FIDS[i]);if(el)el.value=''}
  S.off=0;doSearch();
}

/* ════════════════════════════════════════════════════════════════════════
   IMAGE-RESOLUTION CASCADE (Browse redesign — Phase 2, item 6a)
   ────────────────────────────────────────────────────────────────────────
   Resolves ONE representative image for a taxonomic GROUP at any rank, with
   provenance + attribution. Falls through on BOTH failure modes:
     (a) a source returns no usable URL, and
     (b) a returned URL fails to actually load in the browser.

   Priority cascade (museum feel — preserved specimens before living photos):
     1. QM specimen      — institution-scoped biocache image (what WE hold)
     2. other-museum spec— biocache PreservedSpecimen image from OTHER institutions
     3. iNaturalist      — taxon default_photo (a live photo; CC-attributed)
     4. Wikipedia        — REST summary lead image
     5. BIE taxon image  — curated profile image (last real-image attempt)
     6. placeholder      — elegant generated SVG (NEVER a dash)

   NOTE: there is deliberately NO generic "ALA-wide, any basis_of_record" image
   step — biocache without a basis filter is dominated by iNaturalist
   HumanObservation photos of living organisms, which broke the museum feel.
   Specimens come only from tiers 1–2; living images only from tiers 3–4.

   Candidate object shape (exact keys):
     { url, source, sourceLabel, attribution, license, href }
       source: 'qm' | 'ala' | 'bie' | 'inat' | 'wikipedia' | 'placeholder'

   STANDALONE: nothing here is called yet — renderGuide is wired up in 6b.
   CORS-safe: every biocache filter is sent as a SEPARATE fq via appendFQ —
   never AND-joined into one fq (see CLAUDE.md rule #4).
   ════════════════════════════════════════════════════════════════════════ */

/* Resolved-image cache: key `${rankField}|${name}` → Promise<Candidate>.
   Stores the in-flight promise too, so concurrent tiles dedupe to one resolve.
   Placeholder / failed resolves are evicted on settle so a later call can
   retry (a placeholder must never be locked in by a transient network blip). */
const _groupImgCache=new Map();

/* Normalise any rank token to a biocache Solr field. Accepts the filter-object
   key 'class_' and the ALL-CAPS variants; defaults to 'family' if unknown. */
function _imgRankField(rank){
  let r=(rank||'').toString().toLowerCase().replace(/_+$/,'');
  const ok=new Set(['kingdom','phylum','class','order','superfamily','family','genus','species']);
  return ok.has(r)?r:'family';
}

/* Normalise an iNaturalist/biocache licence code → display form. */
function _imgNormLicense(code){
  if(!code)return'';
  const c=code.toString().toLowerCase();
  if(c==='cc0')return'CC0';
  if(c.startsWith('cc-'))return c.toUpperCase();
  return code.toString();
}

/* Try to actually load a URL as an <img>. Resolves true only if the browser
   decodes a real bitmap. No crossOrigin — we only need to display it, so no
   CORS is required. Bounded by a timeout so a hung host can't stall the cascade. */
function _imgPreload(url,timeout){
  return new Promise(resolve=>{
    if(!url){resolve(false);return}
    const img=new Image();let done=false;
    const finish=ok=>{if(done)return;done=true;clearTimeout(t);img.onload=img.onerror=null;resolve(ok)};
    const t=setTimeout(()=>finish(false),timeout||9000);
    img.onload=()=>finish(img.naturalWidth>0);
    img.onerror=()=>finish(false);
    img.src=url;
  });
}

/* ── Candidate generators (each returns Candidate[]; never throws) ── */

/* Biocache occurrence images. `clauses` is a CORS-safe fq array (each clause a
   SEPARATE fq — appendFQ enforces this). `opts`:
     { source, sourceLabel, attribution, perRecord, limit }
   When perRecord is set, each candidate's sourceLabel/attribution come from the
   record's own institutionName (used by the other-museum tier so the badge names
   the holding institution); otherwise the fixed opts values are used.
   NB: NO `fl` is set — biocache only includes the assembled image URLs
   (largeImageUrl/imageUrl/smallImageUrl) and institutionName in its DEFAULT field
   set; a restrictive `fl` silently DROPS them (verified against the live API). */
async function _imgBiocacheCands(clauses,opts){
  opts=opts||{};
  try{
    const u=new URLSearchParams();
    u.set('q','*:*');
    appendFQ(u,clauses);
    u.set('pageSize',String(Math.min(opts.limit||6,ALA_MAX_PAGE)));
    u.set('startIndex','0');u.set('facets','');u.set('flimit','0');
    const r=await cachedFetch('https://biocache-ws.ala.org.au/ws/occurrences/search?'+u.toString());
    if(!r.ok)return[];
    const d=await r.json();
    const out=[],seen=new Set();
    for(const o of (d.occurrences||[])){
      const url=o.largeImageUrl||o.imageUrl||o.smallImageUrl||'';
      if(!url)continue;
      const id=imgId(url);if(seen.has(id))continue;seen.add(id);
      const inst=(o.institutionName||o.dataResourceName||'').toString();
      out.push({
        url,
        source:opts.source,
        sourceLabel:opts.perRecord?(inst||opts.sourceLabel||'ALA specimen'):opts.sourceLabel,
        attribution:opts.perRecord?inst:(o.dataResourceName||opts.attribution||'').toString(),
        license:'',
        href:o.uuid?('https://biocache.ala.org.au/occurrences/'+encodeURIComponent(o.uuid)):''
      });
    }
    return out;
  }catch(e){return[]}
}

/* ALA BIE taxon profile image (a curated representative for the taxon). */
async function _imgBieCands(name){
  try{
    const r=await cachedFetch('https://bie-ws.ala.org.au/ws/search?q='+encodeURIComponent(name)+'&fq=idxtype:TAXON&pageSize=5');
    if(!r.ok)return[];
    const d=await r.json();
    const results=d?.searchResults?.results||[];
    const lo=(name||'').toLowerCase();
    const pref=results.find(t=>(t.name||'').toLowerCase()===lo&&(t.imageUrl||t.thumbnailUrl||t.largeImageUrl))
            ||results.find(t=>t.imageUrl||t.thumbnailUrl||t.largeImageUrl);
    if(!pref)return[];
    const url=pref.imageUrl||pref.largeImageUrl||pref.thumbnailUrl||'';
    if(!url)return[];
    return[{url,source:'bie',sourceLabel:'ALA',attribution:(pref.imageSource||'').toString(),
      license:'',href:pref.guid?('https://bie.ala.org.au/species/'+encodeURIComponent(pref.guid)):''}];
  }catch(e){return[]}
}

/* Reduce iNaturalist's verbose attribution to just the photographer's name.
   iNat sends e.g. "(c) Dave Holland, some rights reserved (CC BY-NC), uploaded by
   Dave Holland" — we keep "Dave Holland" and show the licence separately (it's a
   distinct field), so the tile credit reads "iNaturalist · Dave Holland · CC BY-NC". */
function _inatCredit(attr){
  let s=(attr||'').replace(/\(c\)/gi,'©').trim();
  s=s.replace(/^©\s*/,'');                                  // leading ©
  s=s.replace(/,?\s*(some|all|no)\s+rights\s+reserved\b/i,''); // rights-reserved phrase
  s=s.replace(/\s*\(CC[^)]*\)/i,'');                        // inline (CC …) — licence shown separately
  s=s.replace(/,?\s*uploaded by\b.*$/i,'');                 // "uploaded by …" tail
  return s.replace(/[,;]\s*$/,'').trim();
}

/* iNaturalist taxon default photo — rank-aware to avoid cross-rank homonyms.
   For high ranks (kingdom/phylum/class/order) a wrong-rank name match means
   a different organism (e.g. genus Acanthocephala ≠ phylum Acanthocephala);
   skip iNat in that case so the cascade falls through to Wikipedia. */
async function _imgInatCands(name,rank){
  try{
    const r=await cachedFetch('https://api.inaturalist.org/v1/taxa?q='+encodeURIComponent(name)+'&per_page=5');
    if(!r.ok)return[];
    const d=await r.json();
    const lo=(name||'').toLowerCase();
    const results=d.results||[];
    const HIGH_RANKS=new Set(['kingdom','phylum','class','order']);
    const rankMatchHit=results.find(t=>(t.name||'').toLowerCase()===lo&&t.rank===rank&&t.default_photo);
    const nameMatchHit=results.find(t=>(t.name||'').toLowerCase()===lo&&t.default_photo);
    let hit;
    if(rankMatchHit){
      hit=rankMatchHit;
    }else if(rank&&HIGH_RANKS.has(rank)&&nameMatchHit&&nameMatchHit.rank!==rank){
      return[]; // homonym at a high rank — wrong taxon; let Wikipedia handle it
    }else{
      hit=nameMatchHit||results.find(t=>t.default_photo);
    }
    const p=hit&&hit.default_photo;
    const url=p&&(p.medium_url||p.url||p.square_url);
    if(!url)return[];
    return[{
      url,source:'inat',sourceLabel:'iNaturalist',
      attribution:_inatCredit(p.attribution),
      license:_imgNormLicense(p.license_code),
      href:'https://www.inaturalist.org/taxa/'+hit.id
    }];
  }catch(e){return[]}
}

/* Wikipedia REST summary lead image (skips disambiguation pages). */
async function _imgWikiCands(name){
  try{
    const title=encodeURIComponent((name||'').trim().replace(/\s+/g,'_'));
    if(!title)return[];
    const r=await cachedFetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+title);
    if(!r.ok)return[];
    const d=await r.json();
    if(d.type&&/disambiguation/i.test(d.type))return[];
    const url=(d.originalimage&&d.originalimage.source)||(d.thumbnail&&d.thumbnail.source)||'';
    if(!url)return[];
    return[{url,source:'wikipedia',sourceLabel:'Wikipedia',attribution:'Wikipedia',
      license:'CC-BY-SA',href:(d.content_urls&&d.content_urls.desktop&&d.content_urls.desktop.page)||''}];
  }catch(e){return[]}
}

/* ── Placeholder — deterministic, elegant, never a dash ── */
function _imgHash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
/* Build the placeholder candidate: a soft diagonal gradient keyed to the name,
   the group's initial as a faint serif glyph, and the rank as a quiet label. */
function imgPlaceholderCandidate(name,rank){
  const field=_imgRankField(rank);
  const seed=_imgHash((field+'|'+(name||'')).toLowerCase());
  const h1=seed%360,h2=(h1+38)%360;
  const initial=esc((((name||'?').trim()[0])||'?').toUpperCase());
  const label=esc((RLABEL[field]||'').toUpperCase());
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">`
    +`<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">`
    +`<stop offset="0" stop-color="hsl(${h1},40%,33%)"/>`
    +`<stop offset="1" stop-color="hsl(${h2},36%,19%)"/></linearGradient></defs>`
    +`<rect width="400" height="300" fill="url(#g)"/>`
    +`<text x="200" y="176" font-family="Georgia,serif" font-size="150" fill="rgba(255,255,255,0.13)" text-anchor="middle">${initial}</text>`
    +`<text x="200" y="272" font-family="Arial,Helvetica,sans-serif" font-size="13" letter-spacing="3" fill="rgba(255,255,255,0.55)" text-anchor="middle">${label}</text>`
    +`</svg>`;
  return{url:'data:image/svg+xml,'+encodeURIComponent(svg),source:'placeholder',sourceLabel:'',attribution:'',license:'',href:''};
}

/* ── The cascade (uncached core) ── */
async function _resolveGroupImageUncached(name,rank,opts){
  opts=opts||{};
  const field=_imgRankField(rank);
  const rkClause=`${field}:"${(name||'').replace(/"/g,'')}"`;
  const inst=S.alaInst?`institution_uid:${S.alaInst}`:'';
  const gens=[];
  /* 1. QM specimen — what WE hold (institution-scoped imaged records).
        opts.skipQM bypasses this tier: the Browse view fills QM images via one
        batch query, so per-tile cascades skip QM to avoid re-querying it per tile. */
  if(inst&&!opts.skipQM)gens.push(()=>_imgBiocacheCands([inst,rkClause,'multimedia:"Image"'],
      {source:'qm',sourceLabel:'QM specimen',attribution:'Queensland Museum',limit:6}));
  /* 2. Other-museum specimen — PreservedSpecimen images from OTHER institutions,
        so Browse keeps a museum feel instead of surfacing living iNat photos.
        basis_of_record:"PreservedSpecimen" verified against the live API. */
  {
    const c=[rkClause,'multimedia:"Image"','basis_of_record:"PreservedSpecimen"'];
    if(inst)c.push(`-institution_uid:${S.alaInst}`);
    gens.push(()=>_imgBiocacheCands(c,{source:'ala',sourceLabel:'ALA specimen',perRecord:true,limit:1}));
  }
  /* 3. iNaturalist · 4. Wikipedia — living-organism fallbacks (only reached when
        no specimen image exists anywhere) */
  gens.push(()=>_imgInatCands(name,field));
  gens.push(()=>_imgWikiCands(name));
  /* 5. BIE taxon profile image — last real-image attempt before placeholder */
  gens.push(()=>_imgBieCands(name));
  for(const gen of gens){
    let cands=[];
    try{cands=(await gen())||[]}catch(e){cands=[]}
    for(const c of cands){
      if(!c||!c.url)continue;
      if(await _imgPreload(c.url))return c;
    }
  }
  return imgPlaceholderCandidate(name,rank);
}

/* Public entry point. Returns Promise<Candidate>. `opts.skipQM` skips the QM
   tier (Browse fills QM via a batch pass). Caches real-source results; evicts
   placeholders/failures so they can be retried later. The skipQM variant is
   cached under a separate key so it never collides with a QM-inclusive resolve. */
function resolveGroupImage(name,rank,opts){
  opts=opts||{};
  const key=(opts.skipQM?'noqm|':'')+_imgRankField(rank)+'|'+(name||'').toLowerCase();
  const hit=_groupImgCache.get(key);
  if(hit)return hit;
  const p=_resolveGroupImageUncached(name,rank,opts).then(cand=>{
    if(!cand||cand.source==='placeholder')_groupImgCache.delete(key);
    return cand;
  }).catch(()=>{_groupImgCache.delete(key);return imgPlaceholderCandidate(name,rank)});
  _groupImgCache.set(key,p);
  return p;
}

/* ── Browse tile images: lazy cascade resolution (mirrors the Taxa-tree pattern) ──
   renderGuide re-runs on every rank-pill change, so we keep ONE observer + a
   generation counter. Each render bumps _guideImgGen and tears down the prior
   observer; async writes are guarded by both the generation and tile.isConnected
   so nothing leaks into a stale grid. Concurrency is throttled like the tree's
   vernacular queue so a big rank doesn't storm the APIs. */
let _guideImgObserver=null; let _guideImgGen=0;
const _guideImgQ=[]; let _guideImgActive=0; const _GUIDE_IMG_CONC=4;
function _queueGuideImg(task){
  return new Promise(resolve=>{
    _guideImgQ.push(async()=>{ try{resolve(await task())}catch(e){resolve(null)} });
    _drainGuideImg();
  });
}
function _drainGuideImg(){
  while(_guideImgActive<_GUIDE_IMG_CONC&&_guideImgQ.length){
    const job=_guideImgQ.shift(); _guideImgActive++;
    job().finally(()=>{ _guideImgActive--; _drainGuideImg(); });
  }
}
/* Bounded pool for Browse tile vernaculars — same shape as the image queue above, so a
   ~200-tile rank resolves all names without bursting the GBIF/iNat APIs. Generation guard
   is the caller's responsibility (it checks _guideImgGen before writing). */
const _guideVernQ=[]; let _guideVernActive=0; const _GUIDE_VERN_CONC=6;
function _queueGuideVern(task){
  return new Promise(resolve=>{
    _guideVernQ.push(async()=>{ try{resolve(await task())}catch(e){resolve(null)} });
    _drainGuideVern();
  });
}
function _drainGuideVern(){
  while(_guideVernActive<_GUIDE_VERN_CONC&&_guideVernQ.length){
    const job=_guideVernQ.shift(); _guideVernActive++;
    job().finally(()=>{ _guideVernActive--; _drainGuideVern(); });
  }
}
/* Tear down before a re-render: bump the generation (abandons in-flight writes)
   and disconnect the old observer so pending tiles never resolve into a dead grid. */
function _guideImgTeardown(){
  _guideImgGen++;
  if(_guideImgObserver){ _guideImgObserver.disconnect(); _guideImgObserver=null; }
}
/* Build the provenance caption (text + class) for a resolved candidate. */
function _guideProvCaption(cand){
  if(!cand)return null;
  const s=cand.source;
  if(s==='qm')return{cls:'gt-prov prov-qm',text:'QM specimen'};
  if(s==='placeholder')return{cls:'gt-prov',text:'Illustration'};
  if(s==='ala'||s==='bie')return{cls:'gt-prov',text:cand.sourceLabel||cand.attribution||'ALA'};
  /* iNaturalist / Wikipedia — compose "source · creator · licence" as separate,
     de-duplicated segments. The iNat creator is already reduced to a bare name by
     _inatCredit; Wikipedia's attribution just repeats the source label (dropped).
     Licence is normalised for display (CC-BY-NC → CC BY-NC). */
  const label=(cand.sourceLabel||'').trim();
  let credit=(cand.attribution||'').trim();
  if(credit&&label&&credit.toLowerCase()===label.toLowerCase())credit=''; // don't repeat the label
  const licDisp=(cand.license||'').replace(/^CC-/,'CC ').trim();
  const norm=x=>(x||'').replace(/[\s_-]/g,'').toUpperCase();
  const segs=[];
  if(label)segs.push(label);
  if(credit)segs.push(credit);
  if(licDisp&&!segs.some(x=>norm(x).includes(norm(licDisp))))segs.push(licDisp);
  return{cls:'gt-prov',text:segs.join(' · ')||label};
}
/* Write/refresh the provenance caption. QM specimens get the green pill in the body
   (our holdings, a point of pride); every OTHER source (another museum, iNaturalist,
   Wikipedia, illustration) is credited as an overlay ON the image, so its name can
   never be misread as part of our QM record count below it. */
function _guideSetProv(tile,cand){
  if(!tile)return;
  const body=tile.querySelector('.gt-body');
  const imgDiv=tile.querySelector('.gt-img');
  const cap=_guideProvCaption(cand);
  /* Clear any prior placement in both spots before re-rendering. */
  const oldPill=body&&body.querySelector('.gt-prov'); if(oldPill)oldPill.remove();
  const oldCap=imgDiv&&imgDiv.querySelector('.gt-cap'); if(oldCap)oldCap.remove();
  if(!cap||!cap.text)return;
  if(cand.source==='qm'){
    if(!body)return;
    const el=document.createElement('div'); el.className=cap.cls; el.textContent=cap.text; el.title=cap.text;
    body.appendChild(el);
  }else{
    if(!imgDiv)return;
    const el=document.createElement('div'); el.className='gt-cap'; el.textContent=cap.text; el.title=cap.text;
    imgDiv.appendChild(el);
  }
}
/* Place a resolved candidate's image into the tile (clearing the skeleton) and
   render its provenance. resolveGroupImage already verified the URL loads, so no
   onerror handler is needed — just set src. */
function _guideSetImage(tile,cand){
  if(!tile||!cand)return;
  const imgDiv=tile.querySelector('.gt-img'); if(!imgDiv)return;
  imgDiv.classList.remove('gt-load');
  const nm=tile.dataset.gn||'';
  const alt=cand.source==='placeholder'?'':(nm?'Representative image of '+nm:'');
  imgDiv.innerHTML=`<img src="${esc(cand.url)}" alt="${esc(alt)}" loading="lazy">`;
  _guideSetProv(tile,cand);
}
/* Attach lazy cascade resolution to a tile QM didn't fill. Resolves only when the
   tile scrolls into view, throttled, and skips the QM tier (batch handled QM). */
function _attachGuideLazy(tile,name,rank,gen){
  const resolve=async()=>{
    if(gen!==_guideImgGen||!tile.isConnected)return;
    const cand=await _queueGuideImg(()=>resolveGroupImage(name,rank,{skipQM:true}));
    if(gen!==_guideImgGen||!tile.isConnected)return;
    _guideSetImage(tile,cand||imgPlaceholderCandidate(name,rank));
  };
  if(_guideImgObserver){
    tile._imgResolve=resolve;
    requestAnimationFrame(()=>{ if(tile._imgResolve&&tile.isConnected)_guideImgObserver.observe(tile); });
  } else resolve(); /* no IntersectionObserver support — resolve eagerly */
}

/* BROWSE — visual taxonomy browser */
function renderGuide(){
  const root=$('#guideRoot');root.innerHTML='';
  _guideImgTeardown();
  if(S.guideFocus){renderGuideFocus(root);return}
  const polyName=S.mapPoly?.name;
  const contextLabel=polyName?`in ${polyName}`:'matching current filters';
  root.innerHTML=`<div class="gu-hdr"><h2>Browse</h2><div class="crumb">${fmt(S.total)} records ${esc(contextLabel)}. Select a group to explore.</div></div>`;
  const rankOpts=[
    {i:0,l:'Phylum',k:'phylum',fk:'phylum'},
    {i:1,l:'Order',k:'order',fk:'order'},
    {i:2,l:'Family',k:'family',fk:'family'},
    {i:3,l:'Genus',k:'genus',fk:'genus'}
  ];
  const pills=document.createElement('div');pills.className='rk-pills';
  rankOpts.forEach(ro=>{const b=document.createElement('button');b.className='rp'+(S.guideRank===ro.i?' on':'');b.textContent=ro.l;b.onclick=()=>{S.guideRank=ro.i;renderGuide()};pills.appendChild(b)});
  /* Check if any filters are active */
  const hasFilters=FIDS.some(id=>{const el=$('#'+id);return el&&el.value})||$('#q')?.value||$('#fType')?.value||$('#fColl')?.value||$('#fCo')?.value||$('#fSt')?.value||$('#fCat')?.value;
  if(hasFilters){
    const rst=document.createElement('button');
    rst.textContent='✕ Reset Filters';
    rst.style.cssText='margin-left:8px;font-family:var(--font);font-size:12px;font-weight:500;padding:5px 12px;border:1.5px dashed var(--muted);border-radius:16px;background:none;color:var(--muted);cursor:pointer;transition:all .2s';
    rst.onmouseenter=()=>{rst.style.borderColor='var(--red,#ea3d41)';rst.style.color='var(--red,#ea3d41)'};
    rst.onmouseleave=()=>{rst.style.borderColor='var(--muted)';rst.style.color='var(--muted)'};
    rst.onclick=()=>{S.q='';S.off=0;S.guideFocus=null;clearMapBox();try{clearNNTT(true)}catch(e){};S._densityManual=false;S.galDensity=null;$('#q').value='';FIDS.forEach(id=>$('#'+id).value='');['fType','fCoord','fMedia','fColl','fSort','fCo','fSt'].forEach(id=>{const el=$('#'+id);if(el)el.value=el.options?el.options[0]?.value||'':''});const catEl=$('#fCat');if(catEl)catEl.value='';doSearch()};
    pills.appendChild(rst);
  }
  root.appendChild(pills);
  if(S.guideRank>=rankOpts.length)S.guideRank=2;
  const rk=rankOpts[S.guideRank];

  /* Use facets for the full dataset counts */
  const facetData=S.facets[rk.fk]||S.facets[rk.k]||[];
  const GUIDE_CAP=200;
  const sortedAll=facetData
    .filter(f=>f.name&&f.count>0)
    .map(f=>({name:f.name,count:f.count,imgs:[],vern:'',rank:rk.l}))
    .sort((a,b)=>b.count-a.count);
  const sorted=sortedAll.slice(0,GUIDE_CAP);

  /* Supplement images + ecological data from loaded records */
  if(S.res.length){
    const imgMap=new Map();
    const recs=S._polyAllRecs||S.res;
    recs.forEach(r=>{
      let nm=r[rk.k]||'';if(rk.k==='species'&&!nm)nm=r.sci;if(!nm)return;
      if(!imgMap.has(nm))imgMap.set(nm,[]);
      const arr=imgMap.get(nm);
      if(r.media?.length&&arr.length<3)arr.push(r.media[0]);
    });
    sorted.forEach(g=>{g.imgs=imgMap.get(g.name)||[];g.vern=''});
  }

  if(!sorted.length){
    if(S.total>0){root.innerHTML+='<div class="loading"><div class="spinner"></div><div class="loading-t">Loading taxonomy…</div></div>'}
    else{root.innerHTML+='<div class="empty"><div class="ico">📖</div><h3>No taxa</h3></div>'}
    return;
  }
  if(sortedAll.length>sorted.length){
    const note=document.createElement('div');note.style.cssText='font-size:12px;color:var(--muted);padding:4px 0;margin-bottom:4px';
    note.textContent=`Showing the top ${sorted.length} groups by record count. Use filters to narrow results.`;
    root.appendChild(note);
  }
  /* Fresh observer for this render generation (teardown already bumped the gen) */
  _guideImgObserver=('IntersectionObserver' in window)?new IntersectionObserver(entries=>{
    for(const e of entries){
      if(!e.isIntersecting)continue;
      _guideImgObserver.unobserve(e.target);
      const fn=e.target._imgResolve; e.target._imgResolve=null;
      if(fn)fn();
    }
  },{rootMargin:'200px'}):null;
  const imgGen=_guideImgGen;

  const grid=document.createElement('div');grid.className='gu-grid';
  sorted.forEach(g=>{const isIt=rk.i>=3;const tile=document.createElement('div');tile.className='gu-tile';tile.dataset.gn=g.name;
    /* Records already loaded for this rank carry QM specimen media — show them
       immediately (no API call) with a QM badge. Otherwise start on a skeleton —
       NEVER a dash; the batch pass or the lazy cascade fills it. */
    const hasImg=g.imgs.length>0;
    const heroImg=hasImg?`<img src="${esc(g.imgs[0])}" alt="${esc('Representative image of '+g.name)}" loading="lazy">`:'';
    tile.innerHTML=`<div class="gt-img${hasImg?'':' gt-load'}">${heroImg}</div><div class="gt-body"><div class="gtn${isIt?' it':''}">${esc(g.name)}</div>${g.vern?`<div class="gt-vern">${esc(g.vern)}</div>`:''}<div class="gts">${fmt(g.count)} record${g.count!==1?'s':''}</div></div>`;
    if(hasImg)_guideSetProv(tile,{source:'qm'});
    /* Keyboard-operable: real button semantics (the tile is a div for layout). */
    tile.setAttribute('role','button');tile.tabIndex=0;
    tile.setAttribute('aria-label',`${rk.l}: ${g.name} — ${fmt(g.count)} record${g.count!==1?'s':''}`);
    const drill=()=>{S.guideFocus={rank:g.rank,name:g.name};setFilterSilent(rk.k,g.name);renderGuide();pushURLState()};
    tile.onclick=drill;
    tile.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();drill()}};
    grid.appendChild(tile)});
  root.appendChild(grid);

  /* ── Async: batch-fetch QM images, then lazily cascade the rest ──
     One biocache query (CORS-safe) covers QM images for many tiles at once. Tiles
     QM hasn't imaged are NOT dashed — they resolve through the museum-first cascade
     lazily as they scroll into view (skipQM, since QM is handled here). */
  const rkField=rk.k==='class_'?'class':rk.k;
  const tilesNeedingImgs=sorted.filter(g=>g.imgs.length<1);
  if(tilesNeedingImgs.length){
    (async()=>{
      const found=new Map(); /* name → imageUrl (QM) */
      try{
        /* Fetch a generous batch of imaged records — each record gives us one image for its group */
        const batchSize=Math.min(tilesNeedingImgs.length*2, 500);
        const needed=new Set(tilesNeedingImgs.map(g=>g.name));
        let startIdx=0;
        const PAGE=ALA_MAX_PAGE;
        /* Paginate through imaged records until we've covered most tiles or exhausted results */
        while(found.size<needed.size&&startIdx<batchSize){
          const u=new URLSearchParams();
          u.set('q',getFilters().q||'*:*');
          const fqs=alaBaseFQ(getFilters());
          fqs.push('multimedia:"Image"');
          appendFQ(u,fqs);
          u.set('pageSize',Math.min(PAGE,batchSize-startIdx));
          u.set('startIndex',startIdx);
          u.set('facets','');u.set('flimit','0');
          const r=await fetch('https://biocache-ws.ala.org.au/ws/occurrences/search?'+u);
          if(!r.ok)break;
          const d=await r.json();
          const occs=d.occurrences||[];
          if(!occs.length)break;
          for(const o of occs){
            const groupName=o[rkField]||o['raw_'+rkField]||'';
            if(groupName&&needed.has(groupName)&&!found.has(groupName)){
              const url=o.largeImageUrl||o.imageUrl||o.smallImageUrl||'';
              if(url)found.set(groupName,url);
            }
          }
          startIdx+=occs.length;
          if(startIdx>=d.totalRecords)break;
        }
      }catch(e){ /* keep whatever the batch found; the rest fall to the lazy cascade */ }
      if(imgGen!==_guideImgGen)return;            // a re-render superseded us
      /* Apply found QM images with a QM-specimen badge */
      const remaining=new Set(tilesNeedingImgs.map(g=>g.name));
      for(const [name,url] of found){
        const tile=grid.querySelector(`.gu-tile[data-gn="${CSS.escape(name)}"]`);
        if(tile&&tile.isConnected&&!tile.querySelector('.gt-img img')){
          _guideSetImage(tile,{url,source:'qm',sourceLabel:'QM specimen',attribution:'Queensland Museum',license:'',href:''});
          remaining.delete(name);
        }
      }
      /* Everything QM didn't image: resolve lazily through the cascade (no dashes) */
      for(const g of tilesNeedingImgs){
        if(!remaining.has(g.name))continue;
        const tile=grid.querySelector(`.gu-tile[data-gn="${CSS.escape(g.name)}"]`);
        if(tile&&tile.isConnected)_attachGuideLazy(tile,g.name,rkField,imgGen);
      }
    })();
  }
  /* Async: resolve vernaculars for ALL eligible tiles (≤200) through a bounded pool so
     far-down rows get names too, without bursting the APIs. Generation-guarded (imgGen)
     so a re-render abandons stale writes; results cached in _vernCache. */
  const needVern=sorted.filter(g=>!g.vern);
  for(const g of needVern){
    _queueGuideVern(async()=>{
      if(imgGen!==_guideImgGen)return;        // a re-render superseded us
      const ck=cleanTaxonTerm(g.name);
      let nm;
      if(_vernCache.has(ck)){
        nm=_vernCache.get(ck);                // may be null (known miss) — respect it
      }else{
        const result=await lookupVern(g.name);// already rank/generic-filtered internally; trusts _localVern
        nm=(result&&result.name)||null;
        _vernCache.set(ck,nm);
      }
      if(imgGen!==_guideImgGen)return;        // re-check after the await
      if(!nm)return;                          // blank, never a dash — honest empty state
      const tile=grid.querySelector(`.gu-tile[data-gn="${CSS.escape(g.name)}"]`);
      if(!tile||!tile.isConnected)return;
      let vernDiv=tile.querySelector('.gt-vern');
      if(!vernDiv){
        vernDiv=document.createElement('div');
        vernDiv.className='gt-vern';
        const gtn=tile.querySelector('.gtn');
        if(gtn)gtn.after(vernDiv);
      }
      vernDiv.textContent=singularize(nm);    // NO isGenericVern — re-filtering blanks curated names
    });
  }
}
/* Pure: derive the per-group holdings story from an extractFacets_A() result.
   No network, no DOM. Reused by the Browse focus panel (and the Phase 3 redesign).
   facets: output of extractFacets_A(facD). opts: {totalCount, mediaTotal, childRanks}. */
function deriveHoldingsStats(facets, opts){
  opts = opts || {};
  const records = opts.totalCount || 0;
  const imaged  = opts.mediaTotal || 0;
  const childRanks = opts.childRanks || [];
  const yearFacet = (facets.year||[])
    .filter(y=>y.name && parseInt(y.name)>1700)
    .sort((a,b)=>a.name.localeCompare(b.name));
  const types = (facets.type_status||[]).filter(t=>t.name && !/notatype/i.test(t.name) && t.count>0);
  let childLabel='', childItems=[];
  for(const cr of childRanks){
    const fdata = facets[cr] || facets[cr==='class'?'class_':cr] || [];
    if(fdata.length){ childLabel=cr; childItems=fdata.slice().sort((a,b)=>b.count-a.count); break; }
  }
  return {
    records, imaged,
    imagedPct: records ? imaged/records : 0,
    yearFirst: yearFacet.length ? yearFacet[0].name : '',
    yearLast:  yearFacet.length ? yearFacet[yearFacet.length-1].name : '',
    types: { total: types.reduce((s,t)=>s+t.count,0), items: types },
    states:     (facets.state||[]).filter(s=>s.name && s.count>0).sort((a,b)=>b.count-a.count),
    collectors: (facets.collector||[]).filter(c=>c.name && c.count>0).sort((a,b)=>b.count-a.count),
    basis:      facets.basis_of_record || facets.basisofrecord || [],
    childRank:  { label: childLabel, items: childItems }
  };
}

/* Pure: one-sentence holdings story for a Browse group, from a deriveHoldingsStats()
   result. Plain text (the caller styles it). Reuses fmt + RPLURAL. Honest about gaps
   (0% / <1% imaged). Richness reflects the focus query's flimit, so very large groups
   may under-count child taxa. Returns '' when the group has no QM records. */
function holdingsSentence(H){
  if(!H||!H.records)return '';
  let lead=`${fmt(H.records)} QM specimen${H.records===1?'':'s'}`;
  const childN=H.childRank&&H.childRank.items?H.childRank.items.length:0;
  if(childN){
    const plural=(RPLURAL[H.childRank.label]||H.childRank.label||'taxa').toLowerCase();
    lead+=` across ${fmt(childN)} ${plural}`;
  }
  if(H.types&&H.types.total){
    lead+=`, including ${fmt(H.types.total)} type specimen${H.types.total===1?'':'s'}`;
  }
  const pct=(H.imagedPct||0)*100;
  const segs=[`${pct===0?'0%':pct<1?'<1%':Math.round(pct)+'%'} imaged`];
  if(H.yearFirst&&H.yearLast){
    segs.push(H.yearFirst===H.yearLast?`collected ${H.yearFirst}`:`collected ${H.yearFirst}–${H.yearLast}`);
  }
  return lead+' · '+segs.join(' · ');
}

function renderGuideFocus(root){
  const f=S.guideFocus;const isIt=['Genus','Species'].includes(f.rank);
  const nm=isIt?`<em>${esc(f.name)}</em>`:esc(f.name);
  root.innerHTML=`<div class="gu-hdr"><h2>${nm}</h2><div class="crumb"><a href="#" id="guideBack">← Browse</a> › ${esc(f.rank)}: ${nm}</div></div><div id="gfLoading" style="padding:20px;color:var(--muted)">Loading…</div>`;
  root.querySelector('#guideBack')?.addEventListener('click',e=>{e.preventDefault();guideBack()});
  
  const rkMap={Kingdom:'kingdom',Phylum:'phylum',Class:'class',Order:'order',Superfamily:'superfamily',Family:'family',Genus:'genus',Species:'species'};
  const rkField=rkMap[f.rank]||'family';
  
  const ro2=['kingdom','phylum','class','order','superfamily','family','genus','species'];
  const ci=ro2.indexOf(rkField);
  const childRanks=ro2.slice(ci+1);
  const facetsToRequest=['year','basis_of_record','state','collector','type_status',...childRanks].join(',');
  
  (async()=>{
    try{
      /* ── Three parallel API calls ── */
      const fqs=alaBaseFQ(getFilters());
      fqs.push(`${rkField}:"${f.name}"`);
      const qStr=getFilters().q||'*:*';

      const facP=fetch(`https://biocache-ws.ala.org.au/ws/occurrences/search?q=${encodeURIComponent(qStr)}&${fqQS(fqs)}&pageSize=0&facets=${facetsToRequest}&flimit=500&fsort=count`).then(r=>r.ok?r.json():null).catch(()=>null);
      const imgP=fetch(`https://biocache-ws.ala.org.au/ws/occurrences/search?q=${encodeURIComponent(qStr)}&${fqQS([...fqs,'multimedia:"Image"'])}&pageSize=12&facets=&flimit=0`).then(r=>r.ok?r.json():null).catch(()=>null);
      const bieP=cachedFetch(`https://bie-ws.ala.org.au/ws/search?q=${encodeURIComponent(f.name)}&fq=idxtype:TAXON&pageSize=1`).then(r=>r.ok?r.json():null).catch(()=>null);

      const [facD,imgD,bieD]=await Promise.all([facP,imgP,bieP]);

      const totalCount=facD?.totalRecords||0;
      const facets=facD?extractFacets_A(facD):{};
      const mediaTotal=imgD?.totalRecords||0;
      const imgRecs=(imgD?.occurrences||[]).map(normRec_A);
      const bieHit=(bieD?.searchResults?.results||[])[0]||null;

      /* Derive the holdings story (counts, types, year range, states, collectors,
         basis, child-taxa richness) via the shared pure helper. */
      const H=deriveHoldingsStats(facets,{totalCount,mediaTotal,childRanks});
      const yr1=H.yearFirst, yr2=H.yearLast;
      const childRankLabel=H.childRank.label, childItems=H.childRank.items;
      const basisFacet=H.basis, stateFacet=H.states, collectorFacet=H.collectors;
      const typeFacet=H.types.items, typeTotal=H.types.total;

      /* Conservation status from BIE */
      let consHtml='';
      if(bieHit?.conservationStatuses&&typeof bieHit.conservationStatuses==='object'){
        const labels=[];
        for(const [jur,status] of Object.entries(bieHit.conservationStatuses)){
          if(!status||typeof status!=='string')continue;
          const lo=status.toLowerCase();
          let cls='';
          if(/critically/i.test(lo))cls='cr';
          else if(/endangered/i.test(lo)&&!/near/i.test(lo))cls='en';
          else if(/vulnerable/i.test(lo))cls='vu';
          else if(/near.*threatened/i.test(lo))cls='nt';
          if(cls){const j=jur.replace(/_/g,' ').replace(/Conservation/i,'').replace(/Status/i,'').trim();labels.push(`<span class="gf-cons ${cls}">${esc(j)}: ${esc(status)}</span>`)}
        }
        if(labels.length)consHtml=labels.join(' ');
      }
      const vernName=bieHit?.commonName||'';

      /* ── Render ── */
      const loading=$('#gfLoading');if(loading)loading.remove();

      /* Vernacular + conservation line */
      if(consHtml||vernName){
        const meta=document.createElement('div');meta.style.cssText='margin-bottom:10px';
        meta.innerHTML=`${consHtml?`<div style="margin-bottom:4px">${consHtml}</div>`:''}${vernName?`<div style="font-size:14px;color:var(--muted)" id="gfVern">${esc(vernName)}</div>`:'<div id="gfVern"></div>'}`;
        root.appendChild(meta);
      }else{
        const vh=document.createElement('div');vh.id='gfVern';vh.style.cssText='font-size:14px;color:var(--muted);margin-bottom:10px';
        root.appendChild(vh);
      }

      const row=document.createElement('div');row.className='gu-focus';root.appendChild(row);

      /* ── LEFT: collection summary ── */
      const left=document.createElement('div');left.className='gfp';
      let lh=`<h4>QM Collection</h4>`;
      lh+=`<div class="gf-stats"><div class="gfb"><div class="k">Records</div><div class="v">${fmt(totalCount)}</div></div><div class="gfb"><div class="k">First</div><div class="v">${esc(yr1||'—')}</div></div><div class="gfb"><div class="k">Last</div><div class="v">${esc(yr2||'—')}</div></div><div class="gfb"><div class="k">Imaged</div><div class="v">${fmt(mediaTotal)}</div></div></div>`;
      if(typeTotal){lh+=`<div style="font-size:12px;margin-top:8px"><span style="font-weight:700;color:var(--red)">${fmt(typeTotal)} type specimen${typeTotal>1?'s':''}</span>${typeFacet.length<=4?` (${typeFacet.map(t=>esc(t.name)+': '+fmt(t.count)).join(', ')})`:''}</div>`}
      if(stateFacet.length){lh+=`<div style="margin-top:10px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:3px">States</div><div style="font-size:12px;color:var(--ink)">${stateFacet.slice(0,6).map(s=>`${esc(s.name)} <span style="color:var(--muted)">(${fmt(s.count)})</span>`).join(' · ')}</div></div>`}
      if(collectorFacet.length){lh+=`<div style="margin-top:10px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:3px">Principal collectors</div><div style="font-size:12px;color:var(--ink)">${collectorFacet.slice(0,5).map(c=>`${esc(c.name)} <span style="color:var(--muted)">(${fmt(c.count)})</span>`).join(' · ')}</div></div>`}
      if(basisFacet.length){lh+=`<div style="margin-top:10px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:3px">Basis of record</div><div class="cc">${basisFacet.map(b=>`<span class="cc-chip" style="cursor:default">${esc(basisL(b.name)||b.name)}: ${fmt(b.count)}</span>`).join('')}</div></div>`}
      lh+=`<div id="gfDesc" style="margin-top:10px;font-size:12px;line-height:1.6;color:var(--ink);display:none"></div>`;
      /* Holdings story — readable per-group summary, placed beneath the description. */
      const narrative=holdingsSentence(H);
      if(narrative)lh+=`<p class="gf-narrative" style="margin:12px 0 0;padding-top:10px;border-top:1px solid var(--hair);font-size:13px;line-height:1.55;color:var(--ink)">${esc(narrative)}</p>`;
      lh+=`<div class="bar-row"><button class="p" id="gfRec">View Records</button><button id="gfBk">← Back</button></div>`;
      left.innerHTML=lh;
      row.appendChild(left);

      /* ── RIGHT: child taxa + specimens ── */
      const right=document.createElement('div');right.className='gfp';
      const ca=childItems.slice(0,60);
      const imgUrls=imgRecs.filter(r=>r.media?.length).map(r=>r.media[0]).slice(0,12);
      let rh='';
      if(ca.length){rh+=`<h4>${esc(RPLURAL[childRankLabel]||childRankLabel||'Taxa')}</h4><div class="cc">${ca.map(c=>`<span class="cc-chip" data-rk="${esc(childRankLabel)}" data-nm="${esc(c.name)}">${['genus','species'].includes(childRankLabel)?`<em>${esc(c.name)}</em>`:esc(c.name)} <span style="color:var(--muted)">${fmt(c.count)}</span></span>`).join('')}</div>`}
      if(imgUrls.length){rh+=`<h4 style="${ca.length?'margin-top:14px':''}">Specimens</h4><div class="gf-imgs">${imgUrls.map(u=>`<img src="${esc(u)}" loading="lazy" onerror="this.style.display='none'"/>`).join('')}</div>`}
      if(!ca.length&&!imgUrls.length){rh=`<div style="padding:20px 0;text-align:center;color:var(--muted)"><div style="font-size:24px;margin-bottom:6px">—</div><div style="font-size:12px">${mediaTotal===0?'No imaged specimens in the QM collection.':'Loading…'}</div></div>`}
      right.innerHTML=rh;
      row.appendChild(right);

      /* Wire events */
      left.querySelector('#gfRec')?.addEventListener('click',()=>{
        S.guideFocus=null;S._searchStale=false;
        S.view='gallery';$$('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v==='gallery'));
        $$('.vp').forEach(p=>p.classList.remove('on'));$('#v-gallery')?.classList.add('on');
        const sc=$('#scroll');sc.classList.remove('mm');sc.style.overflow='auto';doSearch();
      });
      left.querySelector('#gfBk')?.addEventListener('click',()=>{guideBack()});
      right.querySelectorAll('.cc-chip[data-rk]').forEach(ch=>{ch.style.cursor='pointer';ch.onclick=()=>{const rk=ch.dataset.rk;const nm=ch.dataset.nm;S.guideFocus={rank:RLABEL[rk]||rk,name:nm};setFilterSilent(rk,nm);renderGuide();pushURLState()}});

      fetchGuideInfo(f.name);
      
    }catch(e){
      console.error('[Browse] API error:',e);
      const loading=$('#gfLoading');
      if(loading)loading.textContent='Error loading data. Please try again.';
    }
  })();
}

async function fetchGuideInfo(name){
  const vernEl=$('#gfVern'),descEl=$('#gfDesc');
  if(!vernEl||!descEl)return;
  /* Common name from GBIF */
  const ck=cleanTaxonTerm(name);
  if(_vernCache.has(ck)){
    const cached=_vernCache.get(ck);
    if(cached)vernEl.textContent=singularize(cached);
  }else{
    try{
      const result=await lookupVern(name); // trusts _localVern; filters API results internally
      const nm=(result&&result.name)||null;
      _vernCache.set(ck,nm);
      if(nm)vernEl.textContent=singularize(nm); // NO isGenericVern here either
    }catch(e){}
  }
  /* Description: Wikipedia → ALA BIE fallback */
  let found=false;
  const wTerms=[name];
  for(const term of wTerms){
    if(_wikiCache.has(term)&&_wikiCache.get(term)){
      const d=_wikiCache.get(term);
      const ex=d.extract.length>250?d.extract.slice(0,247)+'…':d.extract;
      let h=d.thumbnail?`<img src="${d.thumbnail.source}" alt="" style="float:right;max-width:60px;max-height:60px;margin:0 0 4px 8px;border-radius:4px"/>`:'';
      h+=`<span style="font-weight:700;font-size:10px;color:var(--muted)">📖 Wikipedia</span><br>${esc(ex)} <a href="${d.content_urls?.desktop?.page||'#'}" target="_blank" style="color:var(--blue);font-size:11px">Read more ↗</a>`;
      descEl.innerHTML=h;descEl.style.display='block';found=true;break;
    }
    try{
      let d=await wikiSummary(term);
      if(!d){
        const sr=await cachedFetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term+' taxonomy')}&srnamespace=0&srlimit=3&format=json&origin=*`);
        if(sr.ok){const sd=await sr.json();for(const hit of(sd.query?.search||[])){const snip=(hit.snippet||'').toLowerCase();if(/genus|species|family|insect|animal|arthropod|moth|beetle|fish|bird|reptil|mammal|frog|spider|crab|taxonom/.test(snip)){d=await wikiSummary(hit.title);if(d)break}}}
      }
      if(d){
        _wikiCache.set(term,d);
        const ex=d.extract.length>250?d.extract.slice(0,247)+'…':d.extract;
        let h=d.thumbnail?`<img src="${d.thumbnail.source}" alt="" style="float:right;max-width:60px;max-height:60px;margin:0 0 4px 8px;border-radius:4px"/>`:'';
        h+=`<span style="font-weight:700;font-size:10px;color:var(--muted)">📖 Wikipedia</span><br>${esc(ex)} <a href="${d.content_urls?.desktop?.page||'#'}" target="_blank" style="color:var(--blue);font-size:11px">Read more ↗</a>`;
        descEl.innerHTML=h;descEl.style.display='block';found=true;break;
      }
    }catch(e){}
  }
  /* ALA BIE fallback */
  if(!found){
    try{
      const r2=await cachedFetch(`https://bie-ws.ala.org.au/ws/search?q=${encodeURIComponent(name)}&fq=idxtype:TAXON&pageSize=1`);
      if(r2.ok){
        const bd=await r2.json();const hit=(bd.searchResults?.results||[])[0];
        if(hit){
          if(!vernEl.textContent&&hit.commonName)vernEl.textContent=hit.commonName;
          const desc=(hit.description||'').replace(/<[^>]+>/g,'');
          if(desc){
            const ex=desc.length>250?desc.slice(0,247)+'…':desc;
            let h=hit.smallImageUrl?`<img src="${hit.smallImageUrl}" alt="" style="float:right;max-width:60px;max-height:60px;margin:0 0 4px 8px;border-radius:4px"/>`:'';
            h+=`<span style="font-weight:700;font-size:10px;color:var(--muted)">📖 ALA</span><br>${esc(ex)} <a href="https://bie.ala.org.au/species/${encodeURIComponent(hit.guid||'')}" target="_blank" style="color:var(--blue);font-size:11px">ALA profile ↗</a>`;
            descEl.innerHTML=h;descEl.style.display='block';
          }
        }
      }
    }catch(e){}
  }
}

/* Create the appropriate marker layer based on current mode.
   Spiderfy OFF → plain L.featureGroup (original behaviour, circleMarkers).
   Spiderfy ON  → L.markerClusterGroup with clustering + spiral expansion. */
function createMarkerLayer(){
  if(!S.mapSpiderfy){
    return L.featureGroup();
  }
  return L.markerClusterGroup({
    chunkedLoading:true,
    maxClusterRadius:50,
    spiderfyOnMaxZoom:true,
    showCoverageOnHover:false,
    zoomToBoundsOnClick:true,
    /* Spiral layout: increase distance multiplier for breathing room between the coloured dots.
       Default is 1 which packs markers too tightly with small divIcons. 
       circleSpiralSwitchover controls when the layout switches from circle to spiral. */
    spiderfyDistanceMultiplier:1.8,
    circleSpiralSwitchover:8,
    spiderLegPolylineOptions:{weight:1,color:'#999',opacity:.4},
    iconCreateFunction:function(cluster){
      const freq=new Map();
      cluster.getAllChildMarkers().forEach(m=>{
        const c=m.options._qmColor||'#888';
        freq.set(c,(freq.get(c)||0)+1);
      });
      let dominant='#888',max=0;
      freq.forEach((n,c)=>{if(n>max){max=n;dominant=c}});
      const count=cluster.getChildCount();
      let sz=40,inner=30,fs=12;
      if(count>=100){sz=50;inner=38;fs=13}
      if(count>=1000){sz=56;inner=44;fs=14}
      return L.divIcon({
        html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${dominant};opacity:.4;position:absolute;top:0;left:0"></div><div style="width:${inner}px;height:${inner}px;border-radius:50%;background:${dominant};opacity:.85;position:absolute;top:${(sz-inner)/2}px;left:${(sz-inner)/2}px;display:flex;align-items:center;justify-content:center;font-family:Barlow,sans-serif;font-weight:800;font-size:${fs}px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.25)"><span>${count}</span></div>`,
        className:'marker-cluster',
        iconSize:L.point(sz,sz)
      });
    }
  });
}

/* Rebuild marker layer when toggling spiderfy, preserving map state */
function rebuildMarkerLayer(){
  if(!S.map||!S.markers)return;
  S.map.removeLayer(S.markers);
  S.markers=createMarkerLayer();
  S.markers.addTo(S.map);
  addMarkers();
}

      streets.addTo(S.map);L.control.layers({'Streets':streets,'Topo':topo,'Satellite':sat},{},{collapsed:true}).addTo(S.map);

async function doMapSearch(){
  const q=$('#mapSrch')?.value?.trim();if(!q||!S.map)return;
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&countrycodes=au`);
    const d=await r.json();
    if(d[0]){
      const hit=d[0];
      /* Use bounding box if available for natural zoom, otherwise estimate from place type */
      if(hit.boundingbox){
        const bb=hit.boundingbox.map(Number); /* [south, north, west, east] */
        S.map.fitBounds([[bb[0],bb[2]],[bb[1],bb[3]]],{padding:[40,40],maxZoom:16});
      }else{
        /* Fallback: zoom based on place type */
        const t=(hit.type||'').toLowerCase();
        const z=t==='suburb'||t==='village'||t==='hamlet'||t==='town'||t==='locality'?14:
                 t==='city'?12:t==='state'||t==='country'?6:13;
        S.map.setView([+hit.lat,+hit.lon],z);
      }
      toast('Moved to '+hit.display_name.split(',')[0]);
    }else toast('Location not found');
  }catch(e){toast('Search failed')}
}

  const gap=fetched>0&&!loading?(fetched-allCount):0;

  if(loading)txt+=` <span style="color:#f7941d">(loading… ${Math.round(fetched/cap*100)}%)</span>`;
  else if(gap>0&&coordFilter)txt+=` of ${fmt(S.total)} <span style="color:var(--muted)" title="${gap} records have coordinates withheld by ALA (sensitive taxa)">(${fmt(gap)} coords withheld)</span>`;
  else if(gap>0)txt+=` of ${fmt(S.total)} total <span style="color:var(--muted)">(${fmt(allCount)} with coords)</span>`;
  else txt+=` of ${fmt(S.total)} total`;
  if(!S.mapUncapped&&S.total>50000)txt+=` <span style="color:var(--muted)">(50k cap)</span>`;
  else if(S.mapUncapped&&S.total>50000)txt+=` <span style="color:var(--orange);font-weight:600">(uncapped)</span>`;
  if(S.mapYearRange)txt+=` · <span style="color:var(--ink);font-weight:600">${S.mapYearRange[0]}–${S.mapYearRange[1]}</span>`;

function fmtDate(r){
  /* Try eventDate first — may be ISO string or unix timestamp (ms or seconds, positive or negative) */
  if(r.eventDate){
    const ed=r.eventDate;
    /* Detect numeric: positive or negative, possibly as string */
    if(typeof ed==='number'||/^-?\d{8,}$/.test(String(ed))){
      let ms=typeof ed==='number'?ed:parseInt(ed);
      /* If absolute value < 1e10, it's probably seconds not ms */
      if(Math.abs(ms)<1e10)ms*=1000;
      const d=new Date(ms);
      if(!isNaN(d.getTime()))return d.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
    }
    if(typeof ed==='string'&&ed.length>=8){
      const iso=ed.slice(0,10);
      const d=new Date(iso);
      if(!isNaN(d.getTime()))return d.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
      return iso;
    }
  }
  /* Fall back to day/month/year fields */
  const parts=[];
  if(r.day)parts.push(r.day);if(r.month)parts.push(r.month);if(r.year)parts.push(r.year);
  return parts.join('/')||r.verbatimDate||'';
}

/* ── Shared filter: returns points visible in the current box/polygon and year range ── */
function getVisiblePts(){
  let pts=S.allPts;
  if(S.mapBox){
    const b=S.mapBox;
    pts=pts.filter(r=>r.lat>=b.s&&r.lat<=b.n&&r.lng>=b.w&&r.lng<=b.e);
  }
  /* Temporal filter — applied client-side via year range slider */
  if(S.mapYearRange){
    const[lo,hi]=S.mapYearRange;
    pts=pts.filter(r=>r.year!=null&&r.year>=lo&&r.year<=hi);
  }
  /* No polygon re-filter needed — S.allPts already contains only polygon-tested records
     (fill-page and bgPolyScan both apply pointInPolygon before adding to allPts) */
  return pts;
}
/* Ray-casting point-in-ring test */
function pointInRing(lat,lng,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1]; /* ArcGIS: [lng,lat] */
    const xj=ring[j][0],yj=ring[j][1];
    if(((yi>lat)!==(yj>lat))&&(lng<(xj-xi)*(lat-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}
/* Multi-ring: point is inside if inside odd number of rings (handles holes) */
function pointInPolygon(lat,lng,rings){
  /* For merged multi-source polygons, a point is "inside" if it falls in ANY ring.
     (The odd-crossing rule only works for single-source polygons with holes.) */
  for(const ring of rings){if(pointInRing(lat,lng,ring))return true}
  return false;
}

function addMarkers(){
  if(!S.markers)return;S.markers.clearLayers();
  const pts=getVisiblePts();
  if(!pts.length){buildLegend();return}const bounds=[];
  const useCluster=S.mapSpiderfy;

  /* Shared popup-open handler: wires record link */
  function onPopupOpen(m,r){
    const el=m.getPopup()?.getElement();
    const lnk=el?.querySelector('.map-rec-link');
    if(lnk)lnk.addEventListener('click',ev=>{
      ev.preventDefault();m.closePopup();
      let resIdx=S.res.indexOf(r);
      if(resIdx<0){S.res.push(r);resIdx=S.res.length-1;}
      openModal(resIdx);
    });
  }

  if(useCluster){
    /* Cluster mode: L.marker with divIcon so spiderfy works properly */
    const batch=[];
    pts.forEach(r=>{
      const c=markerColor(r);
      const icon=L.divIcon({className:'qm-dot',html:`<div style="width:14px;height:14px;border-radius:50%;background:${c};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35)"></div>`,iconSize:[14,14],iconAnchor:[7,7],popupAnchor:[0,-7]});
      const m=L.marker([r.lat,r.lng],{icon,_qmColor:c});
      m.bindPopup(()=>buildPopupHTML(r),{closeButton:true,minWidth:200,maxWidth:300});
      m.on('popupopen',()=>onPopupOpen(m,r));
      batch.push(m);bounds.push([r.lat,r.lng]);
    });
    S.markers.addLayers(batch);
  }else{
    /* Original mode: L.circleMarker on featureGroup — no clustering */
    pts.forEach(r=>{
      const c=markerColor(r);
      const m=L.circleMarker([r.lat,r.lng],{radius:6,fillColor:c,color:'#fff',weight:1.5,fillOpacity:.85});
      m.bindPopup(()=>buildPopupHTML(r),{closeButton:true,minWidth:200,maxWidth:300});
      m.on('popupopen',()=>onPopupOpen(m,r));
      S.markers.addLayer(m);bounds.push([r.lat,r.lng]);
    });
  }

  if(bounds.length&&!S.mapBox&&!S.mapPoly&&!S._mapFitted){S.map.fitBounds(bounds,{padding:[30,30],maxZoom:10});S._mapFitted=true};
  buildLegend();
  try{updateTemporalSlider()}catch(e){}
}

function buildPopupHTML(r){
  try{
  const date=fmtDate(r);
  const coords=(typeof r.lat==='number'?r.lat.toFixed(4):r.lat)+', '+(typeof r.lng==='number'?r.lng.toFixed(4):r.lng);
  /* Build place string — only show when locality data is present */
  const loc=r.locality||'';
  const locUseful=loc&&
    (!r.state||loc.toLowerCase()!==r.state.toLowerCase())&&
    (!r.country||loc.toLowerCase()!==r.country.toLowerCase());
  const place=locUseful?[loc,r.state,r.country].filter(Boolean).join(', '):'';

  let h=`<div style="font-family:Barlow,sans-serif;font-size:13px;max-width:280px;line-height:1.5">`;
  h+=`<b${shouldItalic(r.sci)?' style="font-style:italic"':''}>${esc(displaySci(r.sci))}</b>`;
  if(r.cat)h+=` <span style="color:#007a47;font-weight:700">${esc(r.cat)}</span>`;
  if(isType(r.typeStatus))h+=` <span style="display:inline-block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:1px 5px;border-radius:3px;color:#fff;background:${typeColor(r.typeStatus)};vertical-align:middle">${esc(r.typeStatus)}</span>`;
  if(r.vern&&isVernWorthShowing(r))h+=`<br><span style="color:#595959">${esc(singularize(r.vern))}</span>`;
  if(date)h+=`<br><b>Date:</b> ${esc(date)}`;
  if(place)h+=`<br><b>Place:</b> ${esc(place.length>90?place.slice(0,87)+'…':place)}`;
  h+=`<br><b>Coords:</b> ${coords}`;
  if(r.elevMin!=null)h+=` · <b>${r.elevMin}${r.elevMax!=null&&r.elevMax!==r.elevMin?'–'+r.elevMax:''} m</b>`;
  if(r.recBy){const col=r.recBy.replace(/\s*\|\s*/g,' & ');h+=`<br><b>Collector:</b> ${esc(col.length>40?col.slice(0,37)+'…':col)}`}
  if(r.habitat)h+=`<br><b>Habitat:</b> ${esc(r.habitat.length>60?r.habitat.slice(0,57)+'…':r.habitat)}`;
  /* Taxonomy breadcrumb */
  const tax=[r.order,r.superfamily,r.family,r.subfamily,r.tribe,r.genus].filter(Boolean).join(' › ');
  if(tax)h+=`<br><span style="color:#8a8578;font-size:11px">${esc(tax)}</span>`;
  h+=`<br><a href="#" class="map-rec-link" style="color:#007a47;font-weight:600;text-decoration:underline">View full record →</a>`;
  h+=`</div>`;
  return h;
  }catch(e){console.error('[popup]',e);return`<div style="font-family:sans-serif;font-size:13px"><b>${esc(r.sci||'Unknown')}</b><br>${esc(r.cat||'')}<br><a href="#" class="map-rec-link" style="color:#007a47;font-weight:600">View record →</a></div>`}
}

function buildLegend(){
  if(!S.map)return;$('#mapC').querySelectorAll('.map-legend').forEach(e=>e.remove());
  const pts=getVisiblePts();
  const counts=new Map(); /* label → {color, count} */
  pts.forEach(r=>{
    const cb=S.mapColorBy;let label='';let color;
    if(cb==='collection'){label=shortColl(r.coll);color=collColor(r.coll||'Unknown')}
    else if(cb==='phylum')label=r.phylum;else if(cb==='class')label=r.class_;
    else if(cb==='order')label=r.order;else if(cb==='genus')label=r.genus;else if(cb==='species')label=r.species||r.sci;
    else label=r.family;
    label=label||'(unknown)';
    const existing=counts.get(label);
    if(existing){existing.count++}
    else{counts.set(label,{color:color||markerColor(r),count:1})}
  });
  /* Sort by count descending so most abundant taxa are at top */
  const entries=[...counts.entries()].sort((a,b)=>b[1].count-a[1].count);
  const shown=entries.slice(0,30);
  const leg=document.createElement('div');leg.className='map-legend'+(S.mapLegendShut?' shut':'');
  const cbL=S.mapColorBy.charAt(0).toUpperCase()+S.mapColorBy.slice(1);
  const boxTag=S.mapBox?' · <span style="color:#007a47;font-size:10px">in box</span>':S.mapPoly?' · <span style="color:#2d6a4f;font-size:10px">in '+esc(S.mapPoly.source==='drawn'?'drawn area':S.mapPoly.name||'area')+'</span>':'';
  leg.innerHTML=`<div class="ml-head"><span>${esc(cbL)} (${counts.size})${boxTag}</span><span>${S.mapLegendShut?'▸':'▾'}</span></div><div class="ml-body">${shown.map(([l,v])=>`<div class="ml-item"><div class="ml-dot" style="background:${v.color}"></div><div class="ml-nm">${esc(l)} <span style="color:var(--muted);font-size:10px">(${v.count})</span></div></div>`).join('')}${entries.length>30?'<div style="color:var(--muted);padding-top:3px">+ '+(entries.length-30)+' more</div>':''}</div>`;
  leg.querySelector('.ml-head').onclick=()=>{S.mapLegendShut=!S.mapLegendShut;leg.classList.toggle('shut');leg.querySelector('.ml-head span:last-child').textContent=S.mapLegendShut?'▸':'▾'};
  $('#mapC').appendChild(leg);
}

/* DRAW BOX */
function initDrawBox(){
  if(!S.map)return;
  const box={mode:false,dragging:false,start:null,rect:null};S.mapBoxState=box;
  const drawBtn=$('#drawBtn'),clearBtn=$('#clearBtn');
  const container=S.map.getContainer();
  const setUI=()=>{
    drawBtn.textContent=box.mode?'Cancel draw':'Draw box';drawBtn.classList.toggle('active',box.mode);
    clearBtn.style.display=S.mapBox?'':'none';
    container.style.cursor=box.mode?'crosshair':'';
  };
  const clearBox=()=>{
    clearMapBox();setUI();
    S.off=0;doSearch();
  };
  drawBtn.addEventListener('click',()=>{
    box.mode=!box.mode;
    if(box.mode){
      /* Close tools popover */
      try{$('#mapToolsPop')?.classList.remove('open');$('#mapToolsBtn')?.classList.remove('open')}catch(e){}
      /* Cancel draw-poly if active */
      if(S._drawPoly?.mode){S._drawPoly.mode=false;try{const dp=$('#drawPolyBtn');if(dp){dp.textContent='Draw polygon';dp.classList.remove('active')}}catch(e){};try{const fp=$('#finishPolyBtn');if(fp)fp.style.display='none'}catch(e){}}
      S.map.dragging.disable();S.map.doubleClickZoom.disable();S.map.scrollWheelZoom.disable()
    }
    else{S.map.dragging.enable();S.map.doubleClickZoom.enable();S.map.scrollWheelZoom.enable();
      if(box.rect&&!S.mapBox){try{S.map.removeLayer(box.rect)}catch(e){};box.rect=null}box.dragging=false;box.start=null}
    setUI();
  });
  clearBtn.addEventListener('click',clearBox);
  /* Use DOM pointer events on the map container — avoids canvas renderer intercepting */
  function evToLatLng(ev){
    const rect=container.getBoundingClientRect();
    const x=ev.clientX-rect.left, y=ev.clientY-rect.top;
    return S.map.containerPointToLatLng(L.point(x,y));
  }
  container.addEventListener('pointerdown',ev=>{
    if(!box.mode)return;
    ev.preventDefault();ev.stopPropagation();
    box.dragging=true;
    box.start=evToLatLng(ev);
    if(box.rect){try{S.map.removeLayer(box.rect)}catch(e){};box.rect=null}
    const b=L.latLngBounds(box.start,box.start);
    box.rect=L.rectangle(b,{weight:2,color:'#222',fillOpacity:.06,interactive:false}).addTo(S.map);
    container.setPointerCapture(ev.pointerId);
  });
  container.addEventListener('pointermove',ev=>{
    if(!box.mode||!box.dragging||!box.start)return;
    ev.preventDefault();
    const cur=evToLatLng(ev);
    const b=L.latLngBounds(box.start,cur);
    if(box.rect)box.rect.setBounds(b);
  });
  container.addEventListener('pointerup',ev=>{
    if(!box.dragging)return;
    box.dragging=false;
    if(box.rect){
      const b=box.rect.getBounds();
      const sw=b.getSouthWest(),ne=b.getNorthEast();
      /* Only accept if the box is big enough (not accidental click) */
      const sizeDeg=Math.abs(ne.lat-sw.lat)+Math.abs(ne.lng-sw.lng);
      if(sizeDeg>0.01){
        S.mapBox={s:sw.lat,w:sw.lng,n:ne.lat,e:ne.lng};
        S.map.fitBounds(b,{padding:[20,20]});
        clearNNTT(true); /* clear NNTT polygon without triggering search */
      }else{
        try{S.map.removeLayer(box.rect)}catch(e){};box.rect=null;
      }
    }
    box.mode=false;S.map.dragging.enable();S.map.doubleClickZoom.enable();S.map.scrollWheelZoom.enable();setUI();
    if(S.mapBox){S.off=0;doSearch()}
  });
  setUI();
}

/* DRAW POLYGON — click vertices, double-click or Finish to close */
function initDrawPoly(){
  if(!S.map)return;
  const poly={mode:false,vertices:[],markers:[],polyline:null};
  S._drawPoly=poly;
  const drawBtn=$('#drawPolyBtn'),finishBtn=$('#finishPolyBtn'),clearBtn=$('#clearPolyBtn');
  const container=S.map.getContainer();

  const updateUI=()=>{
    drawBtn.textContent=poly.mode?'Cancel':'Draw polygon';
    drawBtn.classList.toggle('active',poly.mode);
    finishBtn.style.display=(poly.mode&&poly.vertices.length>=3)?'':'none';
    /* Show clear button when a user-drawn polygon is active (source==='drawn') */
    clearBtn.style.display=(S.mapPoly?.source==='drawn')?'':'none';
    container.style.cursor=poly.mode?'crosshair':'';
  };

  function evToLatLng(ev){
    const rect=container.getBoundingClientRect();
    return S.map.containerPointToLatLng(L.point(ev.clientX-rect.left,ev.clientY-rect.top));
  }

  function addVertex(latlng){
    poly.vertices.push(latlng);
    /* Small circle marker at each vertex */
    const vm=L.circleMarker(latlng,{radius:5,fillColor:'#222',color:'#fff',weight:2,fillOpacity:.9,interactive:false}).addTo(S.map);
    poly.markers.push(vm);
    /* Update preview polyline */
    if(poly.polyline){try{S.map.removeLayer(poly.polyline)}catch(e){}}
    poly.polyline=L.polyline(poly.vertices,{weight:2,color:'#222',dashArray:'6 4',interactive:false}).addTo(S.map);
    updateUI();
  }

  function cleanupDraw(){
    poly.markers.forEach(m=>{try{S.map.removeLayer(m)}catch(e){}});
    poly.markers=[];
    if(poly.polyline){try{S.map.removeLayer(poly.polyline)}catch(e){};poly.polyline=null}
    poly.vertices=[];
  }

  function cancelDraw(){
    cleanupDraw();
    poly.mode=false;
    S.map.dragging.enable();S.map.doubleClickZoom.enable();S.map.scrollWheelZoom.enable();
    updateUI();
  }

  function finishPoly(){
    if(poly.vertices.length<3){cancelDraw();return}
    const verts=[...poly.vertices];
    cleanupDraw();
    poly.mode=false;
    S.map.dragging.enable();S.map.doubleClickZoom.enable();S.map.scrollWheelZoom.enable();

    /* Clear any existing spatial filter */
    clearMapBox();
    clearNNTT(true);

    /* Convert Leaflet [lat,lng] vertices to ArcGIS-style ring [[lng,lat], …] for pointInRing compatibility.
       Close the ring by repeating the first vertex. */
    const ring=verts.map(v=>[v.lng,v.lat]);
    ring.push([verts[0].lng,verts[0].lat]); /* close ring */

    /* Draw the polygon on the map */
    const polyLayer=L.polygon(verts,{
      weight:2.5,color:'#2d6a4f',fillColor:'#2d6a4f',fillOpacity:.08,dashArray:'6 4',interactive:false
    }).addTo(S.map);

    S.mapPoly={name:'Drawn area',rings:[ring],leafletLayer:polyLayer,source:'drawn'};
    S.map.fitBounds(polyLayer.getBounds(),{padding:[30,30]});
    updateUI();
    S.off=0;doSearch();
    toast('Searching drawn area…');
  }

  drawBtn.addEventListener('click',()=>{
    if(poly.mode){cancelDraw();return}
    /* Enter draw mode — cancel draw-box if active */
    if(S.mapBoxState?.mode){
      S.mapBoxState.mode=false;
      S.map.dragging.enable();S.map.doubleClickZoom.enable();S.map.scrollWheelZoom.enable();
      if(S.mapBoxState.rect&&!S.mapBox){try{S.map.removeLayer(S.mapBoxState.rect)}catch(e){};S.mapBoxState.rect=null}
      S.mapBoxState.dragging=false;S.mapBoxState.start=null;
      try{const db=$('#drawBtn');if(db){db.textContent='Draw box';db.classList.remove('active')}}catch(e){}
    }
    poly.mode=true;
    poly.vertices=[];
    /* Close tools popover */
    try{$('#mapToolsPop')?.classList.remove('open');$('#mapToolsBtn')?.classList.remove('open')}catch(e){}
    S.map.dragging.disable();S.map.doubleClickZoom.disable();S.map.scrollWheelZoom.disable();
    updateUI();
    toast('Click to place vertices. Double-click or press Finish to close.');
  });

  finishBtn.addEventListener('click',()=>finishPoly());

  clearBtn.addEventListener('click',()=>{
    clearNNTT(false); /* clearNNTT handles S.mapPoly cleanup and triggers doSearch */
    updateUI();
  });

  /* Click to add vertex */
  container.addEventListener('click',ev=>{
    if(!poly.mode)return;
    /* Ignore if this is the second click of a dblclick (browsers fire click before dblclick) */
    if(poly._dblGuard)return;
    ev.preventDefault();ev.stopPropagation();
    addVertex(evToLatLng(ev));
  });

  /* Double-click to finish */
  container.addEventListener('dblclick',ev=>{
    if(!poly.mode)return;
    ev.preventDefault();ev.stopPropagation();
    poly._dblGuard=true;
    setTimeout(()=>{poly._dblGuard=false},300);
    finishPoly();
  });

  /* Escape to cancel */
  document.addEventListener('keydown',ev=>{
    if(ev.key==='Escape'&&poly.mode)cancelDraw();
  });

  updateUI();
}

/* Rebuild the temporal histogram and slider range when data changes */
function updateTemporalSlider(){
  const wrap=$('#mapTemporal');if(!wrap)return;
  const pts=S.allPts;
  /* Collect year distribution */
  const years=new Map();
  let minY=9999,maxY=0;
  pts.forEach(r=>{
    if(r.year!=null&&r.year>1700&&r.year<=new Date().getFullYear()){
      years.set(r.year,(years.get(r.year)||0)+1);
      if(r.year<minY)minY=r.year;if(r.year>maxY)maxY=r.year;
    }
  });
  if(minY>maxY||maxY-minY<2){wrap.classList.remove('vis');return}
  wrap.classList.add('vis');

  /* Build histogram */
  const histEl=$('#mtHist');
  /* Bin into ~60 buckets for smooth display */
  const span=maxY-minY+1;
  const binCount=Math.min(span,60);
  const binSize=span/binCount;
  const bins=new Array(binCount).fill(0);
  let binMax=0;
  years.forEach((count,yr)=>{
    const idx=Math.min(Math.floor((yr-minY)/binSize),binCount-1);
    bins[idx]+=count;
    if(bins[idx]>binMax)binMax=bins[idx];
  });

  /* Current range (default: full span) */
  const curLo=S.mapYearRange?S.mapYearRange[0]:minY;
  const curHi=S.mapYearRange?S.mapYearRange[1]:maxY;

  histEl.innerHTML=bins.map((v,i)=>{
    const h=binMax>0?Math.max(2,Math.round(v/binMax*28)):2;
    const binStart=Math.round(minY+i*binSize);
    const binEnd=Math.round(minY+(i+1)*binSize)-1;
    const active=(binStart>=curLo&&binEnd<=curHi)?'active':'';
    return`<div class="mt-hist-bar ${active}" style="height:${h}px" title="${binStart}–${binEnd}: ${v}"></div>`;
  }).join('');

  /* Position thumbs */
  const rangeEl=$('#mtRange');
  const fillEl=$('#mtFill');
  const loEl=$('#mtLo');
  const hiEl=$('#mtHi');
  const sliderEl=$('#mtSlider');

  rangeEl.textContent=`${curLo} – ${curHi}`;
  const pctLo=(curLo-minY)/span*100;
  const pctHi=(curHi-minY+1)/span*100;
  fillEl.style.left=pctLo+'%';fillEl.style.width=(pctHi-pctLo)+'%';
  loEl.style.left=pctLo+'%';
  hiEl.style.left=pctHi+'%';

  /* Drag handler */
  function makeDrag(thumb,isHi){
    let dragging=false;
    const onMove=ev=>{
      if(!dragging)return;
      const rect=sliderEl.getBoundingClientRect();
      const pct=Math.max(0,Math.min(1,(ev.clientX-rect.left)/rect.width));
      let yr=Math.round(minY+pct*span);
      yr=Math.max(minY,Math.min(maxY,yr));
      if(isHi){
        if(yr<=curLo)yr=curLo+1;
        S.mapYearRange=[curLo,yr];
      }else{
        if(yr>=curHi)yr=curHi-1;
        S.mapYearRange=[yr,curHi];
      }
      updateTemporalSlider();addMarkers();updateMapInfo();
    };
    const onUp=()=>{dragging=false;document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp)};
    thumb.addEventListener('pointerdown',ev=>{ev.preventDefault();dragging=true;document.addEventListener('pointermove',onMove);document.addEventListener('pointerup',onUp)});
  }
  /* Remove old listeners by cloning */
  const newLo=loEl.cloneNode(true);loEl.parentNode.replaceChild(newLo,loEl);
  const newHi=hiEl.cloneNode(true);hiEl.parentNode.replaceChild(newHi,hiEl);
  makeDrag(newLo,false);makeDrag(newHi,true);

  /* Double-click histogram to reset */
  histEl.ondblclick=()=>{S.mapYearRange=null;updateTemporalSlider();addMarkers();updateMapInfo()};
}
