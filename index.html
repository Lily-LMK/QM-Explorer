/* Auto-populate _genericVernSet with family-level _localVern values.
   GBIF often returns family-level common names (e.g. "Scarab Beetles") as the
   vernacularName for genus-level records.  Without this, classifyBackboneVern
   and isGenericVern treat them as species-specific (they contain a space) and
   the subfamily/tribe lookup ("dung beetle") never gets a chance to run.
   Only family-level keys (-idae) and above are added; subfamily (-inae) and
   tribe (-ini) names like "dung beetle" remain accepted.
   Also extracts STEM WORDS from compound names: "scarab beetle" → adds "scarab"
   so that ALA backbone names like "Scarabs" are correctly classified as generic. */
(()=>{
  const _singRe=[/ies$/,/ves$/,/(?<!s)s$/];
  const _singRep=['y','f',''];
  const sing=s=>{let r=s;for(let i=0;i<_singRe.length;i++){const n=r.replace(_singRe[i],_singRep[i]);if(n!==r)return n}return r};
  const addWithVariants=(w)=>{
    _genericVernSet.add(w);
    if(w.endsWith('y'))_genericVernSet.add(w.slice(0,-1)+'ies');
    else if(w.endsWith('f'))_genericVernSet.add(w.slice(0,-1)+'ves');
    else _genericVernSet.add(w+'s');
    const s=sing(w);if(s!==w)_genericVernSet.add(s);
  };
  for(const [taxon,name] of Object.entries(_localVern)){
    if(!/(?:idae|oidea)$/i.test(taxon))continue;
    const lo=name.toLowerCase();
    addWithVariants(lo);
    /* Stem extraction: for "scarab beetle", "longhorn beetle", "jewel beetle" etc.
       add the prefix word(s) when the last word is already a known base animal word.
       This catches ALA backbone names like "Scarabs" (truncated family names). */
    const words=lo.split(/\s+/);
    if(words.length>=2&&_genericVernSet.has(words[words.length-1])){
      const stem=words.slice(0,-1).join(' ');
      if(stem.length>2)addWithVariants(stem);
    }
  }
})();

/* Names so generic they should never display (kingdom/phylum level) */
const _uselessVernSet=new Set([
  'animal','animals','plant','plants','fungus','fungi','alga','algae','protist','protists',
  'organism','organisms','invertebrate','invertebrates','vertebrate','vertebrates',
]);
/* Names too generic to be useful — single-word generics use the comprehensive set,
   kingdom-level words are always blocked regardless of word count */
function isGenericVern(name){
  if(!name)return true;
  const lo=name.trim().toLowerCase();
  if(_uselessVernSet.has(lo))return true; /* kingdom-level: always block */
  if(_genericVernSet.has(lo))return true;
  const sing=lo.replace(/ies$/,'y').replace(/ves$/,'f').replace(/men$/,'man').replace(/(?<!s)s$/,'');
  return(sing!==lo&&_genericVernSet.has(sing));
}

/* Shared lookup: try GBIF first, then iNaturalist, then local fallback.
   Returns {name:string}|null — never returns names in the generic blocklist */
async function lookupVern(rawTerm){
  const term=cleanTaxonTerm(rawTerm);
  if(!term)return null;
  /* Local dictionary first — instant, no network. Curated: always trust. */
  const lo=term.toLowerCase();
  if(_localVern[lo])return{name:_localVern[lo]};
  let gbifName=null;
  /* GBIF: match → vernacularNames */
  try{
    const mr=await cachedFetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(term)}&strict=true`);
    if(mr.ok){
      const md=await mr.json();
      /* Reject kingdom-level matches for non-kingdom queries */
      if(md.usageKey&&md.rank!=='KINGDOM'&&md.rank!=='PHYLUM'){
        const vr=await cachedFetch(`https://api.gbif.org/v1/species/${md.usageKey}/vernacularNames?limit=100`);
        if(vr.ok){
          const vd=await vr.json();
          const names=(vd.results||[]).filter(v=>v.language==='eng'||v.language==='en');
          const au=names.find(v=>/australia/i.test(v.source||'')||/australia/i.test(v.sourceTaxonKey||''));
          const best=au||names[0];
          if(best?.vernacularName&&!isGenericVern(best.vernacularName)){
            gbifName=best.vernacularName;
            if(gbifName.includes(' '))return{name:gbifName};
          }
        }
      }
    }
  }catch(e){}
  /* iNaturalist */
  try{
    const ir=await cachedFetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(term)}&per_page=5`);
    if(ir.ok){
      const id=await ir.json();
      const tLo=term.toLowerCase();
      const hit=(id.results||[]).find(t=>(t.name||'').toLowerCase()===tLo);
      if(hit?.preferred_common_name&&!isGenericVern(hit.preferred_common_name))return{name:hit.preferred_common_name};
      const close=(id.results||[]).find(t=>t.preferred_common_name&&!isGenericVern(t.preferred_common_name)&&(t.name||'').toLowerCase().startsWith(tLo.split(' ')[0]));
      if(close?.preferred_common_name)return{name:close.preferred_common_name};
    }
  }catch(e){}
  if(gbifName)return{name:gbifName};
  return null;
}

/* Fast lookup for batch use — cost-aware per rank.
   Species: GBIF match field only (1 call). Species-specific iNat happens in modal.
   Genus: GBIF match + vernacularNames + iNat (2-3 calls, few unique, high coverage).
   Family: GBIF match + vernacularNames (2 calls, no iNat — few unique, good GBIF data).
   Order+: _localVern only (0 calls — dictionary sufficient).
   Returns {name:string}|null — never returns names in the generic blocklist */
/* Cache GBIF usageKeys for subfamily/tribe resolution later */
const _gbifKeyCache=new Map();
async function lookupVernFast(rawTerm,rank){
  const term=cleanTaxonTerm(rawTerm);
  if(!term)return null;
  /* Local dictionary first — instant. Curated: always trust. */
  const lo=term.toLowerCase();
  if(_localVern[lo])return{name:_localVern[lo]};
  /* Order, class, other: _localVern only — no API calls */
  if(rank!=='species'&&rank!=='genus'&&rank!=='family'&&rank!=='superfamily'&&rank!=='subfamily'&&rank!=='tribe')return null;
  try{
    const mr=await cachedFetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(term)}&strict=true&verbose=true`);
    if(!mr.ok)return null;
    const md=await mr.json();
    if(!md.usageKey||md.rank==='KINGDOM'||md.rank==='PHYLUM')return null;
    /* Cache the usageKey for genus lookups — used later in subfamily resolution */
    if(rank==='genus')_gbifKeyCache.set(lo,md.usageKey);

    if(rank==='species'){
      /* Species: single GBIF field check only — cheap and fast */
      if(md.vernacularName&&!isGenericVern(md.vernacularName))return{name:md.vernacularName};
      return null;
    }

    /* Genus & Family (including superfamily/subfamily/tribe): GBIF vernacularNames */
    let gbifFallback=null;
    if(md.vernacularName&&!isGenericVern(md.vernacularName)){
      if(md.vernacularName.includes(' '))return{name:md.vernacularName};
      gbifFallback=md.vernacularName;
    }
    /* Fire vernacularNames and iNat in parallel for genus (saves ~200ms) */
    const vernProm=cachedFetch(`https://api.gbif.org/v1/species/${md.usageKey}/vernacularNames?limit=50`).then(r=>r.ok?r.json():null).catch(()=>null);
    const inatProm=(rank==='genus')?cachedFetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(term)}&per_page=3`).then(r=>r.ok?r.json():null).catch(()=>null):Promise.resolve(null);
    const [vd,id]=await Promise.all([vernProm,inatProm]);
    if(vd){
      const names=(vd.results||[]).filter(v=>v.language==='eng'||v.language==='en');
      const au=names.find(v=>/australia/i.test(v.source||''));
      const best=au||names[0];
      if(best?.vernacularName&&!isGenericVern(best.vernacularName)){
        if(best.vernacularName.includes(' '))return{name:best.vernacularName};
        if(!gbifFallback)gbifFallback=best.vernacularName;
      }
    }
    if(id){
      const hit=(id.results||[]).find(t=>(t.name||'').toLowerCase()===lo);
      if(hit?.preferred_common_name&&!isGenericVern(hit.preferred_common_name))return{name:hit.preferred_common_name};
    }
    if(gbifFallback)return{name:gbifFallback};
  }catch(e){}
  return null;
}

/* Resolve a genus to its subfamily/tribe common name.
   PRIMARY: iNaturalist — search for genus, then fetch /taxa/{id} for full ancestor chain.
   FALLBACK: GBIF /species/{key}/parents + _localVern dictionary.
   Returns {name:string,rank:string}|null */
const _subTribeCache=new Map();
async function lookupSubfamilyVern(genusName){
  const ck=cleanTaxonTerm(genusName);
  if(!ck)return null;
  const lo=ck.toLowerCase();
  if(_subTribeCache.has(lo))return _subTribeCache.get(lo);

  /* ── iNaturalist: search → get ID → fetch /taxa/{id} for full ancestors ── */
  try{
    const ir=await cachedFetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(ck)}&rank=genus&per_page=3`);
    if(ir.ok){
      const id=await ir.json();
      const hit=(id.results||[]).find(t=>(t.name||'').toLowerCase()===lo&&t.rank==='genus');
      if(hit?.id){
        /* Fetch full taxon details — search results may not include ancestors */
        const tr=await cachedFetch(`https://api.inaturalist.org/v1/taxa/${hit.id}`);
        if(tr.ok){
          const td=await tr.json();
          const taxon=(td.results||[])[0];
          if(taxon?.ancestors?.length){
            let tribe=null,subfamily=null,tribeName=null,subfamName=null;
            for(const a of taxon.ancestors){
              const rk=(a.rank||'').toLowerCase();
              const cn=(a.name||'').toLowerCase();
              const cn_common=a.preferred_common_name||'';
              if(rk==='tribe'&&cn){tribe=cn;tribeName=cn_common}
              if(rk==='subfamily'&&cn){subfamily=cn;subfamName=cn_common}
            }
            /* Prefer _localVern (curated); fall back to iNat common name */
            if(tribe){
              const name=_localVern[tribe]||(tribeName&&tribeName.includes(' ')&&!isGenericVern(tribeName)?tribeName:null);
              if(name){const r={name,rank:'tribe'};_subTribeCache.set(lo,r);return r;}
            }
            if(subfamily){
              const name=_localVern[subfamily]||(subfamName&&subfamName.includes(' ')&&!isGenericVern(subfamName)?subfamName:null);
              if(name){const r={name,rank:'subfamily'};_subTribeCache.set(lo,r);return r;}
            }
          }else{
          }
        }
      }
    }
  }catch(e){console.warn('[Vern] iNat failed for',ck,e)}

  /* ── GBIF fallback: match → /parents → _localVern ── */
  try{
    let key=_gbifKeyCache.get(lo);
    if(!key){
      const mr=await cachedFetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(ck)}&strict=true`);
      if(!mr.ok){console.warn('[Vern] GBIF match failed for',ck,mr.status);_subTribeCache.set(lo,null);return null}
      const md=await mr.json();
      if(!md.usageKey){_subTribeCache.set(lo,null);return null}
      key=md.usageKey;_gbifKeyCache.set(lo,key);
    }
    const pr=await cachedFetch(`https://api.gbif.org/v1/species/${key}/parents`);
    if(!pr.ok){console.warn('[Vern] GBIF /parents failed for',ck,pr.status);_subTribeCache.set(lo,null);return null}
    const parents=await pr.json();
    let tribe=null,subfamily=null;
    for(const p of parents){
      const r=(p.rank||'').toUpperCase();
      const cn=(p.canonicalName||p.scientificName||'').toLowerCase();
      if(r==='TRIBE'&&cn)tribe=cn;
      if(r==='SUBFAMILY'&&cn)subfamily=cn;
    }
    if(tribe&&_localVern[tribe]){
      const r={name:_localVern[tribe],rank:'tribe'};_subTribeCache.set(lo,r);return r;
    }
    if(subfamily&&_localVern[subfamily]){
      const r={name:_localVern[subfamily],rank:'subfamily'};_subTribeCache.set(lo,r);return r;
    }
  }catch(e){console.warn('[Vern] GBIF failed for',ck,e)}

  _subTribeCache.set(lo,null);return null;
}

/* Should the modal try to find a better common name? Yes if:
   - no name at all, or generic backbone name (e.g. "Ant"), or
   - name is from family/order/class rank — the thorough modal lookup
     (full GBIF + iNat at species & genus level) might find something
     more specific like "inland wattle cicada" instead of "cicada". */
const _highRanks=new Set(['subfamily','tribe','family','order','class','other']);
function vernNeedsEnrich(r){
  if(!r.vern)return true;
  if(r.vernRank==='generic')return true;
  return _highRanks.has(r.vernRank);
}

async function fetchVernacular(r){
  /* Skip if we already have a species/genus-level name */
  if(r.vern&&!vernNeedsEnrich(r))return;
  const reEnrich=!!r.vern&&_highRanks.has(r.vernRank);
  /* Rank ordering for "is this better than what we have?" */
  const _rankOrder={species:0,genus:1,tribe:1.5,subfamily:1.7,family:2,order:3,class:4,other:5};
  const curRankIdx=r.vernRank?(_rankOrder[r.vernRank]??5):5;
  const termRanks=[[r.species,'species'],[r.genus,'genus'],[r.family,'family'],[r.superfamily,'superfamily'],[r.order,'order'],[r.class_,'class']].filter(([v])=>v);
  /* For higher-rank-only records, also try the sci name if it's not already in the list */
  const sciVal=r.sci||'';
  const termNames=termRanks.map(([v])=>v);
  if(sciVal&&!termNames.includes(sciVal)){
    const sciRank=!sciVal.includes(' ')?'other':'species';
    termRanks.push([sciVal,sciRank]);
  }
  for(const [term,rank] of termRanks){
    const rankIdx=_rankOrder[rank]??5;
    /* When re-enriching, skip ranks at or above what we already have */
    if(reEnrich&&rankIdx>=curRankIdx)continue;
    const cacheKey=cleanTaxonTerm(term);
    /* When re-enriching, ignore batch cache misses (null) — the batch used
       lookupVernFast which is less thorough. Fresh lookupVern may succeed. */
    if(_vernCache.has(cacheKey)){
      const cached=_vernCache.get(cacheKey);
      if(cached){applyVern(r,cached,term,rank);return}
      if(!reEnrich)continue; // trust cache miss only on first pass
    }
    const result=await lookupVern(term);
    if(result){
      /* For genus: if we only got a single-word name (e.g. "Scarabs" from GBIF),
         try tribe/subfamily climb first — "dung beetle" is more informative than
         a family-stem word. Only accept the single-word name as last resort. */
      if(rank==='genus'&&r.genus&&!result.name.includes(' ')){
        const subResult=await lookupSubfamilyVern(r.genus);
        if(subResult&&(_rankOrder[subResult.rank]??5)<(_rankOrder[rank]??5)){
          _vernCache.set(cacheKey,result.name); /* cache genus result for other uses */
          applyVern(r,subResult.name,r.genus,subResult.rank);
          return;
        }
      }
      _vernCache.set(cacheKey,result.name);
      applyVern(r,result.name,term,rank);
      return;
    }
    _vernCache.set(cacheKey,null);
    /* After genus fails entirely, try subfamily/tribe via GBIF classification chain.
       Resolves e.g. Scarabaeinae → "dung beetle" for genera where GBIF has no name at all. */
    if(rank==='genus'&&r.genus){
      const subResult=await lookupSubfamilyVern(r.genus);
      if(subResult&&(_rankOrder[subResult.rank]??5)<curRankIdx){
        applyVern(r,subResult.name,r.genus,subResult.rank);
        return;
      }
    }
  }
}
function applyVern(r,name,fromTerm,fromRank){
  /* Only set if modal is still showing this record */
  const sci=r.species||r.genus||'';
  const suffix=(fromTerm!==sci&&fromTerm!==r.species)?` <span style="color:var(--muted);font-size:11px">(${esc(fromTerm)})</span>`:'';
  r.vern=name;
  r.vernRank=fromRank||null;
  const el=$('#mCom');
  if(el&&S.modalIdx>=0)el.innerHTML=esc(singularize(name))+suffix;
  /* Update gallery card common name — only if specific enough */
  try{
    const idx=S.res.indexOf(r);
    if(idx>=0&&isVernWorthShowing(r)){
      const card=document.querySelector(`.card[data-i="${idx}"]`);
      if(card){const com=card.querySelector('.card-com');if(com)com.textContent=singularize(name)}
    }
  }catch(e){}
}

/* Batch-fetch vernacular names for gallery cards.
   Priority: species → genus+subfamily (two-phase) → family → superfamily → order → class.
   Genus pass: Phase A = GBIF match → vernNames+iNat parallel (~400ms).
   Phase B (only if A fails) = /parents → _localVern subfamily check (~200ms).
   Wave size 8 for genus lookups. */
let _batchVernId=0;
async function batchFetchVernaculars(records){
  const batchId=++_batchVernId;
  const hasGoodVern=(r)=>r.vern&&isVernWorthShowing(r);
  const WAVE=4;
  
  /* Pass 0: apply cached names — ONLY species and genus level.
     Family+ must NOT be applied here because it would prevent more specific
     passes (genus, tribe/subfamily) from running for those records. */
  records.forEach((r,i)=>{
    if(hasGoodVern(r))return;
    for(const [term,rank] of [[r.species,'species'],[r.genus,'genus']]){
      if(!term)continue;
      const ck=cleanTaxonTerm(term);
      if(_vernCache.has(ck)){
        const cached=_vernCache.get(ck);
        if(cached){r.vern=cached;r.vernRank=rank;updateCardVern(i,cached);if(hasGoodVern(r))return}
        continue;
      }
    }
  });
  
  /* Helper: fetch a set of terms in waves, apply results */
  const _yieldFrame=()=>new Promise(r=>requestAnimationFrame(()=>setTimeout(r,0)));
  async function fetchLevel(field,rank,waveSize){
    if(_batchVernId!==batchId)return;
    const termMap=new Map();
    records.forEach((r,i)=>{
      if(hasGoodVern(r))return;
      const raw=r[field];if(!raw)return;
      const ck=cleanTaxonTerm(raw);if(!ck||_vernCache.has(ck))return;
      if(!termMap.has(ck))termMap.set(ck,{raw,indices:[]});
      termMap.get(ck).indices.push(i);
    });
    const terms=[...termMap.keys()];
    const ws=waveSize||WAVE;
    for(let w=0;w<terms.length;w+=ws){
      if(_batchVernId!==batchId)return;
      if(w>0)await _yieldFrame(); /* yield to main thread between waves */
      await Promise.all(terms.slice(w,w+ws).map(async ck=>{
        const entry=termMap.get(ck);
        const result=await lookupVernFast(entry.raw,rank);
        if(result){
          _vernCache.set(ck,result.name);
          entry.indices.forEach(idx=>{
            if(_batchVernId!==batchId)return;
            const rec=S.res[idx];
            if(rec&&!hasGoodVern(rec)){rec.vern=result.name;rec.vernRank=rank;updateCardVern(idx,result.name)}
          });
        }else{_vernCache.set(ck,null)}
      }));
    }
    /* Propagate newly cached names to remaining records at this level */
    records.forEach((r,i)=>{
      if(hasGoodVern(r))return;
      const raw=r[field];if(!raw)return;
      const ck=cleanTaxonTerm(raw);
      const cached=_vernCache.get(ck);
      if(cached){r.vern=cached;r.vernRank=rank;updateCardVern(i,cached)}
    });
  }
  
  /* Pass 1: SPECIES — cheapest (1 GBIF call), most specific, fire in big waves */
  await fetchLevel('species','species',20);

  /* Pass 2: GENUS + SUBFAMILY — two-phase lookup per genus.
     Phase A: GBIF match(200ms) → vernNames+iNat parallel(200ms) = 400ms
     Phase B (only if A fails): /parents(200ms) → _localVern subfamily check
     Wave size 8 for genus (each lookup is lightweight: 2-3 parallel fetches). */
  if(_batchVernId===batchId){
    const GEN_WAVE=8;
    const genusMap=new Map();
    records.forEach((r,i)=>{
      if(hasGoodVern(r))return;
      const g=r.genus;if(!g)return;
      const ck=cleanTaxonTerm(g);if(!ck)return;
      if(!genusMap.has(ck))genusMap.set(ck,{raw:g,indices:[]});
      genusMap.get(ck).indices.push(i);
    });
    const genusTerms=[...genusMap.keys()];
    for(let w=0;w<genusTerms.length;w+=GEN_WAVE){
      if(_batchVernId!==batchId)return;
      if(w>0)await _yieldFrame();
      await Promise.all(genusTerms.slice(w,w+GEN_WAVE).map(async gk=>{
        const entry=genusMap.get(gk);
        const applyToAll=(name,rank)=>{
          entry.indices.forEach(idx=>{
            if(_batchVernId!==batchId)return;
            const rec=S.res[idx];
            if(rec&&!hasGoodVern(rec)){rec.vern=name;rec.vernRank=rank;updateCardVern(idx,name)}
          });
        };
        /* Check caches first */
        if(_vernCache.has(gk)){
          const cached=_vernCache.get(gk);
          if(cached){applyToAll(cached,'genus');return}
        }
        const lo=gk.toLowerCase();
        if(_subTribeCache.has(lo)){
          const cached=_subTribeCache.get(lo);
          if(cached){applyToAll(cached.name,cached.rank);return}
        }
        if(_localVern[lo]){applyToAll(_localVern[lo],'genus');return}

        /* ── Phase A: Try GBIF match + iNat in parallel. GBIF failure must NOT block iNat. ── */
        let usageKey=_gbifKeyCache.get(lo);
        let gbifMatchOk=!!usageKey;

        /* Step 1: Try GBIF match (non-blocking — failure is OK) */
        if(!usageKey){
          try{
            const mr=await cachedFetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(entry.raw)}&strict=true&verbose=true`);
            if(mr.ok){
              const md=await mr.json();
              if(md.usageKey&&md.rank!=='KINGDOM'&&md.rank!=='PHYLUM'){
                usageKey=md.usageKey;
                _gbifKeyCache.set(lo,usageKey);
                gbifMatchOk=true;
                if(md.vernacularName&&md.vernacularName.includes(' ')&&!isGenericVern(md.vernacularName)){
                  _vernCache.set(gk,md.vernacularName);
                  applyToAll(md.vernacularName,'genus');return;
                }
              }
            }else{console.warn(`[Vern] GBIF match FAILED for ${entry.raw}: ${mr.status}`)}
          }catch(e){console.warn('[Vern] GBIF match error for',entry.raw,e.message||e)}
        }

        /* Step 2: GBIF vernacularNames (if we have a key) + iNat genus lookup — parallel */
        const [vernData,inatData]=await Promise.all([
          gbifMatchOk?cachedFetch(`https://api.gbif.org/v1/species/${usageKey}/vernacularNames?limit=50`).then(r=>r.ok?r.json():null).catch(()=>null):Promise.resolve(null),
          cachedFetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(entry.raw)}&rank=genus&per_page=3`).then(r=>r.ok?r.json():null).catch(()=>null)
        ]);

        /* Check GBIF vernacular names */
        let gbifFallback=null;
        if(vernData){
          const names=(vernData.results||[]).filter(v=>v.language==='eng'||v.language==='en');
          const au=names.find(v=>/australia/i.test(v.source||''));
          const best=au||names[0];
          if(best?.vernacularName&&!isGenericVern(best.vernacularName)){
            if(best.vernacularName.includes(' ')){
              _vernCache.set(gk,best.vernacularName);
              applyToAll(best.vernacularName,'genus');return;
            }
            gbifFallback=best.vernacularName;
          }
        }

        /* Check iNat genus-level common name */
        let inatTaxonId=null;
        if(inatData){
          const hit=(inatData.results||[]).find(t=>(t.name||'').toLowerCase()===lo&&t.rank==='genus');
          if(hit){
            inatTaxonId=hit.id;
            if(hit.preferred_common_name&&!isGenericVern(hit.preferred_common_name)){
              if(hit.preferred_common_name.includes(' ')){
                _vernCache.set(gk,hit.preferred_common_name);
                applyToAll(hit.preferred_common_name,'genus');return;
              }
              if(!gbifFallback)gbifFallback=hit.preferred_common_name;
            }
          }
        }

        /* ── Phase B: Climb to tribe/subfamily via iNat full taxon details ── */
        /* iNat search results may not include ancestors — fetch /v1/taxa/{id} for full chain */
        if(inatTaxonId){
          try{
            const tr=await cachedFetch(`https://api.inaturalist.org/v1/taxa/${inatTaxonId}`);
            if(tr.ok){
              const td=await tr.json();
              const taxon=(td.results||[])[0];
              if(taxon?.ancestors?.length){
                let tribe=null,subfamily=null,tribeName=null,subfamName=null;
                for(const a of taxon.ancestors){
                  const rk=(a.rank||'').toLowerCase();
                  const cn=(a.name||'').toLowerCase();
                  const ccn=a.preferred_common_name||'';
                  if(rk==='tribe'&&cn){tribe=cn;tribeName=ccn}
                  if(rk==='subfamily'&&cn){subfamily=cn;subfamName=ccn}
                }
                if(tribe){
                  const name=_localVern[tribe]||(tribeName&&tribeName.includes(' ')&&!isGenericVern(tribeName)?tribeName:null);
                  if(name){
                    const result={name,rank:'tribe'};
                    _subTribeCache.set(lo,result);applyToAll(name,'tribe');
                  }
                }
                if(subfamily){
                  const name=_localVern[subfamily]||(subfamName&&subfamName.includes(' ')&&!isGenericVern(subfamName)?subfamName:null);
                  if(name){
                    const result={name,rank:'subfamily'};
                    _subTribeCache.set(lo,result);applyToAll(name,'subfamily');
                  }
                }
              }
            }
          }catch(e){console.warn(`[Vern] iNat /taxa/${inatTaxonId} failed for ${entry.raw}:`,e.message||e)}
        }

        /* ── Phase B fallback: GBIF /parents → _localVern ── */
        if(gbifMatchOk&&usageKey){
          try{
            const pr=await cachedFetch(`https://api.gbif.org/v1/species/${usageKey}/parents`);
            if(pr.ok){
              const parents=await pr.json();
              let tribe=null,subfamily=null;
              for(const p of parents){
                const r=(p.rank||'').toUpperCase();
                const cn=(p.canonicalName||p.scientificName||'').toLowerCase();
                if(r==='TRIBE'&&cn)tribe=cn;
                if(r==='SUBFAMILY'&&cn)subfamily=cn;
              }
              if(tribe&&_localVern[tribe]){
                const result={name:_localVern[tribe],rank:'tribe'};
                _subTribeCache.set(lo,result);applyToAll(result.name,'tribe');
              }
              if(subfamily&&_localVern[subfamily]){
                const result={name:_localVern[subfamily],rank:'subfamily'};
                _subTribeCache.set(lo,result);applyToAll(result.name,'subfamily');
              }
            }
          }catch(e){console.warn(`[Vern] GBIF /parents failed for ${entry.raw}:`,e.message||e)}
        }
        /* Phase B found nothing — accept single-word GBIF fallback if we have one */
        if(gbifFallback){_vernCache.set(gk,gbifFallback);applyToAll(gbifFallback,'genus');return}
        _subTribeCache.set(lo,null);
        _vernCache.set(gk,null);
      }));
    }
    records.forEach((r,i)=>{
      if(hasGoodVern(r))return;
      const g=r.genus;if(!g)return;
      const ck=cleanTaxonTerm(g);
      const cached=_vernCache.get(ck);
      if(cached){r.vern=cached;r.vernRank='genus';updateCardVern(i,cached)}
    });
  }
  
  /* Pass 3: FAMILY — GBIF (2 calls each) */
  await fetchLevel('family','family');
  /* Pass 4: SUPERFAMILY — GBIF */
  await fetchLevel('superfamily','family');
  /* Pass 5-6: ORDER, CLASS — _localVern only (0 API calls), instant */
  await fetchLevel('order','order');
  await fetchLevel('class_','class');
  
  /* Final: sci name for unusual-rank records */
  if(_batchVernId!==batchId)return;
  const sciMap=new Map();
  records.forEach((r,i)=>{
    if(hasGoodVern(r)||!r.sci)return;
    const ck=cleanTaxonTerm(r.sci);
    if(!ck||_vernCache.has(ck))return;
    if(!sciMap.has(ck))sciMap.set(ck,{raw:r.sci,indices:[]});
    sciMap.get(ck).indices.push(i);
  });
  const sciTerms=[...sciMap.keys()];
  for(let w=0;w<sciTerms.length;w+=WAVE){
    if(_batchVernId!==batchId)return;
    await Promise.all(sciTerms.slice(w,w+WAVE).map(async ck=>{
      const entry=sciMap.get(ck);
      const result=await lookupVernFast(entry.raw,'other');
      if(result){
        _vernCache.set(ck,result.name);
        entry.indices.forEach(idx=>{
          if(_batchVernId!==batchId)return;
          const rec=S.res[idx];
          if(rec&&!hasGoodVern(rec)){rec.vern=result.name;rec.vernRank='other';updateCardVern(idx,result.name)}
        });
      }else{_vernCache.set(ck,null)}
    }));
  }
  records.forEach((r,i)=>{
    if(hasGoodVern(r)||!r.sci)return;
    const ck=cleanTaxonTerm(r.sci);
    const cached=_vernCache.get(ck);
    if(cached){r.vern=cached;r.vernRank='other';updateCardVern(i,cached)}
  });
}
function updateCardVern(idx,name){
  const rec=S.res[idx];
  if(!rec)return;
  const show=isVernWorthShowing(rec)?singularize(name):'';
  const card=document.querySelector(`#gal .card[data-i="${idx}"]`);
  if(!card)return;
  let com=card.querySelector('.card-com');
  if(show){
    if(!com){com=document.createElement('div');com.className='card-com';const fam=card.querySelector('.card-fam');const det=card.querySelector('.card-det');const before=fam||det;if(before)card.querySelector('.card-body').insertBefore(com,before)}
    com.textContent=show;
  }else if(com){com.remove()}
}

/* Fetch authorship from GBIF species match API */
const _authCache=new Map();
async function fetchAuthorship(r,idx){
  const name=r.species||r.genus||r.sci;
  if(!name)return;
  if(_authCache.has(name)){
    const a=_authCache.get(name);
    if(a){r.authorship=a;updateAuthDisplay(r,idx)}
    return;
  }
  try{
    const resp=await cachedFetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(name)}&strict=true`);
    if(!resp.ok){_authCache.set(name,null);return}
    const d=await resp.json();
    /* GBIF returns scientificName with authorship embedded, plus separate authorship field on some */
    let auth='';
    if(d.authorship)auth=d.authorship;
    else if(d.scientificName&&d.canonicalName){
      /* authorship = scientificName minus canonicalName */
      auth=d.scientificName.replace(d.canonicalName,'').trim();
    }
    else if(d.scientificName)auth=extractAuth(d.scientificName,'');
    if(auth){
      _authCache.set(name,auth);
      r.authorship=auth;
      updateAuthDisplay(r,idx);
    }else{
      _authCache.set(name,null);
    }
  }catch(e){_authCache.set(name,null)}
}
function updateAuthDisplay(r,idx){
  if(S.modalIdx!==idx)return;
  /* Update auth line in modal */
  const det=$('#mDetails');
  if(det){
    const existing=det.querySelector('.auth-line');
    if(!existing){
      const chips=det.querySelector('.tax-chips');
      if(chips){
        const div=document.createElement('div');div.className='auth-line';div.innerHTML=`<em>${esc(r.authorship)}</em>`;
        chips.parentElement.insertBefore(div,chips);
      }
    }else{
      existing.innerHTML=`<em>${esc(r.authorship)}</em>`;
    }
  }
  /* Update gallery card */
  try{updateGalleryCard(idx,r)}catch(e){}
}

/* ═════════════════════════════════════════════════
   METADATA — title / caption / keywords for LR-style copy
   ═════════════════════════════════════════════════ */

function humanDate(r){
  const ds=fmtDate(r);if(!ds)return'';
  /* "27 Dec 1976" → "27 December 1976" — expand month abbreviations */
  const months={Jan:'January',Feb:'February',Mar:'March',Apr:'April',May:'May',Jun:'June',Jul:'July',Aug:'August',Sep:'September',Sept:'September',Oct:'October',Nov:'November',Dec:'December'};
  const m=ds.match(/^(\d{1,2})\s+(\w+)\s+(\d{4})$/);
  if(m){const mo=months[m[2]]||m[2];return`${parseInt(m[1])} ${mo} ${m[3]}`}
  /* "Dec 1976" or "1976" — return as-is */
  return ds;
}

const _orderNoun={Lepidoptera:'moth',Coleoptera:'beetle',Diptera:'fly',Odonata:'dragonfly',Hemiptera:'true bug',Orthoptera:'katydid',Hymenoptera:'hymenopteran',Araneae:'spider',Blattodea:'cockroach',Mantodea:'mantid',Phasmatodea:'stick insect',Neuroptera:'lacewing',Trichoptera:'caddisfly',Ephemeroptera:'mayfly',Plecoptera:'stonefly',Decapoda:'crustacean',Squamata:'reptile',Anura:'frog',Passeriformes:'passerine bird',Chiroptera:'bat',Rodentia:'rodent',Testudines:'turtle',Crocodilia:'crocodilian'};

function familyAdj(fam){
  if(!fam)return'';const f=fam.trim();const lo=f.toLowerCase();
  if(lo.endsWith('idae')){let s=f.slice(0,-4);if(s.endsWith('a'))s=s.slice(0,-1);return s.toLowerCase()+'id'}
  if(lo.endsWith('inae')){let s=f.slice(0,-4);if(s.endsWith('a'))s=s.slice(0,-1);return s.toLowerCase()+'ine'}
  return lo;
}

/* Singularize a common name for specimen-level display.
   APIs return group names ("Fruit Flies", "Spiny Ants") but we're labelling
   individual specimens. Handles common English plural patterns. */
function singularize(name){
  if(!name)return name;
  const w=name.trim().split(/\s+/);
  const last=w[w.length-1];
  const lo=last.toLowerCase();
  /* Irregular plurals */
  const irreg={mice:'Mouse',lice:'Louse',geese:'Goose',oxen:'Ox',teeth:'Tooth',feet:'Foot',children:'Child',cacti:'Cactus',fungi:'Fungus',octopi:'Octopus',harvestmen:'Harvestman'};
  if(irreg[lo]){w[w.length-1]=matchCase(last,irreg[lo]);return w.join(' ')}
  /* "-men" → "-man" (e.g. Horsemen→Horseman) — after irregulars checked */
  if(lo.endsWith('men')&&lo.length>3){w[w.length-1]=matchCase(last,last.slice(0,-2)+'an');return w.join(' ')}
  /* Don't singularize words that aren't plural or are ambiguous */
  if(lo.length<=2||lo.endsWith('ss')||lo.endsWith('us')||lo.endsWith('is'))return name;
  /* "-flies" → "-fly", "-ies" → "-y" (butterflies, dragonflies, fruit flies) */
  if(lo.endsWith('flies')){w[w.length-1]=matchCase(last,last.slice(0,-4)+'ly');return w.join(' ')}
  if(lo.endsWith('ies')&&lo.length>4){w[w.length-1]=matchCase(last,last.slice(0,-3)+'y');return w.join(' ')}
  /* "-ves" → "-f" / "-fe" (wolves→wolf, knives→knife) — rare in taxon names but safe */
  if(lo.endsWith('ves')){w[w.length-1]=matchCase(last,last.slice(0,-3)+'f');return w.join(' ')}
  /* "-shes"/"-ches"/"-xes"/"-zzes" → drop "-es" (cockroaches, foxes, bushes) */
  if(/(?:sh|ch|x|zz)es$/i.test(last)){w[w.length-1]=matchCase(last,last.slice(0,-2));return w.join(' ')}
  /* "-s" → drop it (ants→ant, spiders→spider, beetles→beetle) */
  if(lo.endsWith('s')&&!lo.endsWith('ss')){w[w.length-1]=matchCase(last,last.slice(0,-1));return w.join(' ')}
  return name;
}
function matchCase(orig,repl){
  if(!orig||!repl)return repl;
  if(orig===orig.toUpperCase())return repl.toUpperCase();
  if(orig[0]===orig[0].toUpperCase())return repl[0].toUpperCase()+repl.slice(1);
  return repl.toLowerCase();
}

function bookishDesc(r){
  /* Use common name as the descriptor only when it's truly specific to this taxon.
     Genus-level lookups often return family-level names ("ant" for Polyrhachis,
     "beetle" for Carabus) — these are useless as descriptors.
     Only species-level vern is reliable enough, OR multi-word genus-level names
     which tend to be genuinely specific ("golden orb weaver", "bull ant"). */
  if(r.vern&&isVernSpecificForCaption(r))return singularize(r.vern).toLowerCase();
  const fam=r.family||'';
  if(fam){const adj=familyAdj(fam);return adj||fam.toLowerCase()}
  /* Last resort: use vern even if generic (better than nothing when no family) */
  if(r.vern)return singularize(r.vern).toLowerCase();
  return'specimen';
}

/* Is the vernacular name specific enough to use as a caption/title descriptor? */
function isVernSpecificForCaption(r){
  if(!r.vern)return false;
  const rk=r.vernRank;
  if(rk==='species')return true;
  /* Genus-level: only if multi-word (e.g. "bull ant", "huntsman spider") */
  if(rk==='genus')return r.vern.trim().includes(' ');
  return false;
}

/* Is the vernacular name worth showing on a gallery card? More permissive than captions —
   shows family/order level names like "harvestman", "centipede", "stony coral". */
/* Names too vague for gallery cards — smaller than _genericVernSet which is for API filtering.
   These are kingdom/phylum/class-level names that tell the user nothing useful. Names like
   "harvestman", "centipede", "scorpion", "coral" ARE useful on cards even though they're
   single words, so they're NOT blocked here. */
const _cardBlockVern=new Set([
  'animal','animals','plant','plants','fungus','fungi','alga','algae','protist','protists',
  'insect','arachnid','crustacean','myriapod','mollusc','mollusk','echinoderm','cnidarian',
  'arthropod','chordate','vertebrate','invertebrate',
  'beetle','ant','bee','wasp','fly','moth','butterfly','spider','mite','tick','bug',
  'scarab','scarabs','longhorn','longhorns','stag','rove','jewel','leaf',
  'worm','fish','bird','mammal','reptile','amphibian',
  'coral or anemone','moth or butterfly','wasp, bee or ant','mite or tick','shark or ray',
  /* ALA plural / "and" variants */
  'corals and anemones','corals or anemones',
  'moths and butterflies','moths or butterflies',
  'wasps, bees and ants','wasps bees and ants',
  'mites and ticks','mites or ticks',
  'sharks and rays','sharks or rays',
  'insects','arachnids','crustaceans','myriapods','molluscs','echinoderms',
  'beetles','ants','bees','wasps','flies','moths','butterflies','spiders',
]);
function isVernWorthShowing(r){
  if(!r.vern)return false;
  if(r.vernRank==='generic')return false;
  const lo=r.vern.trim().toLowerCase();
  if(_cardBlockVern.has(lo))return false;
  const sing=lo.replace(/ies$/,'y').replace(/ves$/,'f').replace(/men$/,'man').replace(/(?<!s)s$/,'');
  return!(sing!==lo&&_cardBlockVern.has(sing));
}

function specTitle(r){
  const parts=[r.sci||'Unknown'];
  if(isVernSpecificForCaption(r))parts.push('('+singularize(r.vern)+')');
  if(r.cat)parts.push(r.cat);
  return parts.join(' ');
}

function specCaption(r){
  const sci=r.sci||'Unknown';
  const desc=bookishDesc(r);
  const hasType=isType(r.typeStatus);
  const typeLower=(r.typeStatus||'').toLowerCase();
  const sexVal=(r.sex||'').trim();

  /* Line 1:
     No type:   "Male canefield rat, Rattus sordidus J20062."
     With type: "Male holotype of the canefield rat, Rattus sordidus J20062." */
  let s1Parts=[];
  if(sexVal)s1Parts.push(sexVal.charAt(0).toUpperCase()+sexVal.slice(1).toLowerCase());
  if(hasType){
    s1Parts.push(typeLower);
    s1Parts.push('of the');
  }
  s1Parts.push(desc);
  let s1=s1Parts.join(' ');
  /* Capitalise first letter */
  s1=s1.charAt(0).toUpperCase()+s1.slice(1);
  s1+=`, ${sci}`;
  if(r.cat)s1+=` ${r.cat}`;
  s1+='.';

  /* Line 2: "Collected by G.B. Monteith via light trap, 17 September 1966." */
  const hd=humanDate(r);
  const l2=[];
  if(r.recBy)l2.push(`by ${r.recBy.replace(/\s*\|\s*/g,' and ')}`);
  if(r.samplingProtocol)l2.push(`via ${r.samplingProtocol.toLowerCase()}`);
  if(hd)l2.push(hd);
  let s2='';
  if(l2.length)s2=' Collected '+l2.join(', ')+'.';

  /* Line 3: "Bunya Mountains, Queensland, Australia." */
  const place=[r.locality,r.state,r.country].filter(Boolean).join(', ');
  let s3='';
  if(place)s3=' '+place+'.';

  /* Line 4: coords + elevation. Omit raw lat/lng when locality text already present. */
  let s4='';
  const coordParts=[];
  if(typeof r.lat==='number'&&typeof r.lng==='number'&&!place)coordParts.push(`${r.lat.toFixed(4)}, ${r.lng.toFixed(4)}`);
  if(typeof r.elevMin==='number'){
    const elev=typeof r.elevMax==='number'&&r.elevMax!==r.elevMin?`${r.elevMin}–${r.elevMax} m`:`${r.elevMin} m`;
    coordParts.push(elev);
  }
  if(coordParts.length)s4=' '+coordParts.join(', ')+'.';

  /* Line 5: "Brigalow Belt bioregion, South Burnett Regional. Country of the Wakka Wakka people." */
  let s5='';
  const sp=r._spatial;
  if(sp&&!sp.loading){
    const geo=[];
    if(sp.bioregion)geo.push(`${sp.bioregion} bioregion`);
    if(sp.lga)geo.push(sp.lga);
    if(geo.length)s5=' '+geo.join(', ')+'.';
    const rawPeople=sp.traditionalOwners||(sp.rntbc?sp.rntbc.replace(/\s*(Aboriginal|Torres Strait)?\s*(Corporation)?\s*R?N?T?B?C?\s*$/i,'').trim():null);
    const people=rawPeople?rawPeople.replace(/\s+(?:peoples?|nation)\s*$/i,'').trim():null;
    if(people)s5+=` Country of the ${people} people.`;
    if(sp.reDesc)s5+=` ${sp.reDesc}.`;
  }

  return s1+s2+s3+s4+s5;
}

function specKeywords(r){
  const parts=[r.phylum,r.class_,r.order,r.superfamily,r.family,r.genus,r.species,r.sci,r.vern?singularize(r.vern):null,r.cat,r.coll];
  /* Split locality into meaningful parts (comma-separated segments) */
  if(r.locality)r.locality.split(',').forEach(s=>{const t=s.trim();if(t&&t!==r.state&&t!==r.country)parts.push(t)});
  parts.push(r.state,r.country,r.typeStatus&&r.typeStatus.toLowerCase()!=='notatype'?r.typeStatus:null,r.samplingProtocol,r.preparations);
  // Spatial context keywords
  const sp=r._spatial;
  if(sp&&!sp.loading){
    const cleanPeople=(s)=>s?s.replace(/\s+(?:peoples?|nation)\s*$/i,'').trim():null;
    const people=cleanPeople(sp.traditionalOwners)||(sp.rntbc?cleanPeople(sp.rntbc.replace(/\s*(Aboriginal|Torres Strait)?\s*(Corporation)?\s*R?N?T?B?C?\s*$/i,'').trim()):null);
    parts.push(people,sp.bioregion,sp.subregion,sp.drainageBasin,sp.lga,sp.protectedArea,sp.reDesc,sp.reCode);
  }
  return[...new Set(parts.filter(Boolean))].join(', ');
}

function specSources(r){
  const lines=[];
  lines.push(`Specimen data: Atlas of Living Australia (ALA).`);
  const sp=r._spatial;
  if(sp&&!sp.loading){
    if(sp.traditionalOwners||sp.ntOutcome)lines.push('Native Title: National Native Title Tribunal, NNTT Custodial AGOL FeatureServer (Layers 0, 5, 8).');
    if(sp.traditionalOwners&&sp.ancestralName&&sp.curatedSource)lines.push('Ancestral place name: '+sp.curatedSource+'.');
    if(!sp.traditionalOwners&&sp.curatedOwner&&sp.curatedSource)lines.push('Traditional custodians: '+sp.curatedSource+'. Boundaries approximate.');
    else if(!sp.traditionalOwners&&sp.curatedOwner)lines.push('Traditional custodians: Curated from published acknowledgement-of-country sources. Boundaries approximate.');
    if(sp.bioregion)lines.push('Bioregion/Subregion: Queensland Government, AdminBoundariesFramework MapServer (Layers 2, 3).');
    if(sp.drainageBasin)lines.push('Drainage basin: Queensland Government, AdminBoundariesFramework MapServer (Layer 6).');
    if(sp.lga)lines.push('Local Government Area: Queensland Government, AdminBoundariesFramework MapServer (Layer 11).');
    if(sp.protectedArea)lines.push('Protected area: Queensland Government, AdminBoundariesFramework MapServer (Layer 97).');
    if(sp.capadName||sp.capadMarine)lines.push('National/Commonwealth protected area: Collaborative Australian Protected Areas Database (CAPAD) 2024, Commonwealth of Australia 2025. CC BY 4.0.');
    if(sp.reCode)lines.push('Regional ecosystem: Queensland Government, Biota/VegetationManagement MapServer (Layer 134). Landzone descriptions: Queensland Herbarium.');
    if(sp.marine&&(sp.marineZone||sp.marineFHA||sp.marineBenthic)){
      const mLayers=[];
      if(sp.marineZone)mLayers.push('marine park zoning');
      if(sp.marineFHA)mLayers.push('fish habitat areas');
      if(sp.marineBenthic)mLayers.push('benthic habitat');
      lines.push('Marine protected areas ('+mLayers.join(', ')+'): Queensland Government, Environment/ParksMarineProtectedAreas MapServer.');
    }
    if(sp.marineBathymetry){
      lines.push('Bathymetry: Geoscience Australia, Australian Bathymetry and Topography 2009. CC BY 4.0.');
    }
  }
  return lines.join('\n');
}

async function clipCopy(text){
  if(!text)return false;
  try{if(navigator.clipboard?.writeText){await navigator.clipboard.writeText(text);return true}}catch(e){}
  try{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);return true}catch(e){return false}
}

function switchView(v){
  S.view=v;if(v!=='guide')S.guideFocus=null;
  $$('.tab[role="tab"]').forEach(t=>{const on=t.dataset.v===v;t.classList.toggle('on',on);t.setAttribute('aria-selected',on?'true':'false')});
  $$('.vp').forEach(p=>p.classList.remove('on'));$('#v-'+v)?.classList.add('on');
  const sc=$('#scroll');if(v==='map'){sc.classList.add('mm');sc.style.overflow='hidden'}else{sc.classList.remove('mm');sc.style.overflow='auto'}
  pushURLState();
  /* If leaving guide with stale filters, do a fresh search */
  if(v!=='guide'&&S._searchStale){S._searchStale=false;doSearch();return}
  /* Lazy quality counts + analytics facets: only fetch when Analytics tab is first opened */
  if(v==='charts'&&S._qcStale){
    S._qcStale=false;
    if(S.mapPoly&&S._polyScanDone&&S._polyAllRecs?.length){
      /* Polygon mode: compute from actual polygon-filtered records */
      S.qc=computeLocalQC(S._polyAllRecs);
      S.richness=computeLocalRichness(S._polyAllRecs);
      const localAF=computeLocalAnalyticsFacets(S._polyAllRecs);
      Object.entries(localAF).forEach(([k,val])=>{S.facets[k]=val});
      try{renderCharts()}catch(e){}
    }else{
      /* Standard mode: query API */
      const f=getFilters();
      Promise.all([
        fetchQualityCounts(f),
        fetchAnalyticsFacets(f),
        fetchRichnessCounts(f)
      ]).then(([qc])=>{S.qc=qc;try{renderCharts()}catch(e){}}).catch(()=>{});
    }
  }
  if(v==='map'){
    /* Lazy map: only render when tab is active */
    if(S.mapDirty||!S.map){renderMap();S.mapDirty=false}
    else{setTimeout(()=>S.map?.invalidateSize(),120)}
    /* Load all georeferenced records for map */
    const cap=S.mapUncapped?S.total:Math.min(S.total,50000);
    if(S.mapPoly){
      /* Polygon mode — show accumulated points (bgPolyScan continues updating) */
      try{addMarkers();buildLegend();updateMapInfo()}catch(e){}
    }else if(S.allPts.length<cap&&S.total>INIT_PAGE){bgLoadAllPages(getFilters(),S.mapLoadId)}
  }else if(S.res.length||S.total>0){
    renderView();
  }
}

/* ═════════════════════════════════════════════════
   SMART SEARCH — resolve common names via GBIF species API
   ═════════════════════════════════════════════════ */
let _resolveId=0;
function searchResolving(on){
  const icon=$('#searchIcon');
  if(icon)icon.classList.toggle('resolving',on);
}
function updateSearchRst(){
  const q=$('#q').value.trim();
  const hasFilters=FIDS.some(id=>{const el=$('#'+id);return el&&el.value})||$('#fType')?.value||$('#fColl')?.value||$('#fCo')?.value||$('#fSt')?.value||$('#fCat')?.value||S.mapBox||S.mapPoly;
  const btn=$('#searchRst');
  if(btn)btn.classList.toggle('vis',!!(q||hasFilters));
  updateFilterChips();
}

const _FID_LABEL={fK:'Kingdom',fP:'Phylum',fC:'Class',fO:'Order',fF:'Family',fG:'Genus',fSp:'Species'};
function updateFilterChips(){
  const bar=$('#chipBar');if(!bar)return;
  const chips=[];
  /* Taxonomy filters */
  for(const fid of FIDS){
    const el=$('#'+fid);if(!el||!el.value)continue;
    chips.push({label:_FID_LABEL[fid]||fid,value:el.value,clear:()=>{el.value='';S.off=0;doSearch()}});
  }
  /* Other filters */
  const others=[
    ['fType','Type status'],['fColl','Collection'],['fCo','Country'],['fSt','State'],['fCat','Catalog #'],
    ['fCoord','Georeferenced'],['fMedia','Media']
  ];
  for(const [id,label] of others){
    const el=$('#'+id);if(!el||!el.value)continue;
    /* Skip default "any" values */
    if(el.tagName==='SELECT'&&el.selectedIndex===0)continue;
    const display=el.tagName==='SELECT'?(el.options[el.selectedIndex]?.text||el.value):el.value;
    chips.push({label,value:display,clear:()=>{el.value=el.tagName==='SELECT'?(el.options[0]?.value||''):'';S.off=0;doSearch()}});
  }
  /* Search query */
  const q=$('#q').value.trim();
  if(q)chips.push({label:'Search',value:q,clear:()=>{$('#q').value='';S.q='';S._smartMatch=null;S.off=0;doSearch()}});
  /* Spatial filters */
  if(S.mapPoly)chips.push({label:S.mapPoly.source==='drawn'?'Drawn Area':(S.mapPoly.source||'Area'),value:S.mapPoly.name,clear:()=>{try{clearNNTT(false)}catch(e){};try{S._drawPoly&&(S._drawPoly.mode=false)}catch(e){}}});
  else if(S.mapBox)chips.push({label:'Map Box',value:`${S.mapBox.s.toFixed(2)}…${S.mapBox.n.toFixed(2)}`,clear:()=>{clearMapBox();S.off=0;doSearch()}});

  if(!chips.length){bar.classList.remove('vis');bar.innerHTML='';return}
  bar.classList.add('vis');
  bar.innerHTML='';
  for(const c of chips){
    const pill=document.createElement('span');pill.className='chip';
    pill.innerHTML=`<span class="ck">${esc(c.label)}</span> ${esc(c.value)} <button class="cx" title="Remove">✕</button>`;
    pill.querySelector('.cx').addEventListener('click',e=>{e.stopPropagation();c.clear()});
    bar.appendChild(pill);
  }
  if(chips.length>1){
    const clr=document.createElement('button');clr.className='chip-clear';clr.textContent='Clear all';
    clr.addEventListener('click',()=>{$('#searchRst').click()});
    bar.appendChild(clr);
  }
}
async function smartSearch(){
  const raw=$('#q').value.trim();
  S.off=0;
  updateSearchRst();
  /* Clear any previous catalog filter — only the catalog branch below re-sets it */
  const _catEl=$('#fCat');if(_catEl&&_catEl.value)_catEl.value='';
  /* If empty or looks like a scientific binomial (Genus species), use raw query directly */
  if(!raw||/^[A-Z][a-z]+\s+[a-z]+/.test(raw)){
    S.q=raw;S._smartMatch=null;doSearch();return;
  }
  /* If it's a catalog number pattern, route to the catalog filter — NOT free-text q.
     Patterns: "T239569", "J12345", "12345", "T1167*", "W00*" etc. */
  if(/^[A-Z]{0,3}\d{2,}[\d*]*$/i.test(raw)||(/^[A-Z]{0,3}\d+/.test(raw)&&raw.includes('*'))){
    S.q='';S._smartMatch=null;
    const catEl=$('#fCat');if(catEl)catEl.value=raw;
    doSearch();return;
  }
  /* Fast-path: single words that look like higher-rank taxonomy — skip resolution */
  if(!/\s/.test(raw)&&/(?:idae|inae|ini|oidea|ales|iformes|ptera|ura|phora|phyta|mycota|opsida|ata|poda|oza)$/i.test(raw)){
    S.q=raw;S._smartMatch=null;doSearch();return;
  }
  /* Genus-like names (single capitalised word) go through GBIF resolution
     to populate the full taxonomy breadcrumb (kingdom → genus) */
  const resolveId=++_resolveId;
  searchResolving(true);
  try{
    /* Try GBIF species suggest — returns ranked matches for common + scientific names */
    const sr=await cachedFetch(`https://api.gbif.org/v1/species/suggest?q=${encodeURIComponent(raw)}&limit=8`);
    if(resolveId!==_resolveId){searchResolving(false);return}
    if(!sr.ok){searchResolving(false);S.q=raw;doSearch();return}
    const suggestions=await sr.json();
    if(resolveId!==_resolveId){searchResolving(false);return}
    
    /* Also try GBIF species/match for stricter matching */
    const mr=await cachedFetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(raw)}&verbose=true`);
    const matchData=mr.ok?await mr.json():null;
    if(resolveId!==_resolveId){searchResolving(false);return}
    
    /* Score candidates: prefer species-level matches where vernacular matches the query */
    let best=null;
    const qLower=raw.toLowerCase();
    
    /* Check if the strict match has a high confidence */
    if(matchData&&matchData.usageKey&&matchData.confidence>=90&&matchData.matchType!=='NONE'){
      /* Try to find a vernacular name */
      try{
        const vr=await cachedFetch(`https://api.gbif.org/v1/species/${matchData.usageKey}/vernacularNames?limit=50`);
        if(resolveId!==_resolveId){searchResolving(false);return}
        if(vr.ok){
          const vd=await vr.json();
          const engNames=(vd.results||[]).filter(v=>v.language==='eng'||v.language==='en');
          const vernMatch=engNames.find(v=>(v.vernacularName||'').toLowerCase().includes(qLower)||qLower.includes((v.vernacularName||'').toLowerCase()));
          if(vernMatch){
            best={rank:matchData.rank?.toLowerCase(),name:matchData.canonicalName||matchData.species||matchData.scientificName,
              vern:vernMatch.vernacularName,kingdom:matchData.kingdom,phylum:matchData.phylum,class_:matchData.class,
              order:matchData.order,family:matchData.family,genus:matchData.genus,species:matchData.species};
          }
        }
      }catch(e){}
      /* If no vernacular match but query looks like a scientific name, accept the taxonomic resolution directly */
      if(!best&&/^[A-Z]/.test(raw)){
        best={rank:matchData.rank?.toLowerCase(),name:matchData.canonicalName||matchData.species||matchData.scientificName,
          vern:'',kingdom:matchData.kingdom,phylum:matchData.phylum,class_:matchData.class,
          order:matchData.order,family:matchData.family,genus:matchData.genus,species:matchData.species};
      }
    }
    
    /* If no match from strict, scan suggest results for vernacular name overlap */
    if(!best&&suggestions.length){
      for(const s of suggestions){
        if(!s.key)continue;
        const sNames=[(s.vernacularName||''),(s.canonicalName||''),(s.scientificName||'')].map(x=>x.toLowerCase());
        if(sNames.some(n=>n.includes(qLower)||qLower.includes(n.split(' ')[0]))){
          try{
            const vr=await cachedFetch(`https://api.gbif.org/v1/species/${s.key}/vernacularNames?limit=50`);
            if(resolveId!==_resolveId){searchResolving(false);return}
            if(vr.ok){
              const vd=await vr.json();
              const engNames=(vd.results||[]).filter(v=>v.language==='eng'||v.language==='en');
              const vernMatch=engNames.find(v=>{
                const vn=(v.vernacularName||'').toLowerCase();
                return vn.includes(qLower)||qLower.includes(vn);
              });
              if(vernMatch){
                best={rank:s.rank?.toLowerCase(),name:s.canonicalName||s.species||s.scientificName,
                  vern:vernMatch.vernacularName,kingdom:s.kingdom,phylum:s.phylum,class_:s.class,
                  order:s.order,family:s.family,genus:s.genus,species:s.species};
                break;
              }
            }
          }catch(e){}
        }
      }
    }
    
    searchResolving(false);
    if(resolveId!==_resolveId)return;
    
    if(best){
      S.q='';
      S._smartMatch=best;
      const rankMap={species:'fSp',genus:'fG',family:'fF',order:'fO',class:'fC',phylum:'fP',kingdom:'fK',
        /* Intermediate ranks → map to nearest filter */
        superfamily:'fO',subfamily:'fF',tribe:'fF',subtribe:'fF',infraorder:'fO',suborder:'fO',subgenus:'fG',subclass:'fC',subphylum:'fP',infraclass:'fC',superorder:'fO',superclass:'fC'};
      let filterRank=null,filterName=null;
      if(best.species&&best.rank==='species'){filterRank='fSp';filterName=best.species}
      else if(best.genus&&(best.rank==='genus'||best.rank==='species'||best.rank==='subgenus')){filterRank='fG';filterName=best.genus}
      /* Subfamily/tribe: use the family (GBIF always provides parent taxonomy) */
      else if(best.family&&(best.rank==='subfamily'||best.rank==='tribe'||best.rank==='subtribe'||best.rank==='family')){filterRank='fF';filterName=best.family}
      /* Superfamily: use the name as a free-text query (ALA indexes superfamily field) */
      else if(best.rank==='superfamily'&&best.name){filterRank=null;S.q=best.name}
      else if(best.family){filterRank='fF';filterName=best.family}
      else if(best.order){filterRank='fO';filterName=best.order}
      else if(best.name){
        const rk=best.rank;filterRank=rankMap[rk]||'fF';filterName=best.name;
      }
      if(filterRank&&filterName){
        FIDS.forEach(id=>$('#'+id).value='');
        /* Set the target rank */
        const sel=$('#'+filterRank);
        if(sel){
          let found=false;for(const o of sel.options)if(o.value===filterName){found=true;break}
          if(!found){const o=document.createElement('option');o.value=filterName;o.textContent=filterName;sel.appendChild(o)}
          sel.value=filterName;
        }
        /* Populate parent taxonomy chain from GBIF — gives full breadcrumbs */
        const chain=[['fK',best.kingdom],['fP',best.phylum],['fC',best.class_],['fO',best.order],['fF',best.family],['fG',best.genus],['fSp',best.species]];
        for(const [fid,val] of chain){
          if(!val||fid===filterRank)continue;
          const el=$('#'+fid);if(!el)continue;
          let found=false;for(const o of el.options)if(o.value===val){found=true;break}
          if(!found){const o=document.createElement('option');o.value=val;o.textContent=val;el.appendChild(o)}
          el.value=val;
        }
        toast(`"${raw}" → ${best.vern||best.name} (${best.rank||'taxon'})`);
      }else if(S.q){
        /* Superfamily or other text-query fallback */
        toast(`"${raw}" → ${best.vern||best.name} (${best.rank||'taxon'})`);
      }
      doSearch();
    }else{
      const words=raw.split(/\s+/);
      if(words.length>=2){
        S.q=`"${raw}"`;
      }else{
        S.q=raw;
      }
      S._smartMatch=null;
      doSearch();
    }
  }catch(e){
    searchResolving(false);
    console.warn('[SmartSearch]',e);
    S.q=raw;S._smartMatch=null;doSearch();
  }
}

// Taxonomy cascade — auto-populate parent filters via GBIF classification
const FID2RANK={fK:'kingdom',fP:'phylum',fC:'class',fO:'order',fF:'family',fG:'genus',fSp:'species'};
const RANK2GBIF={kingdom:'KINGDOM',phylum:'PHYLUM','class':'CLASS',order:'ORDER',family:'FAMILY',genus:'GENUS',species:'SPECIES'};
async function autoFillParents(fid){
  const idx=FIDS.indexOf(fid);if(idx<=0)return; /* kingdom has no parents */
  const val=$('#'+fid).value;if(!val)return;
  const rank=FID2RANK[fid];if(!rank)return;
  try{
    const r=await cachedFetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(val)}&rank=${RANK2GBIF[rank]||''}&strict=false`);
    if(!r.ok)return;const d=await r.json();
    /* Walk parent ranks and set filters */
    const map={fK:d.kingdom,fP:d.phylum,fC:d.class,fO:d.order,fF:d.family,fG:d.genus};
    for(let i=0;i<idx;i++){
      const pid=FIDS[i];
      const parentVal=map[pid];
      if(!parentVal)continue;
      const sel=$('#'+pid);if(!sel)continue;
      /* Ensure option exists */
      let found=false;for(const o of sel.options)if(o.value===parentVal){found=true;break}
      if(!found){const o=document.createElement('option');o.value=parentVal;o.textContent=parentVal;sel.appendChild(o)}
      sel.value=parentVal;
    }
  }catch(e){}
}
FIDS.forEach((id,idx)=>{$('#'+id).addEventListener('change',()=>{for(let i=idx+1;i<FIDS.length;i++)$('#'+FIDS[i]).value='';S.off=0;updateSearchRst();autoFillParents(id);doSearch()})});
['fType','fCoord','fMedia','fColl','fCo','fSt'].forEach(id=>$('#'+id)?.addEventListener('change',()=>{S.off=0;updateSearchRst();doSearch()}));
$('#catGo')?.addEventListener('click',()=>{S.off=0;doSearch()});
$('#fCat')?.addEventListener('keydown',e=>{if(e.key==='Enter'){S.off=0;doSearch()}});
$('#fSort')?.addEventListener('change',()=>{updateDropdowns()});
$('#resetBtn').addEventListener('click',()=>{S.q='';S.off=0;S.guideFocus=null;clearMapBox();try{clearNNTT(true)}catch(e){};S._smartMatch=null;S._densityManual=false;S.galDensity=null;_resolveId++;$('#q').value='';FIDS.forEach(id=>$('#'+id).value='');['fType','fCoord','fMedia','fColl','fSort','fCo','fSt'].forEach(id=>{const el=$('#'+id);if(el)el.value=el.options?el.options[0]?.value||'':''});
  const catEl=$('#fCat');if(catEl)catEl.value='';
  updateSearchRst();doSearch()});
$$('.tab[data-v]').forEach(t=>t.addEventListener('click',()=>switchView(t.dataset.v)));
/* WAI-ARIA tabs: arrow key navigation */
document.querySelector('.tabs[role="tablist"]')?.addEventListener('keydown',e=>{
  const tabs=[...document.querySelectorAll('.tab[role="tab"]')];if(!tabs.length)return;
  const ci=tabs.indexOf(e.target);if(ci<0)return;
  let ni=-1;
  if(e.key==='ArrowRight')ni=(ci+1)%tabs.length;
  else if(e.key==='ArrowLeft')ni=(ci-1+tabs.length)%tabs.length;
  else if(e.key==='Home')ni=0;
  else if(e.key==='End')ni=tabs.length-1;
  if(ni>=0){e.preventDefault();tabs[ni].focus();tabs[ni].click()}
});
$('#togSide').addEventListener('click',()=>{$('#lay').classList.toggle('col');const btn=$('#togSide');btn.setAttribute('aria-expanded',!$('#lay').classList.contains('col'));if(S.map)setTimeout(()=>S.map.invalidateSize(),300)});
$('#prevP')?.addEventListener('click',()=>{
  if(S.mapPoly&&S.mapPoly.rings){

  }else{if(S.off>=INIT_PAGE){S.off-=INIT_PAGE;doSearch()}}

$('#nextP')?.addEventListener('click',()=>{

    S._polyPage=(S._polyPage||0)+1;S._polyNavActive=true;doSearch();

/* Density toggle + CSV export + Nav buttons */
$('#galBar').querySelectorAll('.density-tog button').forEach(b=>b.addEventListener('click',()=>{S.galDensity=b.dataset.d;S._densityManual=true;$('#galBar').querySelectorAll('.density-tog button').forEach(x=>{x.setAttribute('aria-pressed',x===b?'true':'false')});renderGallery()}));
$('#csvBtn').addEventListener('click',e=>{e.stopPropagation();exportCSV($('#csvPlusBtn').classList.contains('on'))});
$('#csvPlusBtn').addEventListener('click',e=>{e.stopPropagation();const btn=$('#csvPlusBtn');btn.classList.toggle('on');btn.setAttribute('aria-pressed',btn.classList.contains('on'));toast(btn.classList.contains('on')?'CSV+ on — export will include full spatial enrichment':'CSV+ off — fast export')});
/* Nav: open sequential records in modal */
$('#navPrev').addEventListener('click',()=>{if(S.navIdx>0){S.navIdx--;openModal(S.navIdx)}});
$('#navNext').addEventListener('click',()=>{if(S.navIdx<S.res.length-1){S.navIdx++;openModal(S.navIdx)}else if(S.res.length>0){S.navIdx=0;openModal(0)}});
/* Toggle removed — ALA only */
// Modal events
$('#mX').addEventListener('click',closeModal);$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
/* Image nav buttons are created dynamically in updateModalImg — no static binding needed */
document.addEventListener('keydown',e=>{
  if(!$('#modal').classList.contains('open'))return;
  if(e.key==='Escape')closeModal();
  if(e.key==='ArrowUp'&&S.modalIdx>0){e.preventDefault();openModal(S.modalIdx-1)}
  if(e.key==='ArrowDown'&&S.modalIdx<S.res.length-1){e.preventDefault();openModal(S.modalIdx+1)}
  /* Focus trap */
  if(e.key==='Tab'){
    const dlg=document.querySelector('.mod-dlg');if(!dlg)return;
    const focusable=dlg.querySelectorAll('button:not([disabled]),a[href],[tabindex]:not([tabindex="-1"]),input,select,textarea');
    if(!focusable.length)return;
    const first=focusable[0],last=focusable[focusable.length-1];
    if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus()}}
    else{if(document.activeElement===last){e.preventDefault();first.focus()}}
  }
});

/* Global keyboard shortcuts (not when typing in inputs/selects or modal is open) */
document.addEventListener('keydown',e=>{
  if($('#modal').classList.contains('open'))return;
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')return;
  if(e.key==='['){
    e.preventDefault();
    $('#lay').classList.toggle('col');
    const btn=$('#togSide');btn.setAttribute('aria-expanded',!$('#lay').classList.contains('col'));
    if(S.map)setTimeout(()=>S.map.invalidateSize(),300);
  }
});

/* ═════════════════════════════════════════════════
   URL STATE — shareable, bookmarkable filter state
   ═════════════════════════════════════════════════ */
const _URL_KEYS={q:'q',kingdom:'fK',phylum:'fP',class_:'fC',order:'fO',family:'fF',genus:'fG',species:'fSp',
  hasType:'fType',coord:'fCoord',media:'fMedia',country:'fCo',state:'fSt',catNum:'fCat',collCode:'fColl'};

let _urlSuppressPush=false; /* Prevent pushback during restoreFromURL */

function pushURLState(){
  if(_urlSuppressPush)return;
  const p=new URLSearchParams();
  /* View tab */
  if(S.view&&S.view!=='gallery')p.set('view',S.view);
  /* Filters */
  for(const[stateKey,domId] of Object.entries(_URL_KEYS)){
    const el=$('#'+domId);if(!el)continue;
    const v=el.tagName==='SELECT'?el.value:(el.value||'').trim();
    if(v)p.set(stateKey,v);
  }
  /* NNTT polygon area name */
  if(S.mapPoly?.name)p.set('area',S.mapPoly.name);
  /* Sort */
  const sort=$('#fSort')?.value;
  if(sort&&sort!=='count')p.set('sort',sort);
  /* Browse drill-in focus — shareable deep link (the taxon filter itself is
     already serialised above via _URL_KEYS; this captures the focus state). */
  if(S.view==='guide'&&S.guideFocus){p.set('gfRank',S.guideFocus.rank);p.set('gfName',S.guideFocus.name)}
  /* Build hash */
  const h=p.toString();
  const newHash=h?'#'+h:'';
  if(('#'+location.hash.replace(/^#/,''))!==newHash&&location.hash!==newHash){
    history.replaceState(null,'',newHash||location.pathname+location.search);
  }
}

function restoreFromURL(){
  const raw=location.hash.replace(/^#/,'');
  if(!raw)return false;
  const p=new URLSearchParams(raw);
  let any=false;
  _urlSuppressPush=true;
  /* Restore filters */
  for(const[stateKey,domId] of Object.entries(_URL_KEYS)){
    const v=p.get(stateKey);if(!v)continue;
    const el=$('#'+domId);if(!el)continue;
    if(el.tagName==='SELECT'){
      /* For selects, set value; if no matching option exists, add one temporarily */
      if([...el.options].some(o=>o.value===v)){el.value=v}
      else{const opt=document.createElement('option');opt.value=v;opt.textContent=v;el.appendChild(opt);el.value=v}
    }else{
      el.value=v;
    }
    if(v)any=true;
  }
  /* Search term */
  if(p.get('q')){S.q=p.get('q');$('#q').value=S.q;any=true}
  /* View tab */
  const view=p.get('view');
  if(view&&['gallery','taxa','guide','map','charts'].includes(view)){S.view=view;any=true}
  /* Sort */
  const sort=p.get('sort');
  if(sort&&$('#fSort'))$('#fSort').value=sort;
  /* Browse drill-in focus */
  const gfRank=p.get('gfRank'),gfName=p.get('gfName');
  if(gfRank&&gfName){S.guideFocus={rank:gfRank,name:gfName};any=true}
  /* NNTT area name — stored for reference but polygon restore requires user action
     (polygon data isn't in URL, only the name) */
  _urlSuppressPush=false;
  return any;
}

/* Listen for browser back/forward */
window.addEventListener('hashchange',()=>{
  _urlSuppressPush=true;
  const raw=location.hash.replace(/^#/,'');
  if(!raw){
    /* Hash cleared — reset all filters */
    $('#q').value='';S.q='';
    for(const domId of Object.values(_URL_KEYS)){const el=$('#'+domId);if(el){if(el.tagName==='SELECT')el.selectedIndex=0;else el.value=''}}
    _urlSuppressPush=false;
    doSearch();
    switchView('gallery');
    return;
  }
  const p=new URLSearchParams(raw);
  /* Apply all filter values */
  for(const[stateKey,domId] of Object.entries(_URL_KEYS)){
    const el=$('#'+domId);if(!el)continue;
    const v=p.get(stateKey)||'';
    if(el.tagName==='SELECT'){
      if([...el.options].some(o=>o.value===v))el.value=v;
      else el.selectedIndex=0;
    }else el.value=v;
  }
  if(p.get('q')){S.q=p.get('q');$('#q').value=S.q}else{S.q='';$('#q').value=''}
  const sort=p.get('sort');if($('#fSort'))$('#fSort').value=sort||'count';
  /* Browse drill-in focus (set before render so switchView/renderGuide see it) */
  const gfRank=p.get('gfRank'),gfName=p.get('gfName');
  S.guideFocus=(gfRank&&gfName)?{rank:gfRank,name:gfName}:null;
  _urlSuppressPush=false;
  doSearch();
  const view=p.get('view')||'gallery';
  if(S.view!==view)switchView(view);
  /* Re-render Browse for back/forward within the guide view (switchView is
     skipped when the view is unchanged, e.g. drilling in/out of a focus). */
  if(view==='guide'){try{renderGuide()}catch(e){}}
});

/* BOOT */
const hadURLState=restoreFromURL();
if(hadURLState&&S.view!=='gallery'){
  /* Activate correct tab before first search */
  $$('.tab[role="tab"]').forEach(t=>{const on=t.dataset.v===S.view;t.classList.toggle('on',on);t.setAttribute('aria-selected',on?'true':'false')});
  $$('.vp').forEach(p=>p.classList.remove('on'));$('#v-'+S.view)?.classList.add('on');
  const sc=$('#scroll');if(S.view==='map'){sc.classList.add('mm');sc.style.overflow='hidden'}
  /* Deep-linked Browse focus: render the group detail (renderGuideFocus fetches
     its own data; the trailing doSearch populates records for "View Records"). */
  if(S.view==='guide'&&S.guideFocus){try{renderGuide()}catch(e){}}
}
/* Self-test mode (?selftest) skips the live search so no API calls fire. */
const _SELFTEST = new URLSearchParams(location.search).has('selftest');
if(!_SELFTEST) doSearch();

/* ════════════════════════════════════════════════════════════════════════
   SELF-TEST HARNESS — opt-in via ?selftest. No build, no deps, no network.
   Replaces <body> with a synchronous pass/fail report and runs assertions
   against the real in-scope functions/constants. Purely synchronous: it must
   not call doSearch(), fetch(), or touch the DOM beyond replacing <body>.
   ════════════════════════════════════════════════════════════════════════ */
if(_SELFTEST){
  /* Async cascade probe — NOT part of the synchronous report (it hits the network).
     Run manually from the console, e.g.  await _imgCascadeTest('Chelidae','family').
     Logs the resolved source/label/attribution so you can confirm a specimen tier
     (qm / ala) fires before any living iNat/Wikipedia fallback. */
  window._imgCascadeTest=async(name,rank)=>{
    const c=await resolveGroupImage(name,rank||'family');
    const {url,...meta}=c;
    console.log(`[cascade] ${name} (${rank||'family'}) → source=${c.source}`,meta,'\n  url:',(url||'').slice(0,90));
    return c;
  };
  const _run=()=>{
    const results=[];
    const ok =(name)=>results.push({pass:true ,name});
    const bad=(name,detail)=>results.push({pass:false,name,detail});
    const assert=(name,cond,detail)=>cond?ok(name):bad(name,detail||'assertion failed');
    const eq=(name,actual,expected)=>actual===expected?ok(name)
      :bad(name,`expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    try{
      /* ── CONSTANTS ── */
      eq('ALA_MAX_PAGE === 100', ALA_MAX_PAGE, 100);
      eq('ALA_MAX_RESULTS === 5000', ALA_MAX_RESULTS, 5000);

      /* ── CORS-SAFE FQ INVARIANTS ── */
      const fqArr=alaBaseFQ({kingdom:'Animalia',family:'Chelidae',media:'image',coord:'true'});
      assert('alaBaseFQ(...) returns an Array', Array.isArray(fqArr),
        'got '+Object.prototype.toString.call(fqArr));
      assert('alaBaseFQ(...) array length >= 4 (one clause per filter)',
        Array.isArray(fqArr)&&fqArr.length>=4, 'length='+(fqArr&&fqArr.length));
      /* Blank out the contents of any parens, then no clause may contain a
         top-level " AND " (the only legitimate AND lives inside parens). */
      const stripParens=s=>String(s).replace(/\([^)]*\)/g,'()');
      const andOffenders=(Array.isArray(fqArr)?fqArr:[]).filter(c=>stripParens(c).includes(' AND '));
      assert('no top-level AND-join in any alaBaseFQ clause', andOffenders.length===0,
        'offending clause(s): '+JSON.stringify(andOffenders));

      const ap=appendFQ(new URLSearchParams(), ['a:1','b:2','c:3']);
      eq('appendFQ → 3 separate fq params', ap.getAll('fq').length, 3);

      const qs=fqQS(['x:1','y:2']);
      const fqCount=(qs.match(/(?:^|&)fq=/g)||[]).length;
      const qsHasAND=qs.includes(' AND ')||/%20AND%20/i.test(qs)||/\+AND\+/.test(qs);
      assert('fqQS → 2 separate fq= entries, no AND', fqCount===2 && !qsHasAND,
        `fqCount=${fqCount} hasAND=${qsHasAND} → ${qs}`);

      /* ── ISGENERICVERN ── */
      eq("isGenericVern('ant')", isGenericVern('ant'), true);
      eq("isGenericVern('beetle')", isGenericVern('beetle'), true);
      eq("isGenericVern('fish')", isGenericVern('fish'), true);
      eq("isGenericVern('animal')", isGenericVern('animal'), true);
      eq("isGenericVern('Christmas beetle')", isGenericVern('Christmas beetle'), false);
      /* Family-level _localVern values (e.g. Buprestidae→"jewel beetle") are
         auto-injected into _genericVernSet so GENUS lookups that only resolve to
         a family name climb to subfamily/tribe. Hence this is generic by design.
         Family-tile DISPLAY trusts _localVern directly (see _fillTreeVern) and
         does NOT gate on isGenericVern, so tiles are not blanked. */
      eq("isGenericVern('jewel beetle') — family name, generic by design", isGenericVern('jewel beetle'), true);
      eq("isGenericVern('golden silk orb-weaver')", isGenericVern('golden silk orb-weaver'), false);
      eq("isGenericVern(null)", isGenericVern(null), true);
      eq("isGenericVern('')", isGenericVern(''), true);

      /* ── SINGULARIZE ── */
      eq("singularize('beetles') → 'beetle'", singularize('beetles'), 'beetle');
      eq("singularize('families') → 'family'", singularize('families'), 'family');
      assert("singularize('side-necked turtles') ends with 'turtle'",
        /turtle$/.test(singularize('side-necked turtles')),
        'got '+JSON.stringify(singularize('side-necked turtles')));

      /* ── VERNACULAR RESOLVER STRUCTURE (no network — function presence only) ── */
      assert('lookupSubfamilyVern is a function',
        typeof lookupSubfamilyVern==='function',
        'got '+typeof lookupSubfamilyVern);

      /* ── CSV ENCODING (mirrors the exportCSV quoting pattern) ── */
      const csvEnc=x=>{const s=String(x);return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s};
      eq('CSV quotes a comma value', csvEnc('a,b'), '"a,b"');
      eq('CSV doubles an embedded quote', csvEnc('a"b'), '"a""b"');
      eq('CSV quotes a newline value', csvEnc('a\nb'), '"a\nb"');

      /* ── IMAGE-RESOLUTION CASCADE (synchronous parts only — no network) ── */
      eq("_imgRankField('class_') → 'class'", _imgRankField('class_'), 'class');
      eq("_imgRankField('Family') → 'family'", _imgRankField('Family'), 'family');
      eq("_imgRankField('bogus') → 'family' (default)", _imgRankField('bogus'), 'family');
      eq("_imgNormLicense('cc-by-nc') → 'CC-BY-NC'", _imgNormLicense('cc-by-nc'), 'CC-BY-NC');
      eq("_imgNormLicense('cc0') → 'CC0'", _imgNormLicense('cc0'), 'CC0');
      eq("_imgNormLicense('') → ''", _imgNormLicense(''), '');
      assert('resolveGroupImage is a function', typeof resolveGroupImage==='function',
        'got '+typeof resolveGroupImage);
      const ph=imgPlaceholderCandidate('Chelidae','family');
      const phKeys=['url','source','sourceLabel','attribution','license','href'];
      assert('placeholder candidate has exactly the 6 candidate keys',
        phKeys.every(k=>k in ph)&&Object.keys(ph).length===6,
        'keys='+JSON.stringify(Object.keys(ph)));
      eq("placeholder source === 'placeholder'", ph.source, 'placeholder');
      assert('placeholder url is an inline SVG data URI (never a dash)',
        typeof ph.url==='string'&&ph.url.startsWith('data:image/svg+xml,'),
        'url='+JSON.stringify((ph.url||'').slice(0,40)));
      assert('placeholder is deterministic for the same name+rank',
        imgPlaceholderCandidate('Chelidae','family').url===ph.url, 'differed across calls');
      eq("_localVern['acanthocephala'] === 'thorny-headed worms' (cross-rank homonym guard)",
        _localVern['acanthocephala'], 'thorny-headed worms');

      /* ── HOLDINGS STATS (pure derivation, no network) ── */
      const _hf={
        year:[{name:'2024',count:3},{name:'1861',count:1},{name:'1650',count:9}],
        type_status:[{name:'Holotype',count:4},{name:'Paratype',count:6},{name:'notAType',count:99}],
        state:[{name:'Queensland',count:50},{name:'NSW',count:5}],
        class_:[{name:'Malacostraca',count:40}]
      };
      const _H=deriveHoldingsStats(_hf,{totalCount:100,mediaTotal:1,childRanks:['class','order','family']});
      eq('holdings records', _H.records, 100);
      eq('holdings imagedPct (1/100)', _H.imagedPct, 0.01);
      eq('holdings imagedPct guard (records=0)', deriveHoldingsStats(_hf,{totalCount:0,mediaTotal:5,childRanks:[]}).imagedPct, 0);
      eq('holdings yearFirst respects >1700 + sort', _H.yearFirst, '1861');
      eq('holdings yearLast', _H.yearLast, '2024');
      eq('holdings types.total excludes notAType', _H.types.total, 10);
      eq('holdings childRank resolves class_ alias', _H.childRank.label, 'class');

      /* ── HOLDINGS SENTENCE (pure formatter) ── */
      const _Hs={records:5124,imaged:60,imagedPct:60/5124,yearFirst:'1861',yearLast:'2024',
        types:{total:10,items:[]},states:[],collectors:[],basis:[],childRank:{label:'genus',items:new Array(22).fill(0)}};
      eq('holdingsSentence full story', holdingsSentence(_Hs),
        '5,124 QM specimens across 22 genera, including 10 type specimens · 1% imaged · collected 1861–2024');
      eq('holdingsSentence empty when no records', holdingsSentence({records:0}), '');
      eq('holdingsSentence <1% imaged + singular record',
        holdingsSentence({records:1,imaged:0,imagedPct:0,childRank:{label:'genus',items:[]},types:{total:0}}),
        '1 QM specimen · 0% imaged');

      /* ── PROVENANCE CAPTION (pure) ── */
      eq('_inatCredit strips rights/uploaded boilerplate',
        _inatCredit('(c) Dave Holland, some rights reserved (CC BY-NC), uploaded by Dave Holland'),
        'Dave Holland');
      eq('_inatCredit passes a bare name through', _inatCredit('Jane Doe'), 'Jane Doe');
      eq('iNat caption → source · creator · licence',
        _guideProvCaption({source:'inat',sourceLabel:'iNaturalist',attribution:'Dave Holland',license:'CC-BY-NC'}).text,
        'iNaturalist · Dave Holland · CC BY-NC');
      eq('Wikipedia caption drops repeated label',
        _guideProvCaption({source:'wikipedia',sourceLabel:'Wikipedia',attribution:'Wikipedia',license:''}).text,
        'Wikipedia');
      eq('QM caption stays the pill text', _guideProvCaption({source:'qm'}).text, 'QM specimen');
    }catch(e){
      bad('harness ran to completion', (e&&e.message)||String(e));
    }

    const passed=results.filter(r=>r.pass).length;
    const failed=results.length-passed;
    const _h=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    const lines=results.map(r=>r.pass?`✅ ${_h(r.name)}`:`❌ ${_h(r.name)} — ${_h(r.detail)}`).join('\n');
    const summary=`${passed} passed · ${failed} failed`;
    const summaryColor=failed?'#c0392b':'#1e7e34';
    document.body.innerHTML=
      `<main style="font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;`
        +`padding:24px;max-width:920px;margin:0 auto;color:#222;background:#fff">`
      +`<h1 style="font-size:15px;margin:0 0 4px">QM Collections Explorer — self-test</h1>`
      +`<div style="font-size:12px;color:#666;margin:0 0 14px">?selftest — synchronous, no API calls</div>`
      +`<pre style="white-space:pre-wrap;margin:0 0 16px">${lines}</pre>`
      +`<div style="font-weight:700;font-size:14px;color:${summaryColor}">${summary}</div>`
      +`</main>`;
    document.title=`${failed?'❌':'✅'} ${summary} — QM self-test`;
  };
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',_run);
  else _run();
}
})();
</script>
