<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>QM Collections Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin=""/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin=""/>
<style>
:root{
  --green:#00a561;--green-d:#007a47;--blue:#2a8f9d;--red:#c5211e;
  --orange:#c06a00;--purple:#864a7e;--pink:#c44890;
  --black:#1a1a1a;--ink:#111;--muted:#555;--muted2:#777;
  --bg:#f2f1ed;--panel:#fff;--hair:#ddd;
  --shadow:0 4px 20px rgba(0,0,0,.06);--font:'Barlow',sans-serif;
  --radius:3px;--tr:.15s ease;
  --focus:0 0 0 2px rgba(0,0,0,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:14px;display:flex;flex-direction:column;min-height:100%}
:focus-visible{outline:none;box-shadow:var(--focus)}
.skip-link{position:absolute;top:-40px;left:0;background:var(--ink);color:#fff;padding:8px 16px;z-index:200;font-weight:600;transition:top .2s ease}.skip-link:focus{top:0}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:100;background:#000;color:#fff;display:flex;align-items:center;gap:16px;padding:0 20px;height:52px;flex-shrink:0}
.hdr-brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-logo{font-weight:900;font-size:18px;letter-spacing:-.5px;line-height:1}
.hdr-t{display:flex;flex-direction:column;line-height:1.05}
.hdr-t .t1{font-weight:700;font-size:14px;letter-spacing:-.2px}
.hdr-t .t2{font-size:10px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.6px;text-transform:uppercase}
.hdr-search{flex:1;max-width:420px;position:relative}
.hdr-search input::placeholder{color:rgba(255,255,255,.4)}
.hdr-search input:focus{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3)}
.hdr-search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.4;pointer-events:none;font-style:normal}
.hdr-search .si.resolving{animation:sp .7s linear infinite;opacity:.9}
.hdr-search .srst{position:absolute;right:0;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:0;border:none;background:transparent;color:rgba(255,255,255,.4);font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:var(--tr);padding:0;line-height:1}
.hdr-search .srst.vis{display:flex}
.hdr-search .srst:hover{color:#fff}
.hdr-search input{width:100%;font-family:var(--font);font-size:13px;padding:8px 48px 8px 34px;border:1px solid rgba(255,255,255,.12);border-radius:2px;background:rgba(255,255,255,.06);color:#fff;outline:none;transition:var(--tr)}
.hdr-r{display:flex;gap:4px;margin-left:auto;align-items:center}
.api-grp{display:flex;gap:1px;background:rgba(255,255,255,.08);border-radius:2px;padding:1px}
.api-grp{display:none}
.tog-btn{font-family:var(--font);font-size:12px;font-weight:600;padding:8px 14px;border-radius:2px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);cursor:pointer;transition:var(--tr);white-space:nowrap;min-height:44px}
.tog-btn:hover{color:#fff;background:rgba(255,255,255,.08)}

/* ── FILTER CHIP BAR ── */
.chip-bar{display:none;align-items:center;gap:5px;padding:5px 16px;background:#fff;border-bottom:1px solid var(--hair);flex-wrap:wrap;min-height:34px}
.chip-bar.vis{display:flex}
.chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--font);font-size:11px;font-weight:600;padding:3px 6px 3px 8px;border-radius:2px;background:var(--ink);color:#fff;white-space:nowrap;animation:chipIn .12s ease}
.chip .ck{font-size:9px;color:rgba(255,255,255,.6);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.chip .cx{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:1px;font-size:11px;line-height:1;cursor:pointer;color:rgba(255,255,255,.5);transition:all .12s;background:transparent;border:none;padding:12px;font-family:var(--font)}
.chip .cx:hover{background:rgba(255,255,255,.2);color:#fff}
.chip-clear{font-family:var(--font);font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;padding:3px 8px;border-radius:2px;border:1px solid var(--hair);background:none;transition:all .12s;margin-left:auto}
.chip-clear:hover{border-color:var(--red);color:var(--red)}
@keyframes chipIn{from{opacity:0;transform:translateY(-2px)}to{opacity:1;transform:translateY(0)}}

/* ── LAYOUT ── */
.lay{display:grid;grid-template-columns:260px 1fr;flex:1;min-height:0;overflow:hidden;transition:grid-template-columns var(--tr)}
.lay.col{grid-template-columns:0 1fr}
.lay.col .side{opacity:0;overflow:hidden;pointer-events:none;padding:0;border:none}

/* ── SIDEBAR ── */
.side{background:#fff;border-right:1px solid var(--hair);overflow-y:auto;padding:16px;transition:opacity .15s}
.side::-webkit-scrollbar{width:5px}.side::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.sec{margin-bottom:16px}
.sec-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.sec-t .d{width:6px;height:6px;border-radius:1px}
.fg{margin-bottom:8px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.fg select,.fg input[type=number]{width:100%;font-family:var(--font);font-size:13px;padding:7px 8px;border:1px solid var(--hair);border-radius:2px;background:#fff;color:var(--ink);outline:none;transition:border var(--tr);min-height:36px}
.fg select:focus,.fg input:focus{border-color:var(--ink)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hr{border:none;border-top:1px solid var(--hair);margin:14px 0}
.stats-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.sc{background:#f7f7f5;border:1px solid var(--hair);border-radius:2px;padding:8px 6px;text-align:center}
.sc .sv{font-size:18px;font-weight:900;color:var(--ink);letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.sc .sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:1px}
.sc.a{background:var(--ink);border-color:var(--ink)}.sc.a .sv{color:#fff}.sc.a .sl{color:rgba(255,255,255,.6)}
.btn-rst{font-family:var(--font);font-size:12px;font-weight:600;width:100%;padding:10px;border:1px solid var(--hair);border-radius:2px;background:#fff;color:var(--muted);cursor:pointer;transition:var(--tr);margin-top:8px;min-height:44px;text-transform:uppercase;letter-spacing:.3px}
.btn-rst:hover{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ── MAIN ── */
.main{overflow:hidden;display:flex;flex-direction:column}
.tabs{display:flex;align-items:center;gap:3px;padding:6px 14px;border-bottom:1px solid var(--hair);background:#fff;flex-shrink:0;overflow-x:auto}
.tab{font-family:var(--font);font-size:12px;font-weight:600;padding:10px 14px;border-radius:2px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:var(--tr);white-space:nowrap;min-height:44px;text-transform:uppercase;letter-spacing:.3px}
.tab:hover{color:var(--ink)}
.tab.on{background:var(--ink);border-color:var(--ink);color:#fff}
.tab-sp{flex:1}
.rc{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}.rc b{color:var(--ink);font-weight:800}
.scroll{flex:1;overflow:auto;padding:14px}
.scroll.mm{padding:0;overflow:hidden}

/* ── GALLERY ── */
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--hair);contain:layout style}
.card{background:#fff;border:none;border-radius:0;overflow:hidden;cursor:pointer;transition:background .12s;display:flex;flex-direction:column;position:relative;contain:layout style}
.card:hover{background:#f9f9f7}
.card:focus-visible{box-shadow:var(--focus)}
.card-th{aspect-ratio:4/3;background:#e8e7e3;overflow:hidden;position:relative}
.card-th img{width:100%;height:100%;object-fit:cover;display:block}
.card-th img.portrait{object-fit:contain;background:#e8e7e3}
/* Optimize off-screen card rendering in grid view */
.gal:not(.compact) .card{content-visibility:auto;contain-intrinsic-size:auto 220px 280px}
.card-th .ni{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#aaa;font-size:12px;gap:4px}
.card-th .ni .ico{font-size:14px;font-weight:300;color:#bbb;font-style:normal}
.card-th .ni .ni-ord{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#aaa;display:none}
/* No-image cards: collapse thumbnail to thin strip */
.card.no-img .card-th{aspect-ratio:unset;height:28px;background:#ebebeb}
.card.no-img .card-th .ni{flex-direction:row;justify-content:flex-start;padding:0 10px}
.card.no-img .card-th .ni .ico{display:none}
.card.no-img .card-th .ni .ni-ord{display:block}
.card.no-img .card-type{bottom:auto;top:4px;right:8px;font-size:8px;padding:2px 5px}
.card-kb{position:absolute;top:0;left:0;right:0;height:3px}
.card-body{padding:10px 10px 8px;flex:1;display:flex;flex-direction:column;gap:1px}
.card-sci{font-size:14px;font-weight:700;line-height:1.2;color:var(--ink)}.card-sci.it{font-style:italic}
.card-cat-line{font-size:11px;line-height:1.3;min-height:14px}
.card-cat{font-style:normal;font-size:11px;font-weight:700;color:var(--muted)}
.card-com{font-size:12px;font-weight:400;color:var(--muted)}
.card-det{font-size:11px;color:var(--muted2);padding-top:3px}
.card-det .loc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-tax{font-size:10px;margin-top:2px}
.card-tax .tax-link{color:var(--muted2);text-decoration:none;font-weight:500}
.card-tax .tax-link:hover{color:var(--ink);text-decoration:underline}
/* Metadata hint in modal */
.meta-btns{display:flex;gap:4px;flex-wrap:wrap;padding:4px 0}
.meta-btns button{font-size:10px;padding:3px 8px;border-radius:2px;border:1px solid #ddd;background:#f7f7f5;color:var(--ink);cursor:pointer;font-weight:600;transition:all .12s;text-transform:uppercase;letter-spacing:.3px}
.meta-btns button:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.meta-hint{font-size:11px;color:var(--muted);padding:4px 0;line-height:1.5;min-height:18px}
.meta-hint .copy-ok{color:var(--green-d);font-weight:600}
.meta-hint .copy-block{font-family:'Barlow',monospace;font-size:11px;background:#f4f4f2;padding:4px 8px;border-radius:2px;margin-top:4px;word-break:break-all;user-select:all}
.card-basis{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 6px;border-radius:2px;background:#f4f4f2;color:var(--muted);margin-top:3px;width:fit-content}
/* Density toggle */
.gal-bar{display:none;align-items:center;justify-content:space-between;padding:4px 8px;gap:4px}
.gal-bar.vis{display:flex}
.nav-btn{font-size:18px;font-weight:700;width:44px;height:44px;border:1px solid var(--hair);border-radius:2px;background:#fff;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
.nav-btn:hover:not(:disabled){background:var(--ink);color:#fff}
.nav-btn:disabled{opacity:.25;cursor:default}
.density-tog{display:flex;gap:1px;background:#eee;border-radius:2px;padding:1px}
.density-tog button{font-size:14px;padding:6px 12px;border:none;background:transparent;cursor:pointer;border-radius:1px;color:var(--muted);line-height:1;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.density-tog button.on{background:#fff;color:var(--ink)}
.csv-btn{color:var(--ink)!important;border:none!important;font-size:12px!important;padding:5px 2px 5px 10px!important;text-transform:uppercase!important;letter-spacing:.3px!important;background:transparent!important}
.csv-btn:hover{opacity:.7!important}
.csv-plus{font-size:13px!important;padding:5px 10px 5px 0!important;font-weight:800!important;letter-spacing:0!important;color:var(--hair)!important;border:none!important;background:transparent!important}
.csv-plus:hover{color:var(--muted)!important}
.csv-plus.on{color:var(--green)!important}
/* Collection vertical label — hidden in grid */
.card-coll{display:none}
/* card-fam: compact-only family line — hidden in grid */
.card-fam{display:none}
/* Compact gallery */
.card-type-inline{display:none}
.gal.compact{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--hair)}
.gal.compact .card{border:none;border-left:3px solid var(--cc,#ddd);background:#fff;min-height:0;position:relative;overflow:hidden;transition:background .1s,border-color .1s;border-radius:0}
.gal.compact .card:hover{background:#f7f7f5;transform:none;box-shadow:none;border-left-color:var(--ink)}
.gal.compact .card-kb{display:none}
.gal.compact .card-coll{display:none}
.gal.compact .card-th{display:none}
.gal.compact .card-body{padding:10px 12px 8px;gap:0;justify-content:flex-start}
.gal.compact .card-sci{font-size:14px;font-weight:700;line-height:1.25;color:var(--ink);letter-spacing:-.01em}.gal.compact .card-sci.it{font-style:italic}
.gal.compact .card-cat-line{display:flex;align-items:center;gap:6px;margin-top:2px}
.gal.compact .card-cat-line .card-cat{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.02em}
.gal.compact .card-com{font-size:12px;color:var(--muted2);font-weight:400;margin-top:1px}
.gal.compact .card-fam{display:block;font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.gal.compact .card-det{display:none}
.gal.compact .card-type-inline{display:inline-block;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:2px 5px;border-radius:1px;color:#fff;vertical-align:middle}
@media(max-width:600px){.gal.compact{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1px}
.gal.compact .card-body{padding:8px 10px 6px}
.gal.compact .card-sci{font-size:13px}}
.card-type{position:absolute;bottom:6px;right:6px;color:#fff;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:1px}
.card-collector{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-crumb{font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.card-tag{font-size:10px;font-weight:600;padding:2px 5px;border-radius:2px;background:#f4f4f2;color:var(--muted)}

/* ── TAXA TREE ── */
.tree-ctl{display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.tree-ctl label{font-size:14px;font-weight:700;color:var(--ink)}
.tree-ctl .muted{font-size:12px;color:var(--muted)}
.tree-ctl button{font-family:var(--font);font-size:12px;padding:6px 12px;border:1px solid var(--hair);border-radius:2px;background:#fff;cursor:pointer;min-height:32px;font-weight:600}
.tree-ctl button:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.tree-ctl button.p{background:#f4f4f2;border-color:#ddd;color:var(--ink)}
.tn{margin-left:20px;border-left:1px solid var(--hair);padding-left:10px}
.tn.root{margin-left:0;border-left:none;padding-left:0}
.tn-h{display:flex;align-items:center;gap:6px;padding:5px 6px;cursor:pointer;font-size:13px;transition:background .1s;border-radius:2px;user-select:none;min-height:32px}
.tn-h:hover{background:#f4f4f2}
.tn-tog{width:16px;text-align:center;font-size:11px;color:var(--muted);flex-shrink:0}
.tn-nm{font-weight:600}.tn-nm.it{font-style:italic}
.tn-ct{color:var(--muted);font-size:12px;font-weight:500;min-width:44px}
.tn-rk{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;font-weight:700;background:#f4f4f2;padding:2px 6px;border-radius:2px}
.tn-com{font-size:12px;color:var(--muted);font-weight:400;margin-left:2px}
.tn-btns{display:flex;gap:3px;margin-left:auto;opacity:0;transition:opacity .12s}
.tn-h:hover .tn-btns{opacity:1}
.tn-b{font-family:var(--font);font-size:11px;font-weight:600;padding:3px 7px;border-radius:2px;border:1px solid var(--hair);background:#fff;cursor:pointer;color:var(--muted);min-height:24px}
.tn-b:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.tn-b.g{border-color:#ddd;color:var(--ink)}
.tn-kids{}.tn-kids.shut{display:none}
.tn-loading{font-size:12px;color:var(--muted);padding:5px 0 5px 28px;display:flex;align-items:center;gap:6px}
.tn-loading .mini-sp{width:12px;height:12px;border:2px solid #ddd;border-top-color:var(--ink);border-radius:50%;animation:sp .6s linear infinite}

/* ── BROWSE (taxonomy browser) ── */
.gu-hdr{margin-bottom:14px}.gu-hdr h2{font-size:22px;font-weight:900;letter-spacing:-.5px}
.gu-hdr .crumb{font-size:12px;color:var(--muted);margin-top:3px}
.gu-hdr .crumb a{color:var(--ink);text-decoration:none;font-weight:600}.gu-hdr .crumb a:hover{text-decoration:underline}
.rk-pills{display:flex;gap:3px;margin-bottom:14px;flex-wrap:wrap}
.rp{font-family:var(--font);font-size:11px;font-weight:600;padding:6px 12px;border-radius:2px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:var(--tr);min-height:32px;text-transform:uppercase;letter-spacing:.3px}
.rp:hover{color:var(--ink)}.rp.on{background:var(--ink);border-color:var(--ink);color:#fff}
/* Index grid — image-forward cards */
.gu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--hair)}
.gu-tile{border:none;border-radius:0;background:#fff;cursor:pointer;transition:background .12s;overflow:hidden;display:flex;flex-direction:column}
.gu-tile:hover{background:#f7f7f5}
.gu-tile:focus-visible{outline:2px solid var(--green-d);outline-offset:-2px}
.gu-tile .gt-img{aspect-ratio:4/3;background:#e8e7e3;overflow:hidden;position:relative}
.gu-tile .gt-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s ease}
.gu-tile:hover .gt-img img{transform:scale(1.04)}
@media(prefers-reduced-motion:reduce){.gu-tile .gt-img img{transition:none}.gu-tile:hover .gt-img img{transform:none}}
/* External image credit — overlaid on the image (another museum / iNat / Wikipedia /
   illustration), kept off the body so it can't read as part of the QM record count. */
.gu-tile .gt-img .gt-cap{position:absolute;left:0;right:0;bottom:0;padding:10px 8px 5px;font-size:10px;line-height:1.25;font-weight:500;color:#fff;background:linear-gradient(to top,rgba(0,0,0,.66),rgba(0,0,0,0));display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;pointer-events:none}
.gu-tile .gt-img .gt-no{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:24px;font-weight:300}
/* Loading skeleton while a tile's image resolves (never a dash) */
.gu-tile .gt-img.gt-load{background:linear-gradient(100deg,#e8e7e3 25%,#f1f0ec 50%,#e8e7e3 75%);background-size:200% 100%;animation:gtShimmer 1.3s ease-in-out infinite}
@keyframes gtShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(prefers-reduced-motion:reduce){.gu-tile .gt-img.gt-load{animation:none}}
/* Provenance caption — where the tile image came from */
.gu-tile .gt-prov{font-size:10px;line-height:1.3;color:var(--muted2);font-weight:500;margin-top:5px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gu-tile .gt-prov.prov-qm{align-self:flex-start;color:var(--green-d);background:rgba(0,165,97,.10);border:1px solid rgba(0,165,97,.30);border-radius:9px;padding:1px 7px;font-weight:700;letter-spacing:.2px}
.gu-tile .gt-body{padding:11px 11px 9px;flex:1;display:flex;flex-direction:column;gap:3px}
.gu-tile .gtn{font-weight:700;font-size:14px;line-height:1.2;color:var(--ink)}.gu-tile .gtn.it{font-style:italic}
.gu-tile .gt-vern{font-size:12px;color:var(--muted);font-weight:400;line-height:1.2}
.gu-tile .gts{font-size:11px;color:var(--muted2);margin-top:auto;padding-top:4px}
.gu-tile .gtr{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-top:2px}
.gu-tile .gti{display:flex;gap:3px;margin-top:8px}
.gu-tile .gti img{width:44px;height:44px;border-radius:2px;object-fit:cover}
/* Focus page — two-column profile */
.gu-focus{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.gfp{background:#fff;border:1px solid var(--hair);border-radius:2px;padding:16px}
.gfp h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px}
.gf-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.gfb{background:#f7f7f5;border:1px solid var(--hair);border-radius:2px;padding:8px;text-align:center}
.gfb .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}.gfb .v{font-size:16px;font-weight:900;color:var(--ink)}
/* Conservation badge */
.gf-cons{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 8px;border-radius:2px;margin-bottom:8px;margin-right:4px}
.gf-cons.cr{background:#6b0012;color:#fff}.gf-cons.en{background:#c5211e;color:#fff}.gf-cons.vu{background:#f7941d;color:#fff}.gf-cons.nt{background:#e8d44d;color:var(--ink)}.gf-cons.lc{background:#60c659;color:#fff}
.cc{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.cc-chip{font-family:var(--font);font-size:12px;font-weight:500;padding:4px 8px;border:1px solid var(--hair);border-radius:2px;background:#fff;cursor:pointer;transition:var(--tr)}
.cc-chip:hover{background:#f0efe8;border-color:var(--green)}
/* Specimen image gallery */
.gf-imgs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:8px}
.gf-imgs img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:2px;cursor:pointer}
.bar-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
.bar-row button,.bar-row a{font-family:var(--font);font-size:12px;padding:6px 12px;border:1px solid var(--hair);border-radius:2px;background:#fff;cursor:pointer;text-decoration:none;color:var(--ink);min-height:32px;font-weight:600}
.bar-row button:hover,.bar-row a:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.bar-row .p{background:#f4f4f2;border-color:#ddd;color:var(--ink)}
.bar-row .lk{border:none;color:var(--ink);font-weight:700;text-decoration:underline}

/* ── MAP ── */
/* MarkerCluster — custom cluster icons coloured by dominant category */
.marker-cluster{border-radius:50%!important}
.marker-cluster div{font-family:var(--font);font-weight:800}
/* Individual specimen dot markers — override default Leaflet icon styles */
.qm-dot{background:none!important;border:none!important}
/* Temporal range slider */
.map-temporal{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:600;background:rgba(255,255,255,.96);border:1px solid #ddd;border-radius:2px;padding:8px 14px 6px;font-family:var(--font);width:min(520px,calc(100% - 240px));display:none;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:padding .15s,width .15s}
.map-temporal.vis{display:block}
.map-temporal.collapsed{padding:4px 10px;width:auto;left:50%;transform:translateX(-50%)}
.map-temporal.collapsed .mt-hist,.map-temporal.collapsed .mt-slider{display:none}
.map-temporal.collapsed .mt-label{display:none}
.map-temporal .mt-tog{border:none;background:none;cursor:pointer;font-size:12px;color:var(--muted);padding:2px 4px;line-height:1;font-family:var(--font);min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;margin:-4px -6px -4px 0;flex-shrink:0}
.map-temporal .mt-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.map-temporal .mt-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.map-temporal .mt-range{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
.map-temporal .mt-hist{display:flex;align-items:flex-end;height:28px;gap:1px;margin-bottom:4px}
.map-temporal .mt-hist-bar{flex:1;background:#ddd;border-radius:1px 1px 0 0;min-width:2px;transition:background .15s,height .15s}
.map-temporal .mt-hist-bar.active{background:var(--green)}
.map-temporal .mt-slider{position:relative;height:20px;margin-top:2px}
.map-temporal .mt-track{position:absolute;top:8px;left:0;right:0;height:4px;background:#e4e4e0;border-radius:2px}
.map-temporal .mt-fill{position:absolute;top:8px;height:4px;background:var(--ink);border-radius:2px}
.map-temporal .mt-thumb{position:absolute;top:2px;width:16px;height:16px;background:var(--ink);border:2px solid #fff;border-radius:2px;cursor:ew-resize;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:2;transform:translateX(-8px);transition:box-shadow .12s}
.map-temporal .mt-thumb:hover,.map-temporal .mt-thumb:active{box-shadow:0 2px 8px rgba(0,0,0,.3)}
/* Cursor coordinates display */
.map-coords{position:absolute;bottom:30px;left:10px;z-index:500;background:rgba(255,255,255,.92);border-radius:2px;padding:4px 8px;font-family:var(--font);font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.2px;pointer-events:none}
.map-c{width:100%;height:100%;position:relative}
#map{width:100%;height:100%;background:#e8e6de}
.map-top{position:absolute;top:10px;left:52px;z-index:600;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.map-pill{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.95);border:1px solid #ddd;border-radius:2px;padding:4px 8px;font-size:12px}
.map-pill select,.map-pill input{font-family:var(--font);font-size:12px;border:1px solid #ddd;border-radius:2px;padding:4px 6px;background:#fff;outline:none;min-height:28px}
.map-pill button{font-family:var(--font);font-size:12px;font-weight:600;border:1px solid #ddd;border-radius:2px;padding:4px 8px;background:#fff;cursor:pointer;min-height:28px}
.map-pill button:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.map-pill button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
/* Tools popover */
.map-tools-wrap{position:relative}
.map-tools-btn{font-family:var(--font);font-size:13px;font-weight:700;border:1px solid #ddd;border-radius:2px;padding:4px 10px;background:rgba(255,255,255,.95);cursor:pointer;min-height:36px;min-width:36px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:var(--tr)}
.map-tools-btn:hover,.map-tools-btn.open{background:var(--ink);color:#fff;border-color:var(--ink)}
.map-tools-pop{display:none;position:absolute;top:calc(100% + 4px);left:0;background:rgba(255,255,255,.97);border:1px solid #ddd;border-radius:2px;padding:8px 10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:610;min-width:180px;font-size:12px}
.map-tools-pop.open{display:block}
.map-tools-pop label{display:flex;align-items:center;gap:6px;padding:6px 0;cursor:pointer;white-space:nowrap;min-height:36px}
.map-tools-pop label:not(:last-child){border-bottom:1px solid #eee}
.map-tools-pop .mtp-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:8px 0 2px;margin-top:4px;border-top:1px solid #eee}
.map-tools-pop .mtp-section:first-child{margin-top:0;border-top:none;padding-top:0}
.map-tools-pop button{font-family:var(--font);font-size:12px;font-weight:600;border:1px solid #ddd;border-radius:2px;padding:6px 10px;background:#fff;cursor:pointer;width:100%;text-align:left;min-height:36px;margin:2px 0}
.map-tools-pop button:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.map-legend{position:absolute;bottom:10px;right:10px;z-index:600;background:rgba(255,255,255,.95);border:1px solid #ddd;border-radius:2px;padding:10px;max-width:200px;max-height:240px;overflow-y:auto;font-size:11px}
.map-legend.shut .ml-body{display:none}
.ml-head{font-weight:700;font-size:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ml-item{display:flex;align-items:center;gap:4px;padding:2px 0}
.ml-dot{width:10px;height:10px;border-radius:1px;flex-shrink:0}
.ml-nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.map-info{position:absolute;bottom:54px;left:10px;z-index:500;background:rgba(255,255,255,.95);border-radius:2px;padding:5px 8px;font-size:11px;color:var(--muted)}
.nntt-wrap{position:relative}
.nntt-drop{position:absolute;top:100%;left:0;right:0;min-width:280px;max-height:260px;overflow-y:auto;background:#fff;border:1px solid #bbb;border-top:0;border-radius:0 0 3px 3px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:700;font-size:12px}
.nntt-drop-item{padding:6px 8px;cursor:pointer;border-bottom:1px solid #f0f0f0;line-height:1.35}
.nntt-drop-item:hover{background:#f5f3ee}
.nntt-drop-item .nntt-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:1px 4px;border-radius:2px;color:#fff;margin-left:4px;vertical-align:middle}
.nntt-drop-item .nntt-type.det{background:#2d6a4f}.nntt-drop-item .nntt-type.app{background:#e07c24}.nntt-drop-item .nntt-type.rntbc{background:#4361a0}
.nntt-drop-item .nntt-type.bio{background:#00a561}.nntt-drop-item .nntt-type.prot{background:#2a8f9d}.nntt-drop-item .nntt-type.drain{background:#1f5378}.nntt-drop-item .nntt-type.nntt{background:#864a7e}.nntt-drop-item .nntt-type.veg{background:#4a7a2e}
.nntt-drop-item .nntt-type.subbio{background:#3a9e6e}.nntt-drop-item .nntt-type.lga{background:#c06a00}.nntt-drop-item .nntt-type.marine{background:#0077b6}
.nntt-drop-item .nntt-type.capad{background:#1a6e5c}.nntt-drop-item .nntt-type.cmarine{background:#005082}
.nntt-active{display:flex;align-items:center;gap:4px;font-size:11px;max-width:220px}
.nntt-active .nntt-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}

/* ── TABLE ── */

/* ── CHARTS ── */
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--hair)}
.ch-p{background:#fff;border:none;border-radius:0;padding:16px}
.ch-p.w{grid-column:1/-1}
.ch-t{font-size:12px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.3px}
.ch-t .al{width:3px;height:12px;border-radius:1px}
.hb{display:flex;flex-direction:column;gap:4px}
.hb-item{display:flex;align-items:center;gap:5px}
.hb-nm{width:100px;font-size:11px;font-weight:500;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.hb-track{flex:1;height:18px;background:#f4f4f2;border-radius:1px;overflow:hidden}
.hb-fill{height:100%;border-radius:1px;display:flex;align-items:center;padding-left:5px;transition:width .3s}
.hb-val{font-size:10px;font-weight:700;color:#fff;white-space:nowrap}

/* ── PAGINATION ── */
.pag{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px}
.pg-btn{font-family:var(--font);font-size:12px;font-weight:600;padding:10px 16px;border:1px solid var(--hair);border-radius:2px;background:#fff;color:var(--ink);cursor:pointer;transition:var(--tr);min-height:44px;text-transform:uppercase;letter-spacing:.3px}
.pg-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}.pg-btn:disabled{opacity:.25;cursor:default}
.pg-info{font-size:12px;color:var(--muted);padding:0 8px}

/* ── MODAL ── */
.mod-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(2px);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px}
.mod-bg.open{display:flex}
.mod-dlg{background:#fff;border-radius:2px;box-shadow:0 20px 60px rgba(0,0,0,.4);width:min(1100px,96vw);height:min(88vh,800px);overflow:hidden;display:flex;flex-direction:row;animation:mIn .15s ease-out}
@keyframes mIn{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
/* Left: image panel */
.mod-left{flex:0 0 45%;background:#111;display:flex;align-items:stretch;justify-content:center;position:relative;overflow:hidden}
.m-img-wrap{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) transparent}
.m-img-wrap::-webkit-scrollbar{width:5px}.m-img-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.m-img-strip{display:flex;flex-direction:column;align-items:center;gap:2px;padding:2px;min-height:100%;justify-content:center}
.m-img-strip img{max-width:100%;object-fit:contain;display:block;flex-shrink:0}
/* When multiple images, don't center - allow scroll from top */
.m-img-strip.multi{justify-content:flex-start}
/* Right: details panel */
.mod-right{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.mod-right-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 20px 10px;flex-shrink:0}
.mod-x{font-family:var(--font);font-size:11px;font-weight:600;border:1px solid var(--hair);background:#fff;color:var(--muted);cursor:pointer;padding:8px 14px;border-radius:2px;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px;min-height:44px}.mod-x:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.mod-right-body{padding:0 20px 16px;overflow-y:auto;flex:1}
.m-sci{font-size:18px;font-weight:800;letter-spacing:-.3px}.m-sci.it{font-style:italic}
.m-com{font-size:12px;color:var(--muted);margin-top:2px}
/* Responsive: stack on narrow screens */
@media(max-width:700px){.mod-dlg{flex-direction:column;height:92vh}.mod-left{flex:0 0 40%;min-height:200px}}
/* Modal detail elements */
.tax-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.tc{font-size:10px;font-weight:500;padding:3px 7px;border-radius:2px;background:#f4f4f2;color:var(--muted);cursor:pointer;transition:var(--tr)}
.tc:hover{background:var(--ink);color:#fff}.tc .rk{font-weight:700;color:var(--ink)}
.tc:hover .rk{color:#fff}
.det-flow{display:flex;flex-wrap:wrap;gap:2px 12px;padding:4px 0;font-size:12px;line-height:1.6}
.det-flow .df{white-space:nowrap}
.det-flow .df .k{font-weight:700;color:var(--muted);text-transform:uppercase;font-size:9px;letter-spacing:.4px;margin-right:3px}
.det-flow .df .v{font-weight:500;color:var(--ink)}
.det-flow .df .v.it{font-style:italic}
.det-flow .df .v a{color:var(--ink);text-decoration:underline;font-weight:500}
.det-flow .df .v a:hover{color:var(--green-d)}
.det-flow .df.wide{white-space:normal;flex-basis:100%}
.det-sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-top:12px;margin-bottom:2px;padding-bottom:3px;border-bottom:1px solid var(--hair);display:flex;align-items:center;gap:5px}
.det-sec .ds{width:4px;height:4px;border-radius:1px}
.spatial-loading{font-size:10px;color:var(--muted);font-style:italic;padding:4px 0}
.spatial-ack{font-size:12px;line-height:1.5;color:var(--ink);padding:4px 0;border-left:2px solid var(--ink);padding-left:8px;margin:4px 0}
.type-badge{display:inline-block;color:#fff;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:1px;margin-bottom:4px}
.auth-line{font-size:11px;color:var(--muted);margin-top:3px}
.auth-line em{color:var(--ink);font-style:normal;font-weight:600}


/* ── MISC ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 14px;gap:12px}
.spinner{width:24px;height:24px;border:2px solid #ddd;border-top-color:var(--ink);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-t{font-size:13px;font-weight:500;color:var(--muted)}
.empty{text-align:center;padding:40px 14px;color:var(--muted)}.empty .ico{font-size:32px;margin-bottom:8px;font-style:normal}
.empty h3{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:4px}.empty p{font-size:12px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:#000;color:#fff;padding:8px 18px;border-radius:2px;font-size:12px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;z-index:99999;pointer-events:none;letter-spacing:.2px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hero{padding:32px 20px;text-align:left;max-width:500px;margin:0}
.hero h2{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.hero p{font-size:13px;color:var(--muted);line-height:1.55}
.hero .badges{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.hero .badge{font-size:10px;font-weight:600;padding:4px 8px;border:1px solid var(--hair);border-radius:2px;background:#fff;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.hero .badge.on{background:var(--ink);border-color:var(--ink);color:#fff}
.vp{display:none}.vp.on{display:block}
@media(max-width:900px){.lay{grid-template-columns:1fr}.side{display:none}.ch-grid,.gu-focus{grid-template-columns:1fr}.gal,.gu-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}.map-top{left:8px}}
</style>
</head>
<body>

<a href="#scroll" class="skip-link">Skip to content</a>

<header class="hdr" role="banner">
  <div class="hdr-brand"><div class="hdr-logo" aria-hidden="true">QM</div><div class="hdr-t"><span class="t1">Queensland Museum</span><span class="t2">Collections Explorer</span></div></div>
  <div class="hdr-search" role="search"><span class="si" id="searchIcon" aria-hidden="true">⌕</span><input type="text" id="q" placeholder="Search by common name, species, family…" autocomplete="off" aria-label="Search collections"/><button class="srst" id="searchRst" title="Clear search &amp; filters" aria-label="Clear search and filters">✕</button></div>
  <div class="hdr-r">
    
    <button class="tog-btn" id="togSide" aria-label="Toggle filter sidebar (keyboard shortcut: [)" aria-expanded="true" aria-controls="side">≡ Filters</button>
  </div>
</header>

<div class="chip-bar" id="chipBar" role="status" aria-live="polite" aria-label="Active filters"></div>

<div class="lay" id="lay">
  <aside class="side" id="side" role="complementary" aria-label="Filters">
    <div class="sec"><div class="sec-t"><span class="d" style="background:var(--green)" aria-hidden="true"></span> Snapshot</div>
      <div class="stats-g" role="group" aria-label="Collection snapshot"><div class="sc a"><div class="sv" id="sRec" aria-label="Record count">—</div><div class="sl">Records</div></div><div class="sc"><div class="sv" id="sFam" aria-label="Family count">—</div><div class="sl">Families</div></div><div class="sc"><div class="sv" id="sGen" aria-label="Genera count">—</div><div class="sl">Genera</div></div></div></div>
    <hr class="hr"/>
    <div class="sec"><div class="sec-t"><span class="d" style="background:var(--blue)" aria-hidden="true"></span> Taxonomy</div>
      <div class="fg"><label for="fK">Kingdom</label><select id="fK"><option value="">All Kingdoms</option></select></div>
      <div class="fr"><div class="fg"><label for="fP">Phylum</label><select id="fP"><option value="">All Phyla</option></select></div><div class="fg"><label for="fC">Class</label><select id="fC"><option value="">All Classes</option></select></div></div>
      <div class="fr"><div class="fg"><label for="fO">Order</label><select id="fO"><option value="">All Orders</option></select></div><div class="fg"><label for="fF">Family</label><select id="fF"><option value="">All Families</option></select></div></div>
      <div class="fr"><div class="fg"><label for="fG">Genus</label><select id="fG"><option value="">All Genera</option></select></div><div class="fg"><label for="fSp">Species</label><select id="fSp"><option value="">All Species</option></select></div></div></div>
    <hr class="hr"/>
    <div class="sec"><div class="sec-t"><span class="d" style="background:var(--orange)" aria-hidden="true"></span> Record Filters</div>

  if(lifeTerms.test(sV)&&!lV) return{sex:'',lifeStage:sV};

/* ICZN italic rules: genus and below are italicized; family and above are not.
   Returns true if name should be italicized (genus or species level) */
function shouldItalic(name){
  if(!name)return false;
  const n=name.trim();
  if(!n)return false;
  /* All uppercase = higher rank (e.g. CARABIDAE) */
  if(/^[A-Z]+$/.test(n))return false;
  /* Binomial/trinomial: "Genus species" or "Genus species subsp" → italic */
  if(n.includes(' ')){

     tribe -ini, superfamily -oidea, order -ales/-iformes/-ptera/-ura/-phora,
     phylum -phyta/-mycota/-opsida/-ata/-poda/-oza,

  if(/(?:idae|inae|ini|oidea|ales|iformes|ptera|ura|phora|phyta|mycota|opsida|ata|poda|oza)$/i.test(n))return false;

/* Build base ALA filter queries (shared by alaFetch and quality count queries) */
function alaBaseFQ(f){
  const fq=[`institution_uid:${S.alaInst}`];
  if(f.kingdom)fq.push(`kingdom:"${f.kingdom}"`);if(f.phylum)fq.push(`phylum:"${f.phylum}"`);
  if(f.class_)fq.push(`class:"${f.class_}"`);if(f.order)fq.push(`order:"${f.order}"`);
  if(f.family)fq.push(`family:"${f.family}"`);if(f.genus)fq.push(`genus:"${f.genus}"`);
  if(f.species)fq.push(`species:"${f.species}"`);
  if(f.hasType==='true')fq.push('-type_status:"notatype"','type_status:[* TO *]');
  else if(f.hasType==='primary'){
    /* Primary types only: positive inclusion with case variants.
       ALA Solr type_status is case-sensitive — cover all common forms. */
    const pts=['holotype','Holotype','HOLOTYPE','neotype','Neotype','NEOTYPE','type','Type','TYPE','lectotype','Lectotype','LECTOTYPE','syntype','Syntype','SYNTYPE'];
    fq.push('('+pts.map(t=>`type_status:"${t}"`).join(' OR ')+')');
  }
  else if(f.hasType==='false')fq.push('(type_status:"notatype" OR (*:* AND -type_status:[* TO *]))');
  if(f.collCode)fq.push(`collection_uid:"${f.collCode}"`);
  if(f.coord==='true')fq.push('geospatial_kosher:true');else if(f.coord==='false')fq.push('-geospatial_kosher:true');
  if(f.media)fq.push('multimedia:"Image"');
  if(f.state)fq.push(`state:"${f.state}"`);
  if(f.country==='AU')fq.push('country:"Australia"');else if(f.country)fq.push(`country_code:"${f.country}"`);
  if(f.catNum){
    const cn=f.catNum;
    if(cn.includes('*'))fq.push(`catalogue_number:${cn}`);
    else fq.push(`catalogue_number:"${cn}"`);
  }
  if(f.bbox){const b=f.bbox;fq.push(`latitude:[${b.s} TO ${b.n}]`);fq.push(`longitude:[${b.w} TO ${b.e}]`)}
  return fq;
}

/* CORS-safe fq: ALA drops the Access-Control-Allow-Origin header when several
   filters are AND-joined into ONE fq param (the browser then blocks the response,
   which the service worker reports as "ALA 503"). Sending each clause as a
   SEPARATE fq param keeps the header. Always build fq through these helpers.
   appendFQ() adds clauses to a URLSearchParams; fqQS() returns an &fq=…&fq=…
   string for hand-built URLs. */
function appendFQ(u,clauses){(Array.isArray(clauses)?clauses:[clauses]).forEach(c=>{if(c)u.append('fq',c)});return u}
function fqQS(clauses){return (Array.isArray(clauses)?clauses:[clauses]).filter(Boolean).map(c=>'fq='+encodeURIComponent(c)).join('&')}

/* Compute quality counts from actual records (for polygon mode where API counts include bbox-only records) */
function computeLocalQC(recs){
  let georef=0,media=0,typed=0;
  for(const r of recs){
    if(r.lat!=null&&r.lng!=null)georef++;
    if(r.media&&r.media.length)media++;
    if(isType(r.typeStatus))typed++;
  }
  return{georef,media,typed};
}
/* Compute richness from actual records */
function computeLocalRichness(recs){
  const fams=new Set(),gens=new Set(),spp=new Set();
  for(const r of recs){
    if(r.family)fams.add(r.family);
    if(r.genus)gens.add(r.genus);

  }

/* Compute analytics facets from actual records */
function computeLocalAnalyticsFacets(recs){
  const collectors=new Map(),basis=new Map(),years=new Map(),months=new Map();
  for(const r of recs){
    if(r.recBy){const k=r.recBy;collectors.set(k,(collectors.get(k)||0)+1)}
    if(r.basis){const k=r.basis;basis.set(k,(basis.get(k)||0)+1)}
    if(r.year){const k=String(r.year);years.set(k,(years.get(k)||0)+1)}
    if(r.month){const k=String(r.month);months.set(k,(months.get(k)||0)+1)}
  }
  const toArr=(m)=>[...m.entries()].map(([name,count])=>({name,value:name,count})).sort((a,b)=>b.count-a.count);
  return{collector:toArr(collectors),basis_of_record:toArr(basis),year:toArr(years),month:toArr(months)};
}
/* Compute taxonomy facets from actual records */
/* ── Client-side filter for polygon master records ── 
   Applies taxonomy, collection, type, media, georef, country, state, catalog,
   and search query filters to a set of records. Used when polygon is active
   so that filter changes don't require re-querying the ALA API. */
function clientFilterRecs(recs, f){
  return recs.filter(r=>{
    if(f.kingdom && r.kingdom !== f.kingdom) return false;
    if(f.phylum && r.phylum !== f.phylum) return false;
    if(f.class_ && r.class_ !== f.class_) return false;
    if(f.order && r.order !== f.order) return false;
    if(f.family && r.family !== f.family) return false;
    if(f.genus && r.genus !== f.genus) return false;
    if(f.species && r.species !== f.species) return false;
    if(f.collCode && (r.collUid || r.coll || '') !== f.collCode) return false;
    if(f.hasType === 'true' && !isType(r.typeStatus)) return false;
    if(f.hasType === 'primary'){
      const ts = (r.typeStatus||'').toLowerCase();
      if(!ts || !/(^|\s)(holotype|neotype|type|lectotype|syntype)(\s|$)/i.test(r.typeStatus)) return false;
    }
    if(f.hasType === 'false' && isType(r.typeStatus)) return false;
    if(f.coord === 'true' && (r.lat == null || r.lng == null)) return false;
    if(f.coord === 'false' && r.lat != null && r.lng != null) return false;
    if(f.media && (!r.media || !r.media.length)) return false;
    if(f.country === 'AU' && r.country !== 'Australia') return false;
    if(f.country && f.country !== 'AU'){
      /* Map ISO codes to country names for client-side matching */
      const _cmap={'PG':'Papua New Guinea','NZ':'New Zealand','FJ':'Fiji','SB':'Solomon Islands','ID':'Indonesia','NC':'New Caledonia'};
      const cname=_cmap[f.country]||f.country;
      if((r.country||'') !== cname) return false;
    }
    if(f.state && r.state !== f.state) return false;
    if(f.catNum){
      const cn = f.catNum;
      if(cn.includes('*')){
        const re = new RegExp('^' + cn.replace(/\*/g, '.*') + '$', 'i');
        if(!re.test(r.cat||'')) return false;
      } else {
        if((r.cat||'').toLowerCase() !== cn.toLowerCase()) return false;
      }
    }
    if(f.q && f.q !== '*:*'){
      const qLo = f.q.replace(/^"|"$/g, '').toLowerCase();
      const haystack = [r.sci, r.vern, r.cat, r.family, r.genus, r.order, r.recBy, r.locality].join(' ').toLowerCase();
      if(!haystack.includes(qLo)) return false;
    }
    return true;
  });
}

/* Compute "available options" facets for dropdowns in polygon mode.
   For each filter dimension, counts come from records that match ALL OTHER active filters
   EXCEPT the filter being counted. This way, selecting "Entomology" still shows all other
   collections and their counts (filtered by any active taxonomy constraints).
   For simplicity and performance, we use the master set filtered by all non-self filters. */
function computePolyDropdownFacets(masterRecs, f){
  /* Build a local collection UID-to-name map from records (fallback if API facets unavailable) */
  for(const r of masterRecs){
    if(r.collUid && r.coll && r.collUid !== r.coll && !S._collUidMap.has(r.collUid)){
      S._collUidMap.set(r.collUid, r.coll);
    }
  }
  /* Helper: get the best collection key for a record.
     ALA occurrence records may have collUid (e.g. "co50"), coll (e.g. "Entomology"), or both.
     Use collUid if present, otherwise fall back to coll. */
  function recCollKey(r){ return r.collUid || r.coll || '' }

  /* For each facet, compute counts from records matching all OTHER filters */
  const dims = {
    kingdom:   {field:'kingdom',  filterKey:'kingdom'},
    phylum:    {field:'phylum',   filterKey:'phylum'},
    'class':   {field:'class_',   filterKey:'class_'},
    order:     {field:'order',    filterKey:'order'},
    family:    {field:'family',   filterKey:'family'},
    genus:     {field:'genus',    filterKey:'genus'},
    species:   {field:'species',  filterKey:'species'},
    collection_uid: {field:null, getter:recCollKey, filterKey:'collCode'},
    state:     {field:'state',    filterKey:'state'},
    type_status: {field:'typeStatus', filterKey:null},
  };
  const result = {};
  for(const [facetName, dim] of Object.entries(dims)){
    const relaxedF = {...f};
    /* Relax this specific filter so we see all available options */
    if(dim.filterKey === 'kingdom') relaxedF.kingdom = '';
    else if(dim.filterKey === 'phylum') relaxedF.phylum = '';
    else if(dim.filterKey === 'class_') relaxedF.class_ = '';
    else if(dim.filterKey === 'order') relaxedF.order = '';
    else if(dim.filterKey === 'family') relaxedF.family = '';
    else if(dim.filterKey === 'genus') relaxedF.genus = '';
    else if(dim.filterKey === 'species') relaxedF.species = '';
    else if(dim.filterKey === 'collCode') relaxedF.collCode = '';
    else if(dim.filterKey === 'state') relaxedF.state = '';
    
    const subset = clientFilterRecs(masterRecs, relaxedF);
    const counts = new Map();
    for(const r of subset){
      const v = dim.getter ? dim.getter(r) : r[dim.field];
      if(v && v !== 'notatype') counts.set(v, (counts.get(v)||0) + 1);
    }
    result[facetName] = [...counts.entries()].map(([key, count]) => {
      const displayName = (facetName === 'collection_uid' && S._collUidMap.has(key)) ? S._collUidMap.get(key) : key;
      return {name: displayName, value: key, count};
    }).sort((a, b) => b.count - a.count);
  }
  return result;
}

const _genericVernSet=new Set([
  /* Kingdom/phylum level — must never display */
  'animal','animals','plant','plants','fungus','fungi','alga','algae','protist',
  'ant','bee','wasp','fly','beetle','bug','moth','butterfly','spider','mite','tick',

  'coral','anemone','jellyfish','sponge','hydroid','bryozoan',
  'coral or anemone','moth or butterfly','wasp, bee or ant','mite or tick',
  'shark or ray',
  /* ALA plural / "and" variants */
  'corals','anemones','sponges','bryozoans','hydroids',
  'corals and anemones','corals or anemones',
  'moths and butterflies','moths or butterflies',
  'wasps, bees and ants','wasps bees and ants',

  'centipedes','millipedes','scorpions','harvestmen',
  'beetles','ants','bees','wasps','flies','moths','butterflies','spiders',

  'birds','parrots','owls','bats','rats',
  'starfish','sea star','sea urchin','sea cucumber',
  'cicada','leafhopper','planthopper','spittlebug','weevil','ladybird',
  'mosquito','midge','hoverfly','hover fly','crane fly','blow fly',
]);
function classifyBackboneVern(name){
  if(!name)return null;
  const lo=name.trim().toLowerCase();
  /* Check against known generics first — includes multi-word entries like "sea star" */
  if(_genericVernSet.has(lo))return'generic';
  /* Try basic singularisation: "centipedes" → "centipede", "butterflies" → "butterfly" */
  const sing=lo.replace(/ies$/,'y').replace(/ves$/,'f').replace(/men$/,'man').replace(/(?<!s)s$/,'');
  if(sing!==lo&&_genericVernSet.has(sing))return'generic';
  /* Multi-word names not in the set are usually specific enough */
  if(lo.includes(' '))return'species';
  /* Single-word not in our list — cautiously trust it */
  return'species';
}

function normRec_A(r){
  const cat = r.catalogNumber || r.raw_catalogNumber || r.catalogue_number || r.catalogueNumber || '';
  const coll = r.collectionCode || r.raw_collectionCode || r.collectionUid || r.collection_uid || '';
  const collUid = r.collectionUid || r.collection_uid || '';
  /* Smart sci name: prefer raw name when processed name is a higher-rank fallback.
     ALA sets scientificName to family/order when it can't match species in its backbone. 
     Signs of a higher-rank fallback: single word, all-caps, matches family/order, or ends in -idae/-inae/-ales */
  const procSci=(r.scientificName||'').trim();
  const rawSci=(r.raw_scientificName||'').trim();
  let bestSci=procSci||rawSci;
  if(procSci&&rawSci&&procSci!==rawSci){
    const isHigherRank=!procSci.includes(' ') && (
      procSci===r.family||procSci===r.order||procSci===r.kingdom||procSci===r.phylum||

  return{key:r.uuid,sci:bestSci,vern:_vn,vernRank:_vn?classifyBackboneVern(_vn):null,

    basis:r.basisOfRecord||r.raw_basisOfRecord||'',year:r.year?parseInt(r.year):null,month:r.month?parseInt(r.month):null,day:r.day?parseInt(r.day):null,
    lat:toNum(r.decimalLatitude)??toNum(r.latitude)??toNum(r.raw_decimalLatitude)??parseLatLong(r.latLong)[0],lng:toNum(r.decimalLongitude)??toNum(r.longitude)??toNum(r.raw_decimalLongitude)??parseLatLong(r.latLong)[1],country:r.country||'',state:r.stateProvince||r.state||'',locality:r.raw_locality||r.locality||'',
    cat:cat,coll:coll,collUid:collUid,inst:r.institutionCode||r.raw_institutionCode||'QM',recBy:toStr(r.collector||r.recordedBy||r.raw_recordedBy||r.raw_collector),
    media:dedupImgs([r.largeImageUrl,r.imageUrl,r.smallImageUrl].filter(Boolean)),
    /* Darwin Core extras */
    typeStatus:safe$(r.typeStatus||r.raw_typeStatus),
    authorship:extractAuth(bestSci,safe$(r.scientificNameAuthorship||r.raw_scientificNameAuthorship)),
    preparations:safe$(r.preparations||r.raw_preparations),
    sex:_sl.sex,
    eventDate:safe$(r.eventDate||r.raw_eventDate),
    verbatimDate:safe$(r.verbatimEventDate||r.raw_verbatimEventDate),
    samplingProtocol:safe$(r.samplingProtocol||r.raw_samplingProtocol||r.samplingMethod||r.raw_samplingMethod),
    elevMin:toNum(r.minimumElevationInMeters??r.el1),
    elevMax:toNum(r.maximumElevationInMeters),

/* KEY FIX: always normalize facet field names to lowercase */
function extractFacets_A(data){
  const f={};
  const JUNK=/^(not supplied|not provided|unknown|n\/a|\s*)$/i;
  (data.facetResults||[]).forEach(fac=>{
    f[fac.fieldName]=(fac.fieldResult||[]).map(c=>{
      // ALA facets have: label (human name), count, fq (filter query like 'collection_uid:"co50"')
      // For UID-based facets, we need the raw value from fq, not the label
      let val=c.label;
      if(c.fq){
        const m=c.fq.match(/"([^"]+)"/);
        if(m)val=m[1];
        else{
          const m2=c.fq.match(/:(.+)/);
          if(m2)val=m2[1];
        }
      }
      return{name:c.label,value:val,count:c.count};
    }).filter(c=>!JUNK.test(c.name)&&!JUNK.test(c.value));
    if(fac.fieldName==='collection_uid'){
      (f[fac.fieldName]||[]).forEach(c=>{if(c.value&&c.name&&c.value!==c.name)S._collUidMap.set(c.value,c.name)});
    }
  });
  return f;
}

        else{

    }else{

      S._polyAllRecs=null;
      S._polyMasterRecs=null;S._polyMasterDone=false;S._polyMasterBboxTotal=0;
      const fq=alaBaseFQ(f);
        const recU=new URLSearchParams();recU.set('q',f.q||'*:*');appendFQ(recU,fq);
        recU.set('pageSize',INIT_PAGE);recU.set('startIndex',S.off);recU.set('facets','');recU.set('flimit','0');

/* Load georeferenced records for the map.
   ALA serves at most ALA_MAX_RESULTS (5000) per query and no cursor bypasses
   that. So for a query with more georeferenced records than the window, we
   PARTITION space with a quadtree: count each lat/long tile, and recursively
   split any tile over the window until every leaf is small enough to offset-page
   in full. Records on a tile boundary can appear in two tiles, so we dedupe by
   uuid. Tiles only ever match georeferenced records (a lat/long range excludes
   null coordinates), which is exactly what the map needs. */
async function bgLoadAllPages(f,loadId){
  /* Prevent concurrent loads with same loadId */
  if(S._bgRunning===loadId)return;
  S._bgRunning=loadId;
  const total=S.total;
  if(total<=0){S._bgRunning=null;return}
  const cap=S.mapUncapped?Infinity:MAP_POINT_CAP;
  const API='https://biocache-ws.ala.org.au/ws/occurrences/search?';
  const seen=new Set();
  const allGeo=[];
  let lastRedraw=0;
  S.mapFetched=0;
  if(S.view==='map')updateMapInfo();

  const cancelled=()=>S.mapLoadId!==loadId;
  const capReached=()=>!S.mapUncapped&&allGeo.length>=cap;
  const addGeo=r=>{
    if(r.lat==null||r.lng==null)return;
    const k=r.uuid||(r.lat+','+r.lng+'|'+(r.catalog||r.sci||''));
    if(seen.has(k))return;
    seen.add(k);allGeo.push(r);
  };
  const redraw=force=>{
    if(cancelled())return;
    S.allPts=allGeo;S.mapFetched=allGeo.length;
    if(S.view==='map'){
      try{updateMapInfo()}catch(e){}
      if(force||allGeo.length-lastRedraw>=2000){try{addMarkers()}catch(e){}lastRedraw=allGeo.length}
    }
  };

  const CONCURRENCY=4; /* parallel page fetches — gentle on ALA, ~4x faster than serial */
  /* One ALA GET with retry on transient failures (5xx / 429 / network). Returns
     parsed JSON, or null if non-retryable or retries exhausted. */
  async function fetchJSON(qs){
    for(let attempt=0;attempt<5;attempt++){
      if(cancelled())return null;
      try{
        const r=await fetch(API+qs);
        if(cancelled())return null;
        if(r.ok)return await r.json();
        if(r.status>=500||r.status===429){await new Promise(z=>setTimeout(z,400*(attempt+1)));continue}
        return null; /* other 4xx — not retryable */
      }catch(e){await new Promise(z=>setTimeout(z,400*(attempt+1)))}
    }
    return null;
  }
  /* Count records matching f within an optional bbox. Returns count, or -1 on failure. */
  async function countTile(bbox){
    const ff=bbox?Object.assign({},f,{bbox}):f;
    const u=new URLSearchParams();
    u.set('q',f.q||'*:*');appendFQ(u,alaBaseFQ(ff));
    u.set('pageSize','0');u.set('facets','');u.set('flimit','0');
    const d=await fetchJSON(''+u);
    return d?(d.totalRecords||0):-1;
  }
  /* Fetch all records (up to the 5000 window) matching f within an optional bbox,
     paging with bounded concurrency. count = the tile's known total. */
  async function pageTile(bbox,count){
    const ff=bbox?Object.assign({},f,{bbox}):f;
    const fqArr=alaBaseFQ(ff);
    const n=Math.min(count,ALA_MAX_RESULTS);
    const offsets=[];for(let off=0;off<n;off+=ALA_MAX_PAGE)offsets.push(off);
    let idx=0;
    const worker=async()=>{
      while(idx<offsets.length){
        if(cancelled()||capReached())return;
        const off=offsets[idx++];
        const sz=Math.min(ALA_MAX_PAGE,n-off);
        const u=new URLSearchParams();
        u.set('q',f.q||'*:*');appendFQ(u,fqArr);
        u.set('pageSize',sz);u.set('startIndex',off);u.set('facets','');u.set('flimit','0');
        const d=await fetchJSON(''+u);
        if(cancelled())return;
        if(d&&d.occurrences)d.occurrences.map(normRec_A).forEach(addGeo);
        redraw(false);
      }
    };
    await Promise.all(Array.from({length:Math.min(CONCURRENCY,offsets.length||1)},worker));
  }

  try{
    if(total<=ALA_MAX_RESULTS){
      /* Whole query fits in one window — no partitioning needed. */
      await pageTile(null,total);
    }else{
      /* Seed with the first window for instant feedback (deduped against the tree). */
      await pageTile(null,ALA_MAX_RESULTS);
      /* Quadtree: breadth-first over geographic tiles. Root at the active map
         box if there is one, else the whole globe (empty ocean tiles prune fast). */
      const MIN_SPAN=0.0005; /* ~50 m — floor to avoid infinite splitting on a single dense locality */
      const root=f.bbox?{s:f.bbox.s,n:f.bbox.n,w:f.bbox.w,e:f.bbox.e}:{s:-90,n:90,w:-180,e:180};
      const queue=[root];
      let hardFails=0;
      while(queue.length){
        if(cancelled()||capReached())break;
        const b=queue.shift();
        const c=await countTile(b);
        if(cancelled())return;
        if(c<0){ /* transient failure after retries — requeue a few times, then skip */
          b._fails=(b._fails||0)+1;
          if(b._fails<=3)queue.push(b);
          else{hardFails++;console.warn('[bgLoad] giving up on tile',b)}
          if(hardFails>20){console.error('[bgLoad] too many tile failures, stopping');break}
          continue;
        }
        if(c===0)continue;
        const span=Math.max(b.n-b.s,b.e-b.w);
        if(c<=ALA_MAX_RESULTS||span<=MIN_SPAN){
          await pageTile(b,c);
        }else{
          const ml=(b.s+b.n)/2,mg=(b.w+b.e)/2;
          queue.push({s:b.s,n:ml,w:b.w,e:mg},{s:b.s,n:ml,w:mg,e:b.e},
                     {s:ml,n:b.n,w:b.w,e:mg},{s:ml,n:b.n,w:mg,e:b.e});
        }
      }
    }
  }catch(e){console.error('[bgLoad]',e)}

  if(!cancelled()){
    S.allPts=allGeo;S.mapFetched=allGeo.length;
    S._bgRunning=null;
    if(S.view==='map'){try{addMarkers();updateMapInfo()}catch(e){}}
  }
}

/* ── Background polygon scan — builds MASTER cache of ALL polygon records (unfiltered) ── */
async function bgPolyScan(masterF,loadId,searchId,cursor,startCount,bboxTotal){
  if(S._bgRunning===loadId)return;
  S._bgRunning=loadId;
  const BATCH=ALA_MAX_PAGE;

  let alaFetched=cursor.alaFetched||0;
  let polyCount=startCount;
  const REC_CAP=S.mapUncapped?Infinity:50000;
  /* Seed with all MASTER records already found by fill-page (unfiltered) */
  const allMasterRecs=(S._polyMasterRecs||[]).slice();
  let failures=0;
  let lastUIUpdate=Date.now();

  const getScanned=()=>alaFetched;

  /* Offset-scan the bbox (stably id-sorted), bounded by ALA's 5000 window. */
  while(getScanned()<bboxTotal && alaFetched<ALA_MAX_RESULTS){
    if(S.mapLoadId!==loadId||S._searchId!==searchId||!S.mapPoly?.rings)return;
    try{
      /* Query ALA with UNFILTERED masterF (only institution + bbox — no taxonomy/collection) */
      const fqs=alaBaseFQ(masterF);
      const sz=Math.min(BATCH,ALA_MAX_RESULTS-alaFetched);
      const u=new URLSearchParams();u.set('q','*:*');appendFQ(u,fqs);
      u.set('pageSize',sz);u.set('startIndex',alaFetched);
      u.set('sort','id');u.set('dir','asc');
      u.set('facets','');u.set('flimit','0');
      const r=await fetch('https://biocache-ws.ala.org.au/ws/occurrences/search?'+u);
      if(S.mapLoadId!==loadId||S._searchId!==searchId)return;
      if(!r.ok)throw new Error('ALA '+r.status);
      const d=await r.json();
      if(S.mapLoadId!==loadId||S._searchId!==searchId)return;
      const rawOccs=d.occurrences||[];
      const recs=rawOccs.map(normRec_A);
      alaFetched+=rawOccs.length;
      if(!recs.length)break;
      for(const r of recs){
        if(!S.mapPoly?.rings)break;
        if(r.lat!=null&&r.lng!=null&&pointInPolygon(r.lat,r.lng,S.mapPoly.rings)){
          polyCount++;
          if(allMasterRecs.length<REC_CAP)allMasterRecs.push(r);
        }
      }
      /* Update UI periodically — apply user filters to show accurate filtered counts */
      const now=Date.now();
      if(now-lastUIUpdate>500){
        if(S.mapLoadId!==loadId||S._searchId!==searchId)return;
        lastUIUpdate=now;
        /* Update master cache in progress */
        S._polyMasterRecs=allMasterRecs;
        /* Apply current user filters for display */
        const userF=getFilters();
        const filtered=clientFilterRecs(allMasterRecs,userF);
        S.total=filtered.length;
        S._polyAllRecs=filtered;
        S.allPts=filtered.filter(r=>r.lat!=null&&r.lng!=null);
        const pct=Math.round(getScanned()/bboxTotal*100);
        try{$('#sRec').textContent=fmt(S.total)+' ⏳ '+pct+'%'}catch(e){}
        try{$('#rc').innerHTML=`<b>${fmt(S.total)}</b> records in area <span style="color:#f7941d">(scanning… ${pct}%)</span>`}catch(e){}
        if(S.view==='map'){try{updateMapInfo();addMarkers()}catch(e){}}
      }
    }catch(e){
      failures++;console.warn('[bgPolyScan]',e);
      if(failures>5){console.error('[bgPolyScan] Too many failures, stopping with partial count');break}
      await new Promise(r=>setTimeout(r,500));
    }
  }
  /* Scan complete — finalize master cache and recompute everything */
  if(S.mapLoadId===loadId&&S._searchId===searchId){
    S._polyMasterRecs=allMasterRecs;
    S._polyMasterDone=true;
    S._polyMasterBboxTotal=bboxTotal;
    S._bgRunning=null;
    S._polyScanDone=true;

    /* Apply current user filters to get the displayed set */
    const userF=getFilters();
    const filtered=clientFilterRecs(allMasterRecs,userF);
    S.total=filtered.length;
    S._polyAllRecs=filtered;
    S.res=filtered.slice(0,INIT_PAGE);
    S.allPts=filtered.filter(r=>r.lat!=null&&r.lng!=null);

    /* Compute analytics from FILTERED set */
    S.qc=computeLocalQC(filtered);
    S.richness=computeLocalRichness(filtered);
    S._qcStale=false;

    /* Compute dropdown facets from MASTER set using relax-self approach */
    const dropdownFacets=computePolyDropdownFacets(allMasterRecs,userF);
    Object.entries(dropdownFacets).forEach(([k,v])=>{S.facets[k]=v});
    const localAF=computeLocalAnalyticsFacets(filtered);
    Object.entries(localAF).forEach(([k,v])=>{S.facets[k]=v});

    try{updateStats()}catch(e){}
    try{updateDropdowns()}catch(e){}
    S.treeCache.clear();
    if(S.view==='taxa'){try{renderTaxa()}catch(e){}}
    if(S.view==='guide'){try{renderGuide()}catch(e){}}
    if(S.view==='charts'){try{renderCharts()}catch(e){}}

    const partial=failures>5;
    try{$('#sRec').textContent=fmt(S.total)+(partial?' ⚠':'')}catch(e){}
    try{$('#rc').innerHTML=`<b>${fmt(S.total)}</b> records in area${partial?' <span style="color:#c44" title="Scan incomplete due to network errors">⚠ partial</span>':''}`}catch(e){}
    try{updatePag()}catch(e){}
    try{const gc=$('#galCount');if(gc){
      let ct=S.res.length+' shown of '+fmt(S.total);
      ct+=` · <span style="color:#2d6a4f;font-weight:600">${esc(S.mapPoly.name)}</span>`;
      gc.innerHTML=ct;
    }}catch(e){}
    try{renderView()}catch(e){}
    if(S.view==='map'){try{addMarkers();updateMapInfo()}catch(e){}}
  }
}

/* Facet-only query for tree drill-down.
   In polygon mode, uses local polygon-filtered records for accurate counts. */
async function fetchChildFacets(ancestors,targetRank){
  const ck=JSON.stringify(ancestors)+'→'+targetRank;
  if(S.treeCache.has(ck))return S.treeCache.get(ck);

  /* Polygon mode: use local records */
  const polyRecs=S.mapPoly?.rings ? (S._polyAllRecs||S.res) : null;
  if(polyRecs&&polyRecs.length){
    const counts=new Map();
    for(const r of polyRecs){
      let match=true;
      for(const [ak,av] of Object.entries(ancestors)){
        const rk=ak==='class'?'class_':ak;
        if((r[rk]||'')!==av){match=false;break}
      }
      if(!match)continue;
      const v=r[targetRank==='class'?'class_':targetRank];
      if(v)counts.set(v,(counts.get(v)||0)+1);
    }
    const items=[...counts.entries()].map(([name,count])=>({name,value:name,count})).sort((a,b)=>b.count-a.count);
    S.treeCache.set(ck,items);return items;
  }

  /* Standard mode: query ALA API */
  const mapped={};Object.entries(ancestors).forEach(([k,v])=>{mapped[k==='class'?'class_':k]=v});
  const f={...getFilters(),...mapped};
  /* Some ranks (e.g. superfamily) aren't indexed by all APIs — try API first, fall back to client grouping */
  try{
    let items=[];
    const d=await alaFetch(f,0,1);
    const fac=extractFacets_A(d);
    items=(fac[targetRank]||[]).sort((a,b)=>b.count-a.count);
    /* If API returned nothing, try client-side grouping from loaded records */
    if(!items.length&&S.res.length){
      const counts=new Map();
      S.res.forEach(r=>{
        /* Check ancestors match */
        let match=true;
        for(const [ak,av] of Object.entries(ancestors)){
          const rk=ak==='class'?'class_':ak;
          if(r[rk]&&r[rk]!==av){match=false;break}
        }
        if(!match)return;
        const v=r[targetRank==='class'?'class_':targetRank];
        if(v)counts.set(v,(counts.get(v)||0)+1);
      });
      items=[...counts.entries()].map(([name,count])=>({name,value:name,count})).sort((a,b)=>b.count-a.count);
    }
    S.treeCache.set(ck,items);return items;
  }catch(e){
    console.warn('[fetchChildFacets] '+targetRank+' failed:',e.message);
    /* Last resort: client-side grouping */
    const counts=new Map();
    S.res.forEach(r=>{
      const v=r[targetRank==='class'?'class_':targetRank];
      if(v)counts.set(v,(counts.get(v)||0)+1);
    });
    const items=[...counts.entries()].map(([name,count])=>({name,value:name,count})).sort((a,b)=>b.count-a.count);
    S.treeCache.set(ck,items);return items;
  }
}
