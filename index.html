/* ═════════════════════════════════════════════════
   AREA SEARCH — bioregions, protected areas, drainage basins, NNTT
   ═════════════════════════════════════════════════ */
let _nnttTimer=null;
const _nnttSearchId={v:0};

async function searchNNTT(term){
  const id=++_nnttSearchId.v;
  const drop=$('#nnttDrop');if(!drop)return;
  if(term.length<2){drop.style.display='none';drop.innerHTML='';return}
  drop.style.display='';drop.innerHTML='<div style="padding:8px;color:var(--muted)">Searching…</div>';
  const qldBbox='138,-30,154,-10';
  const baseQ=term.toUpperCase().replace(/'/g,"''");

  /* Helper: query a QLD MapServer layer by name field */
  const searchQLD=async(layer,nameField,label,cls)=>{
    return searchQLD_base(QLD_SPATIAL,layer,nameField,label,cls);
  };
  /* Helper: query any QLD ArcGIS MapServer layer */
  const searchQLD_base=async(base,layer,nameField,label,cls)=>{
    try{
      const where=`UPPER(${nameField}) LIKE '%${baseQ}%'`;
      const u=`${base}/${layer}/query?where=${encodeURIComponent(where)}&outFields=${nameField},OBJECTID&returnGeometry=false&resultRecordCount=8&f=json`;
      const r=await fetch(u);if(!r.ok)return[];
      const d=await r.json();
      const svc=base===MARINE_SPATIAL?'marine':base===VEG_SPATIAL?'veg':'qld';
      return(d.features||[]).map(f=>({
        name:f.attributes[nameField]||'Unknown',oid:f.attributes.OBJECTID,
        layer,label,cls,service:svc,nameField,_base:base
      }));
    }catch(e){return[]}
  };
  /* Helper: query NNTT FeatureServer layer */
  const searchNNTTLayer=async(layer,nameField,label,cls)=>{
    try{
      const where=`UPPER(${nameField}) LIKE '%${baseQ}%'`;
      const u=`${NNTT_SPATIAL}/${layer}/query?where=${encodeURIComponent(where)}&outFields=${nameField},OBJECTID&returnGeometry=false&resultRecordCount=6&f=json&geometry=${qldBbox}&geometryType=esriGeometryEnvelope&inSR=4326&spatialRel=esriSpatialRelIntersects`;
      const r=await fetch(u);if(!r.ok)return[];
      const d=await r.json();
      return(d.features||[]).map(f=>({
        name:f.attributes[nameField]||'Unknown',oid:f.attributes.OBJECTID,
        layer,label,cls,service:'nntt',nameField
      }));
    }catch(e){return[]}
  };
  /* Helper: query CAPAD FeatureServer (Commonwealth protected areas) */
  const searchCAPAD=async(layer,label,cls)=>{
    try{
      const where=`UPPER(NAME) LIKE '%${baseQ}%' AND STATE IN ('QLD','COM')`;
      const u=`${CAPAD_SPATIAL}/${layer}/query?where=${encodeURIComponent(where)}&outFields=NAME,TYPE,OBJECTID&returnGeometry=false&resultRecordCount=8&f=json`;
      const r=await fetch(u);if(!r.ok)return[];
      const d=await r.json();
      return(d.features||[]).map(f=>({
        name:f.attributes.NAME||'Unknown',oid:f.attributes.OBJECTID,
        layer,label:f.attributes.TYPE||label,cls,service:'capad',nameField:'NAME'
      }));
    }catch(e){return[]}
  };

  try{
    const results=await Promise.all([
      /* QLD Government AdminBoundaries layers */
      searchQLD(2,'q_reg_name','Bioregion','bio'),
      searchQLD(3,'q_sub_name','Sub-bioregion','subbio'),
      searchQLD(11,'adminareaname','LGA','lga'),
      searchQLD(97,'estatename','Protected Area','prot'),
      searchQLD(6,'basin_name','Drainage Basin','drain'),
      /* Marine protected areas (QLD State — separate MapServer) */
      searchQLD_base(MARINE_SPATIAL,1,'location','GBR Coast Marine Park','marine'),
      searchQLD_base(MARINE_SPATIAL,2,'zone_name','Moreton Bay Marine Park','marine'),
      searchQLD_base(MARINE_SPATIAL,7,'res_name','Fish Habitat Area','marine'),
      searchQLD_base(MARINE_SPATIAL,15,'zone_name','Great Sandy Marine Park','marine'),
      /* CAPAD — Commonwealth + QLD protected areas (terrestrial + marine) */
      searchCAPAD(0,'National Protected Area','capad'),
      searchCAPAD(1,'Commonwealth Marine Park','cmarine'),
      /* NNTT layers */
      searchNNTTLayer(8,'Name','Native Title','nntt'),
      searchNNTTLayer(0,'Name','NT Application','nntt'),
      searchNNTTLayer(5,'RNTBC_Name','RNTBC','nntt'),
    ]);
    if(_nnttSearchId.v!==id)return;
    const all=results.flat();
    /* Deduplicate by name+type */
    const seen=new Set();
    const unique=all.filter(r=>{const k=r.name.toUpperCase()+'|'+r.cls;if(seen.has(k))return false;seen.add(k);return true});
    /* Sort: bioregions, sub-bioregions, LGA, protected areas, marine, drainage, NNTT */
    const order={bio:0,subbio:1,lga:2,prot:3,capad:4,marine:5,cmarine:6,drain:7,veg:8,nntt:9};
    unique.sort((a,b)=>(order[a.cls]??9)-(order[b.cls]??9));
    if(!unique.length){drop.innerHTML='<div style="padding:8px;color:var(--muted)">No areas found</div>';return}
    drop.innerHTML=unique.slice(0,18).map((r,i)=>
      `<div class="nntt-drop-item" data-idx="${i}"><span>${esc(r.name)}</span><span class="nntt-type ${r.cls}">${esc(r.label)}</span></div>`
    ).join('');
    drop._results=unique.slice(0,18);
    drop.querySelectorAll('.nntt-drop-item').forEach(el=>{
      el.addEventListener('click',()=>{
        const idx=+el.dataset.idx;
        const r=drop._results[idx];
        if(r)selectNNTTArea(r);
        drop.style.display='none';
      });
    });
  }catch(e){
    if(_nnttSearchId.v===id)drop.innerHTML='<div style="padding:8px;color:#c44">Search failed</div>';
  }
}

let _nnttSelecting=false;
async function selectNNTTArea(r){
  if(_nnttSelecting)return;
  _nnttSelecting=true;
  const input=$('#nnttSrch');
  const active=$('#nnttActive');
  const drop=$('#nnttDrop');
  if(drop)drop.style.display='none';
  if(input)input.style.display='none';
  toast(`Loading ${r.label} boundary…`);
  try{
    const nameQ=r.name.toUpperCase().replace(/'/g,"''");
    const allRings=[];
    let sourceLabel=r.label;

    if(r.service==='qld'||r.service==='veg'||r.service==='marine'){
      /* QLD Government MapServer layer — single layer, single name field */
      const base=r._base||( r.service==='veg'?VEG_SPATIAL:r.service==='marine'?MARINE_SPATIAL:QLD_SPATIAL);
      const where=`UPPER(${r.nameField}) LIKE '%${nameQ}%'`;
      const u=`${base}/${r.layer}/query?where=${encodeURIComponent(where)}&outFields=${r.nameField}&returnGeometry=true&outSR=4326&f=json&resultRecordCount=3`;
      const res=await fetch(u);
      if(!res.ok)throw new Error('Spatial '+res.status);
      const d=await res.json();
      for(const f of(d.features||[])){
        if(f.geometry?.rings)allRings.push(...f.geometry.rings);
      }
    }else if(r.service==='capad'){
      /* CAPAD FeatureServer — Commonwealth/QLD protected areas */
      const where=`UPPER(NAME) LIKE '%${nameQ}%' AND STATE IN ('QLD','COM')`;
      const u=`${CAPAD_SPATIAL}/${r.layer}/query?where=${encodeURIComponent(where)}&outFields=NAME,TYPE&returnGeometry=true&outSR=4326&f=json&resultRecordCount=10`;
      const res=await fetch(u);
      if(!res.ok)throw new Error('CAPAD '+res.status);
      const d=await res.json();
      for(const f of(d.features||[])){
        if(f.geometry?.rings)allRings.push(...f.geometry.rings);
      }
    }else{
      /* NNTT FeatureServer — query all 3 layers and merge for best coverage */
      const layerDefs=[
        {layer:8,nameField:'Name'},
        {layer:0,nameField:'Name'},
        {layer:5,nameField:'RNTBC_Name'},
      ];
      const geoQueries=layerDefs.map(async l=>{
        try{
          const where=`UPPER(${l.nameField}) LIKE '%${nameQ}%'`;
          const u=`${NNTT_SPATIAL}/${l.layer}/query?where=${encodeURIComponent(where)}&outFields=${l.nameField}&returnGeometry=true&outSR=4326&f=json&resultRecordCount=5`;
          const res=await fetch(u);if(!res.ok)return[];
          const d=await res.json();
          return(d.features||[]).filter(f=>f.geometry?.rings).map(f=>({rings:f.geometry.rings,layer:l.layer}));
        }catch(e){return[]}
      });
      const results=(await Promise.all(geoQueries)).flat();
      const layersUsed=new Set();
      for(const g of results){allRings.push(...g.rings);layersUsed.add(g.layer)}
      if(layersUsed.size>1)sourceLabel='merged ('+[...layersUsed].map(l=>l===8?'Det':l===0?'App':'RNTBC').join('+')+')';
    }

    if(!allRings.length)throw new Error('No geometry found for "'+r.name+'"');

    /* Clear any existing spatial filter */
    clearMapBox();
    if(S.mapPoly?.leafletLayer){try{S.map.removeLayer(S.mapPoly.leafletLayer)}catch(e){}}
    /* Clear master polygon cache — new polygon = new scan */
    S._polyMasterRecs=null;S._polyMasterDone=false;S._polyMasterBboxTotal=0;

    /* Colour polygon by type */
    const polyColors={bio:'#00a561',subbio:'#3a9e6e',lga:'#c06a00',prot:'#2a8f9d',capad:'#1a6e5c',marine:'#0077b6',cmarine:'#005082',drain:'#1f5378',veg:'#4a7a2e',nntt:'#2d6a4f',det:'#2d6a4f',app:'#e07c24',rntbc:'#4361a0'};
    const pc=polyColors[r.cls]||'#2d6a4f';

    /* Draw the polygon on the map */
    const latLngRings=allRings.map(ring=>ring.map(([lng,lat])=>[lat,lng]));
    const polyLayer=L.polygon(latLngRings,{
      weight:2.5,color:pc,fillColor:pc,fillOpacity:.08,dashArray:'6 4',interactive:false
    }).addTo(S.map);
    S.mapPoly={name:r.name,rings:allRings,leafletLayer:polyLayer,source:sourceLabel};
    /* Zoom to polygon bounds */
    S.map.fitBounds(polyLayer.getBounds(),{padding:[30,30]});
    /* Show active indicator */
    if(active){
      active.style.display='flex';
      active.innerHTML=`<span class="nntt-name" title="${esc(r.name)}">${esc(r.name)}</span><span class="nntt-type ${r.cls}" style="flex-shrink:0">${esc(sourceLabel)}</span><button id="nnttClearBtn" style="border:none;background:none;cursor:pointer;font-size:14px;padding:0 2px;color:#888" title="Clear area">✕</button>`;
      active.querySelector('#nnttClearBtn').addEventListener('click',()=>clearNNTT(false));
    }
    /* Refresh — trigger full search with polygon bbox */
    S.off=0;doSearch();
    toast(`${r.name} — loading specimens in area…`);
    _nnttSelecting=false;
  }catch(e){
    console.error('[Area select]',e);
    toast('Failed to load boundary');
    if(input)input.style.display='';
    _nnttSelecting=false;
  }
}

/* Fetch all images for an ALA record */
async function fetchFullAlaRecord(uuid){
  try{
    const r=await fetch(`https://biocache-ws.ala.org.au/ws/occurrences/${encodeURIComponent(uuid)}`);
    if(!r.ok)return null;const d=await r.json();

    /* Extract images — ALA images have various URL properties; dedup by image ID */
    const seenIds=new Set();
    const imgs=[];
    const addImg=(url)=>{
      if(!url||typeof url!=='string')return;
      /* Normalise: extract image UUID from any ALA URL pattern */
      const idMatch=url.match(/image\/([0-9a-f-]{36})/i)||url.match(/\/([0-9a-f-]{36})\//i);
      const id=idMatch?idMatch[1]:url;
      if(seenIds.has(id))return;
      seenIds.add(id);
      if(url.startsWith('http'))imgs.push(url);
      else if(url.match(/^[0-9a-f-]{36}$/i))imgs.push('https://images.ala.org.au/image/'+url+'/original');
      else if(url.startsWith('store/'))imgs.push('https://images.ala.org.au/'+url);
    };
    if(d.images&&Array.isArray(d.images)){
      d.images.forEach(img=>{
        /* Prefer largest version */
        addImg(img.largeImageUrl||img.imageUrl||img.smallImageUrl||img.thumbnailUrl);
        if(img.alternativeFormats)addImg(img.alternativeFormats.largeImageUrl||img.alternativeFormats.imageUrl);
        if(img.imageId&&!seenIds.has(img.imageId))addImg('https://images.ala.org.au/image/'+img.imageId+'/original');
        addImg(img.filePath);
      });
    }
    if(d.imageUrls&&Array.isArray(d.imageUrls))d.imageUrls.forEach(u=>addImg(u));

    /* Direct access across known ALA response structure */
    const raw=d.raw||{};const proc=d.processed||{};
    const rOcc=raw.occurrence||{};const pOcc=proc.occurrence||{};
    const rEvt=raw.event||{};const pEvt=proc.event||{};
    const pLoc=proc.location||{};const rLoc=raw.location||{};
    const pick=(...sources)=>{for(const s of sources){if(s&&s!=='')return safe$(s)}return''};

    const fields={
      images:imgs,
      /* Raw scientific name — may be better than processed when species not in ALA backbone */
      rawSci:pick(rOcc.scientificName,raw.scientificName),
      /* Taxonomy — ALA stores in classification sub-objects */
      family:pick(proc.classification?.family,raw.classification?.family,d.family,raw.family),
      order:pick(proc.classification?.order,raw.classification?.order,d.order,raw.order),
      genus:pick(proc.classification?.genus,raw.classification?.genus,d.genus,raw.genus),
      class_:pick(proc.classification?.classs,proc.classification?.['class'],raw.classification?.classs,raw.classification?.['class'],d.classs,d['class']),
      phylum:pick(proc.classification?.phylum,raw.classification?.phylum,d.phylum,raw.phylum),
      kingdom:pick(proc.classification?.kingdom,raw.classification?.kingdom,d.kingdom,raw.kingdom),
      species:pick(proc.classification?.species,raw.classification?.species,d.species,raw.species),
      subfamily:pick(proc.classification?.subfamily,raw.classification?.subfamily,d.subfamily,raw.subfamily),
      tribe:pick(proc.classification?.tribe,raw.classification?.tribe,d.tribe,raw.tribe),
      preparations:pick(pOcc.preparations,rOcc.preparations,raw.preparations),
      sex:pick(pOcc.sex,rOcc.sex,raw.sex),
      lifeStage:pick(pOcc.lifeStage,rOcc.lifeStage,raw.lifeStage),
      samplingProtocol:pick(pEvt.samplingProtocol,rEvt.samplingProtocol,raw.samplingProtocol,rEvt.samplingMethod,raw.samplingMethod,pOcc.samplingProtocol,rOcc.samplingProtocol,d.samplingProtocol,d.samplingMethod),
      identifiedBy:pick(pOcc.identifiedBy,rOcc.identifiedBy,raw.identifiedBy),
      individualCount:pick(pOcc.individualCount,rOcc.individualCount,raw.individualCount),
      habitat:pick(rLoc.habitat,pLoc.habitat,raw.habitat),
      occurrenceRemarks:pick(pOcc.occurrenceRemarks,rOcc.occurrenceRemarks,raw.occurrenceRemarks),
      fieldNumber:pick(pOcc.fieldNumber,rOcc.fieldNumber,raw.fieldNumber),
      locality:pick(rLoc.locality,raw.locality,pLoc.locality,rOcc.locality),
      eventDate:pick(pEvt.eventDate,rEvt.eventDate,raw.eventDate),
      verbatimDate:pick(rEvt.verbatimEventDate,raw.verbatimEventDate),
      recBy:pick(pOcc.recordedBy,rOcc.recordedBy,raw.collector,raw.recordedBy,pEvt.recordedBy,rEvt.recordedBy,d.collector,d.recordedBy),
      elevMin:toNum(pLoc.minimumElevationInMeters??raw.minimumElevationInMeters),
      elevMax:toNum(pLoc.maximumElevationInMeters??raw.maximumElevationInMeters),
      depth:toNum(pLoc.minimumDepthInMeters??raw.minimumDepthInMeters),
      authorship:pick(pOcc.scientificNameAuthorship,rOcc.scientificNameAuthorship,raw.scientificNameAuthorship,raw.nameAuthority)||extractAuth(pick(pOcc.scientificName,rOcc.scientificName,raw.scientificName),''),
      typeStatus:pick(pOcc.typeStatus,rOcc.typeStatus,raw.typeStatus),
    };
    /* Fix swapped sex/lifeStage from source data */
    const _sl2=fixSexLifeStage(fields.sex,fields.lifeStage);
    fields.sex=_sl2.sex;fields.lifeStage=_sl2.lifeStage;
    return fields;
  }catch(e){console.warn('[ALA] Full record fetch failed:',e);return null}
}

/* Enrich a record object with full ALA data (mutates r) */
function enrichRecord(r,fields){
  if(!fields)return;
  if(fields.images?.length)r.media=dedupImgs([...(r.media||[]),...fields.images]);
  /* Fix sci name if current one looks like a higher-rank fallback and raw has a binomial */
  if(fields.rawSci&&fields.rawSci.includes(' ')&&r.sci&&!r.sci.includes(' ')){
    const old=r.sci;
    r.sci=fields.rawSci;
    /* Also extract genus/species */
    const parts=fields.rawSci.split(/\s+/);
    if(!r.genus)r.genus=parts[0]||'';
    if(!r.species&&parts.length>=2&&parts[1][0]===parts[1][0].toLowerCase())r.species=parts[0]+' '+parts[1];
  }
  /* Only overwrite if we got a non-empty value and the existing one is empty */
  const fill=(key)=>{if(fields[key]&&!r[key])r[key]=fields[key]};
  fill('preparations');fill('sex');fill('lifeStage');fill('samplingProtocol');
  fill('identifiedBy');fill('individualCount');fill('habitat');
  fill('occurrenceRemarks');fill('fieldNumber');
  /* Locality: overwrite if enriched value is more specific (longer) than current */
  if(fields.locality&&(!r.locality||fields.locality.length>r.locality.length))r.locality=fields.locality;
  fill('eventDate');fill('verbatimDate');fill('recBy');
  fill('authorship');fill('typeStatus');
  /* Fill missing taxonomy from full record */
  fill('family');fill('order');fill('genus');fill('phylum');fill('kingdom');
  fill('subfamily');fill('tribe');
  if(fields.class_&&!r.class_)r.class_=fields.class_;
  if(fields.species&&!r.species)r.species=fields.species;
  if(fields.elevMin!=null&&r.elevMin==null)r.elevMin=toNum(fields.elevMin);
  if(fields.elevMax!=null&&r.elevMax==null)r.elevMax=toNum(fields.elevMax);
  if(fields.depth!=null&&r.depth==null)r.depth=toNum(fields.depth);
  r._enriched=true;
}

/* CSV EXPORT — two modes: fast (ALA data only) and enriched (full spatial context) */
async function exportCSV(enriched=false){
  /* ── Collect ALL records, not just the visible page ── */
  let recs;
  if(S.mapPoly&&S._polyAllRecs?.length){
    recs=[...S._polyAllRecs];
  }else if(S.total<=INIT_PAGE){
    recs=[...S.res];
  }else{
    /* Need to fetch all pages from ALA. ALA serves at most ALA_MAX_RESULTS per
       query (no cursor bypasses this), so that is the hard export ceiling. */
    const max=ALA_MAX_RESULTS;
    const target=Math.min(S.total,max);
    if(S.total>max){
      const ok=confirm(`This query has ${fmt(S.total)} records, but the Atlas of Living Australia now returns at most ${fmt(max)} records per query.\n\nExport the first ${fmt(max)}? (To export everything, narrow the search — e.g. by collection or taxon — so each query stays under ${fmt(max)}.)`);
      if(!ok)return;
    }
    toast(`Fetching all ${fmt(target)} records… 0%`);
    recs=[...S.res]; /* start with what we have */
    const f=getFilters();
    const BATCH=ALA_MAX_PAGE;
    for(let off=recs.length;off<target;off+=BATCH){
      try{
        const d=await alaFetch(f,off,Math.min(BATCH,target-off));
        const batch=(d.occurrences||[]).map(normRec_A);
        recs.push(...batch);
        if(batch.length<BATCH)break; /* no more records */
      }catch(e){toast('Fetch error — exporting what we have');break}
      toast(`Fetching all ${fmt(target)} records… ${Math.round(recs.length/target*100)}%`);
    }
  }

  if(S.view==='map'&&S.mapYearRange){
    const visPts=getVisiblePts();
    if(visPts.length&&visPts.length<recs.length)recs=visPts;
  }
  if(!recs.length){toast('No records to export');return}

  if(enriched){
    /* ── Enriched: batch locality enrichment (raw_locality from full occurrence) ── */
    const needLocality=recs.filter(r=>r.uuid&&!r._enriched);
    if(needLocality.length>0&&needLocality.length<=5000){
      const total=needLocality.length;
      toast(`Fetching locality data… 0%`);
      const CONCURRENT=6;
      let done=0;
      for(let i=0;i<needLocality.length;i+=CONCURRENT){
        const batch=needLocality.slice(i,i+CONCURRENT);
        await Promise.all(batch.map(async rec=>{
          try{
            const fields=await fetchFullAlaRecord(rec.uuid);
            if(fields){enrichRecord(rec,fields);rec._enriched=true}
          }catch(e){}
        }));
        done+=batch.length;
        toast(`Fetching locality data… ${Math.round(done/total*100)}%`);
      }
    }

    /* ── Full spatial enrichment — QLD services + ALA intersect per unique coordinate ── */
    const needSpatial=new Map();
    recs.forEach(r=>{
      if(r._spatial&&!r._spatial.loading)return;
      if(typeof r.lat!=='number'||typeof r.lng!=='number')return;
      const key=r.lat.toFixed(4)+','+r.lng.toFixed(4);
      if(!needSpatial.has(key))needSpatial.set(key,[]);
      needSpatial.get(key).push(r);
    });

    if(needSpatial.size>0){
      const total=needSpatial.size;
      toast(`Enriching ${total} locations with spatial data… 0%`);
      const CONCURRENT=4;
      const keys=[...needSpatial.keys()];
      let done=0;

      for(let i=0;i<keys.length;i+=CONCURRENT){
        const batch=keys.slice(i,i+CONCURRENT);
        await Promise.all(batch.map(async key=>{
          const [lat,lng]=key.split(',').map(Number);
          const ctx={};
          try{
            /* ALA spatial intersect — IBRA, sub-bioregion, LGA, DEM */
            const alaP=cachedFetch(`https://spatial.ala.org.au/ws/intersect/cl1048,cl1049,cl10923,el887/${lat}/${lng}`).then(r=>r.ok?r.json():null).catch(()=>null);
            /* QLD AdminBoundaries — bioregion, sub-bio, drainage, LGA, protected area */
            const qGrab=async(layer)=>{try{const r=await fetch(spatialURL(QLD_SPATIAL,layer,lng,lat));if(!r.ok)return null;const j=await r.json();return j.features?.length?j.features[0].attributes:null}catch(e){return null}};
            /* VEG — regional ecosystem */
            const vGrab=async()=>{try{const r=await fetch(spatialURL(VEG_SPATIAL,134,lng,lat));if(!r.ok)return null;const j=await r.json();return j.features?.length?j.features[0].attributes:null}catch(e){return null}};
            /* NNTT */
            const nGrab=async(layer)=>{try{const r=await fetch(spatialURL(NNTT_SPATIAL,layer,lng,lat));if(!r.ok)return null;const j=await r.json();return j.features?.length?j.features[0].attributes:null}catch(e){return null}};
            /* CAPAD */
            const cGrab=async(layer)=>{try{const r=await fetch(spatialURL(CAPAD_SPATIAL,layer,lng,lat));if(!r.ok)return null;const j=await r.json();return j.features?.length?j.features[0].attributes:null}catch(e){return null}};
            /* Marine */
            const mGrab=async(layer)=>{try{const r=await fetch(spatialURL(MARINE_SPATIAL,layer,lng,lat));if(!r.ok)return null;const j=await r.json();return j.features?.length?j.features[0].attributes:null}catch(e){return null}};

            const [ala,drain,prot,veg,nntt8,nntt5,nntt0,capadT,capadM,mp1,mp2,mp7,mp15]=await Promise.all([
              alaP,qGrab(6),qGrab(97),vGrab(),nGrab(8),nGrab(5),nGrab(0),cGrab(0),cGrab(1),mGrab(1),mGrab(2),mGrab(7),mGrab(15)
            ]);

            const clean=v=>{if(!v)return'';const s=String(v).trim();return(/^n\/?a$/i.test(s)||s.toLowerCase()==='non-rem')?'':s};

            /* ALA intersect */
            if(ala){for(const item of ala){
              if(item.field==='cl1048')ctx.bioregion=item.value||'';
              else if(item.field==='cl1049')ctx.subregion=item.value||'';
              else if(item.field==='cl10923')ctx.lga=item.value||'';
              else if(item.field==='el887')ctx.demElev=toNum(item.value);
            }}
            /* QLD layers */
            ctx.drainageBasin=clean(drain?.basin_name);
            ctx.protectedArea=clean(prot?.estatename);
            ctx.estateType=clean(prot?.esttype);
            /* Vegetation */
            ctx.reCode=clean(veg?.re1)||clean(veg?.re);
            /* NNTT — try Determination (8), then RNTBC (5), then Application (0) */
            ctx.traditionalOwners=clean(nntt8?.Name)||clean(nntt5?.RNTBC_Name)||clean(nntt0?.Name)||'';
            ctx.nnttType=nntt8?'Determination':nntt5?'RNTBC':nntt0?'Application':'';
            /* CAPAD */
            ctx.capadName=clean(capadT?.NAME)||clean(capadM?.NAME)||'';
            ctx.capadType=clean(capadT?.TYPE)||clean(capadM?.TYPE)||'';
            /* Marine */
            const zoneHit=mp1||mp2||mp15;
            ctx.marineZone=clean(zoneHit?.zone_name)||clean(zoneHit?.location)||'';
            ctx.marinePark=clean(zoneHit?.mp_name)||(mp1?'GBR Coast':mp2?'Moreton Bay':mp15?'Great Sandy':'');
            ctx.fha=clean(mp7?.res_name)||'';
          }catch(e){}

          for(const rec of needSpatial.get(key)){
            if(!rec._spatial||rec._spatial.loading)rec._csvSpatial=ctx;
          }
        }));
        done+=batch.length;
        toast(`Enriching ${total} locations… ${Math.round(done/total*100)}%`);
      }
    }
  }
  /* Fast mode: no batch enrichment. Any records previously opened in the modal
     already have _spatial data; all others export without spatial columns. */

  /* ── Build CSV ── */
  const sp0=r=>r._spatial&&!r._spatial.loading?r._spatial:r._csvSpatial||{};
  const coreCols=['catalogNumber','scientificName','authorship','typeStatus','kingdom','phylum','class','order','superfamily','family','subfamily','tribe','genus','species','vernacularName','basisOfRecord','recordedBy','identifiedBy','eventDate','locality','stateProvince','country','latitude','longitude','elevationMin_m','elevationMax_m','depth_m','habitat','sex','lifeStage','preparations','individualCount','samplingProtocol','occurrenceRemarks','collectionCode','uuid'];
  const spatialCols=['elevationDEM_m','ibraBioregion','ibraSubregion','lga','drainageBasin','protectedArea','estateType','capadName','capadType','regionalEcosystem','traditionalOwners','nnttType','marineZone','marinePark','fishHabitatArea'];
  const cols=enriched?[...coreCols,...spatialCols]:coreCols;
  const rows=[cols.join(',')];
  recs.forEach(r=>{
    const sp=enriched?sp0(r):{};
    const coreVals=[
      r.cat,r.sci,r.authorship||'',r.typeStatus,
      r.kingdom,r.phylum,r.class_,r.order,r.superfamily||'',r.family,r.subfamily||'',r.tribe||'',r.genus,r.species,r.vern,
      r.basis,r.recBy,r.identifiedBy||'',fmtDate(r),
      r.locality||'',r.state,r.country,r.lat,r.lng,
      r.elevMin??'',r.elevMax??'',r.depth??'',
      r.habitat||'',r.sex||'',r.lifeStage||'',r.preparations||'',r.individualCount||'',r.samplingProtocol||'',r.occurrenceRemarks||'',
      r.coll,r.uuid||''
    ];
    const spatialVals=enriched?[
      sp.demElev!=null?Math.round(sp.demElev):'',
      sp.bioregion||'',sp.subregion||'',sp.lga||'',
      sp.drainageBasin||'',sp.protectedArea||'',sp.estateType||'',
      sp.capadName||'',sp.capadType||'',sp.reCode||'',
      sp.traditionalOwners||'',sp.nnttType||'',
      sp.marineZone||'',sp.marinePark||'',sp.fha||sp.marineFHA?.name||''
    ]:[];
    const v=[...coreVals,...spatialVals];
    rows.push(v.map(x=>{const s=String(x??'');return/[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}).join(','));
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const tag=S.mapPoly?'-'+S.mapPoly.name.replace(/[^a-zA-Z0-9]+/g,'_').slice(0,30):'';
  const suffix=enriched?'-enriched':'';
  a.download='qm-export'+tag+suffix+'-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(a.href);
  toast(`Exported ${recs.length} records`+(enriched?' (enriched)':''));
}

function renderCharts(){
  var g=$('#chGrid');
  if(!g)return;
  if(!S||!S.facets){g.innerHTML='<div class="empty"><div class="ico">📊</div><h3>Loading…</h3></div>';return}
  try{

  var T=S.total||0;
  var f=S.facets||{};
  var sections=[];
  var cols=['#00a561','#46c2d2','#ea3d41','#f7941d','#036034','#1f5378','#2980b9','#006b3f','#43b868','#e76f51','#2a9d8f','#0077b6','#e9c46a','#264653','#83191d'];

  function safeArr(a){return Array.isArray(a)?a:[]}
  function pc(a,b){if(b<=0)return 0;if(a<=0)return 0;if(a>=b)return 100;var p=Math.round(a/b*100);if(p===0)return 1;if(p===100)return 99;return p}
  function sumFacet(arr){var s=0;var a=safeArr(arr);for(var i=0;i<a.length;i++)s+=(Number(a[i].count)||0);return s}

  /* ── 1. Data Quality Rings ── */
  try{
    var qc=S.qc||{};
    var hasCoord=(qc.georef!=null)?qc.georef:0;
    var hasMedia=(qc.media!=null)?qc.media:0;
    var hasTyped=(qc.typed!=null)?qc.typed:0;
    var hasQC=(qc.georef!=null||qc.media!=null||qc.typed!=null);

    function mkRing(yes,total,yesC,label,yesL,noL){
      var p=pc(yes,total);var no=total-yes;var deg=Math.round(p*3.6);
      return '<div style="display:flex;align-items:center;gap:16px;margin:10px 0">'
        +'<div style="position:relative;width:80px;height:80px;flex-shrink:0;border-radius:50%;background:conic-gradient('+yesC+' 0deg '+deg+'deg, #e0e0e0 '+deg+'deg 360deg)">'
        +'<div style="position:absolute;top:10px;left:10px;right:10px;bottom:10px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800">'+p+'%</div>'
        +'</div><div>'
        +'<div style="font-size:14px;font-weight:700;margin-bottom:4px">'+esc(label)+'</div>'
        +'<div style="font-size:12px;color:#4a4a4a"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+yesC+';vertical-align:middle;margin-right:4px"></span>'+esc(yesL)+': <b>'+fmt(yes)+'</b></div>'
        +'<div style="font-size:12px;color:#4a4a4a"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#e0e0e0;vertical-align:middle;margin-right:4px"></span>'+esc(noL)+': <b>'+fmt(no)+'</b></div>'
        +'</div></div>';
    }
    /* Species richness from dedicated counts (S.richness) — NOT capped by facet limit */
    var rich=S.richness||{};
    var nFam=rich.families||safeArr(f.family).length;
    var nGen=rich.genera||safeArr(f.genus).length;
    var nSp=rich.species||safeArr(f.species).length;
    var richnessHtml='<div style="display:flex;align-items:center;gap:16px;margin:10px 0">'
      +'<div style="position:relative;width:80px;height:80px;flex-shrink:0;border-radius:50%;background:conic-gradient(#036034 0deg 120deg, #1f5378 120deg 240deg, #f7941d 240deg 360deg)">'
      +'<div style="position:absolute;top:10px;left:10px;right:10px;bottom:10px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800">'+fmt(nSp)+'</div>'
      +'</div><div>'
      +'<div style="font-size:14px;font-weight:700;margin-bottom:4px">Taxonomic Richness</div>'
      +'<div style="font-size:12px;color:#4a4a4a"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#036034;vertical-align:middle;margin-right:4px"></span>Families: <b>'+fmt(nFam)+'</b></div>'
      +'<div style="font-size:12px;color:#4a4a4a"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#1f5378;vertical-align:middle;margin-right:4px"></span>Genera: <b>'+fmt(nGen)+'</b></div>'
      +'<div style="font-size:12px;color:#4a4a4a"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#f7941d;vertical-align:middle;margin-right:4px"></span>Species: <b>'+fmt(nSp)+'</b></div>'
      +'</div></div>';
    if((hasQC&&T>0)||nFam>0){
      sections.push('<div class="ch-p w"><div class="ch-t"><span class="al" style="background:#00a561"></span>Data Quality &amp; Richness <span style="font-weight:400;color:#4a4a4a;font-size:12px">('+fmt(T)+' total records)</span></div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
        +mkRing(hasCoord,T,'#00a561','Georeferenced','With coordinates','Missing coordinates')
        +mkRing(hasMedia,T,'#46c2d2','Imaged','With media','No media')
        +mkRing(hasTyped,T,'#f7941d','Type Specimens','Type material','Non-type')
        +richnessHtml
        +'</div></div>');
    }
  }catch(e){console.error('[Charts] Rings:',e)}

  /* ── 2. Collections Pie ── */
  try{
    var collItems=safeArr(f.collection_uid).map(function(c){return{name:shortColl(c.name||''),count:Number(c.count)||0}});
    collItems.sort(function(a,b){return b.count-a.count});
    var collTotal=0;for(var i=0;i<collItems.length;i++)collTotal+=collItems[i].count;
    if(collItems.length&&collTotal>0){
      /* Build conic-gradient stops using collection-specific colors */
      var stops=[];var cumDeg=0;
      var pieColors=[];
      for(var i=0;i<collItems.length;i++){
        var c=collColor(collItems[i].name);
        pieColors.push(c);
        var deg=collItems[i].count/collTotal*360;
        stops.push(c+' '+cumDeg.toFixed(1)+'deg '+(cumDeg+deg).toFixed(1)+'deg');
        cumDeg+=deg;
      }
      var s='<div class="ch-p"><div class="ch-t"><span class="al" style="background:#264939"></span>Collections</div>'
        +'<div style="display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap">'
        +'<div style="position:relative;width:140px;height:140px;flex-shrink:0;border-radius:50%;background:conic-gradient('+stops.join(',')+')"></div>'
        +'<div style="flex:1;min-width:140px;display:flex;flex-direction:column;gap:3px">';
      for(var i=0;i<collItems.length;i++){
        var pctVal=pc(collItems[i].count,collTotal);
        s+='<div style="display:flex;align-items:center;gap:8px;font-size:12px">'
          +'<span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:'+pieColors[i]+';flex-shrink:0"></span>'
          +'<span style="flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(collItems[i].name)+'">'+esc(collItems[i].name)+'</span>'
          +'<span style="font-weight:700;white-space:nowrap">'+fmt(collItems[i].count)+' <span style="color:#4a4a4a;font-weight:400">('+pctVal+'%)</span></span>'
          +'</div>';
      }
      s+='</div></div></div>';
      sections.push(s);
    }
  }catch(e){console.error('[Charts] Collections pie:',e)}

  /* ── 3. Type Specimens (pie) ── */
  try{
    var typeFacet=safeArr(f.type_status).filter(function(t){
      var nm=(t.name||'').toLowerCase();
      return nm&&nm!=='notatype'&&nm!=='not supplied'&&nm!=='undefined'&&nm!=='null';
    });
    if(typeFacet.length){
      typeFacet.sort(function(a,b){return(b.count||0)-(a.count||0)});
      var totalTypes=sumFacet(typeFacet);
      var tc={HOLOTYPE:'#ea3d41',PARATYPE:'#46c2d2',SYNTYPE:'#ea3d41',ALLOTYPE:'#46c2d2',COTYPE:'#e8887a',LECTOTYPE:'#ea3d41',NEOTYPE:'#ea3d41',PARALECTOTYPE:'#46c2d2',TOPOTYPE:'#00a561',TYPE:'#e8887a',HAPANTOTYPE:'#00a561',ISOTYPE:'#e8887a',PLESIOTYPE:'#00a561',HYPOTYPE:'#00a561'};
      var tStops=[];var tCum=0;var tColors=[];
      for(var i=0;i<typeFacet.length;i++){
        var tn=(typeFacet[i].name||'').toUpperCase();
        var ct=typeFacet[i].count||0;
        var c=tc[tn]||cols[i%cols.length];
        tColors.push(c);
        var deg=ct/totalTypes*360;
        tStops.push(c+' '+tCum.toFixed(1)+'deg '+(tCum+deg).toFixed(1)+'deg');
        tCum+=deg;
      }
      var s='<div class="ch-p"><div class="ch-t"><span class="al" style="background:#ea3d41"></span>Type Specimens <span style="font-weight:400;color:#4a4a4a;font-size:12px">('+fmt(totalTypes)+')</span></div>'
        +'<div style="display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap">'
        +'<div style="position:relative;width:140px;height:140px;flex-shrink:0;border-radius:50%;background:conic-gradient('+tStops.join(',')+')"></div>'
        +'<div style="flex:1;min-width:140px;display:flex;flex-direction:column;gap:3px">';
      for(var i=0;i<typeFacet.length;i++){
        var tn=(typeFacet[i].name||'').toUpperCase();
        var ct=typeFacet[i].count||0;
        var label=tn.charAt(0)+tn.slice(1).toLowerCase();
        var pctVal=pc(ct,totalTypes);
        s+='<div style="display:flex;align-items:center;gap:8px;font-size:12px">'
          +'<span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:'+tColors[i]+';flex-shrink:0"></span>'
          +'<span style="flex:1;font-weight:500">'+esc(label)+'</span>'
          +'<span style="font-weight:700;white-space:nowrap">'+fmt(ct)+' <span style="color:#4a4a4a;font-weight:400">('+pctVal+'%)</span></span>'
          +'</div>';
      }
      s+='</div></div></div>';sections.push(s);
    }
  }catch(e){console.error('[Charts] Types:',e)}

  /* ── 5. Top Collectors ── */
  try{
    var collFacet=safeArr(f.collector).filter(function(c){
      var nm=(c.name||'').toLowerCase();
      return nm&&nm!=='unknown'&&nm!=='not supplied'&&nm!=='undefined';
    });
    if(collFacet.length){
      collFacet.sort(function(a,b){return(b.count||0)-(a.count||0)});
      var top15=collFacet.slice(0,15);
      var mx=top15[0].count||1;
      var s='<div class="ch-p w"><div class="ch-t"><span class="al" style="background:#46c2d2"></span>Top Collectors (across '+fmt(T)+' records)</div><div class="hb">';
      for(var i=0;i<top15.length;i++){
        var nm=top15[i].name||'?';
        var ct=top15[i].count||0;
        var w=(ct/mx*100).toFixed(1);
        s+='<div class="hb-item"><span class="hb-nm" style="width:220px;min-width:220px" title="'+esc(nm)+'">'+esc(nm)+'</span><div class="hb-track"><div class="hb-fill" style="width:'+w+'%;background:'+cols[i%cols.length]+'"><span class="hb-val">'+fmt(ct)+'</span></div></div></div>';
      }
      s+='</div></div>';sections.push(s);
    }
  }catch(e){console.error('[Charts] Collectors:',e)}

  /* ── 6. Facet bar charts ── */
  try{
    function mkBar(items,label,color,wide){
      var arr=safeArr(items);if(!arr.length)return'';
      var mx=1;for(var i=0;i<arr.length;i++){var c=Number(arr[i].count)||0;if(c>mx)mx=c}
      var s='<div class="ch-p'+(wide?' w':'')+'"><div class="ch-t"><span class="al" style="background:'+color+'"></span>'+esc(label)+'</div><div class="hb">';
      for(var i=0;i<arr.length;i++){
        var it=arr[i];var nm=it.dn||it.name||'?';var ct=Number(it.count)||0;var w=(ct/mx*100).toFixed(1);
        s+='<div class="hb-item"><span class="hb-nm">'+esc(nm)+'</span><div class="hb-track"><div class="hb-fill" style="width:'+w+'%;background:'+cols[i%cols.length]+'"><span class="hb-val">'+fmt(ct)+'</span></div></div></div>';
      }
      s+='</div></div>';return s;
    }
    sections.push(mkBar(safeArr(f.order).slice(0,15),'Top Orders','#f7941d',true));
    sections.push(mkBar(safeArr(f.family).slice(0,15),'Top Families','#46c2d2',true));
    sections.push(mkBar(safeArr(f.state).slice(0,12),'By State / Province','#ea3d41',true));
  }catch(e){console.error('[Charts] Bars:',e)}

  /* ── Assemble ── */
  var html=sections.filter(Boolean).join('');
  if(!html)html='<div class="empty" style="grid-column:1/-1"><div class="ico">📊</div><h3>No analytics data</h3><p>Run a search to see collection analytics.</p></div>';
  g.innerHTML=html;

  }catch(outerErr){
    console.error('[Charts] FATAL:',outerErr);
    g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ico">📊</div><h3>Analytics Error</h3><p style="font-size:12px;color:#c62828">'+String(outerErr.message||outerErr)+'</p></div>';
  }
}

/* ═════════════════════════════════════════════════
   SPATIAL CONTEXT — NNTT + QLD boundary lookups
   ═════════════════════════════════════════════════ */
const QLD_SPATIAL='https://spatial-gis.information.qld.gov.au/arcgis/rest/services/Boundaries/AdminBoundariesFramework/MapServer';
const NNTT_SPATIAL='https://services2.arcgis.com/rzk7fNEt0xoEp3cX/arcgis/rest/services/NNTT_Custodial_AGOL/FeatureServer';
const VEG_SPATIAL='https://spatial-gis.information.qld.gov.au/arcgis/rest/services/Biota/VegetationManagement/MapServer';
const MARINE_SPATIAL='https://spatial-gis.information.qld.gov.au/arcgis/rest/services/Environment/ParksMarineProtectedAreas/MapServer';
const CAPAD_SPATIAL='https://gis.environment.gov.au/gispubmap/rest/services/ogc_services/CAPAD/FeatureServer';

/* Marine/coastal detection: triggers marine spatial enrichment when:
   1. Record has valid coordinates within QLD coastal/marine extent (lat -10 to -29, lng 138 to 160)
   2. Collection is one of the marine-associated QM collections */
const _MARINE_COLLS=new Set([
  'fishes','ichthyology','queensland museum fishes',
  'molluscs','mollusca','queensland museum molluscs',
  'corals','cnidaria','queensland museum corals',
  'crustaceans','crustacea','queensland museum crustaceans','marine invertebrates','queensland museum marine invertebrates',
  'other invertebrates','queensland museum other invertebrates',
  'porifera','sponges','queensland museum porifera',
]);
function isMarine(r){
  if(r.lat==null||r.lng==null)return false;
  /* QLD coastal/marine bounding check */
  if(r.lat<-29||r.lat>-10||r.lng<138||r.lng>160)return false;
  /* Collection-based gate */
  const coll=shortColl(r.coll||r.collUid||'').toLowerCase();
  return _MARINE_COLLS.has(coll)||_MARINE_COLLS.has((r.coll||'').toLowerCase());
}

function spatialURL(base,layer,lng,lat){
  return `${base}/${layer}/query?where=1%3D1&geometry=${lng},${lat},${lng},${lat}&geometryType=esriGeometryEnvelope&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=*&returnGeometry=false&f=json`;
}

async function fetchSpatialContext(r,idx){
  if(r.lat==null||r.lng==null)return;
  if(r._spatial&&!r._spatial.loading)return;
  r._spatial={loading:true};
  renderSpatialSection(r);

  const lng=r.lng, lat=r.lat;
  const grab=async(base,layer)=>{
    try{
      const res=await fetch(spatialURL(base,layer,lng,lat));
      if(!res.ok)return null;
      const j=await res.json();
      return j.features?.length?j.features[0].attributes:null;
    }catch(e){return null}
  };

  // Helper: treat 'n/a', 'N/A', empty as null
  const clean=v=>{if(!v)return null;const s=v.trim();return(!s||/^n\/?a$/i.test(s)||s.toLowerCase()==='non-rem')?null:s};
  // Title-case ALL CAPS strings like LGA names
  const titleCase=s=>s?s.replace(/\b([A-Z]{2,})\b/g,w=>w.charAt(0)+w.slice(1).toLowerCase()):s;

  const [nntt8,nntt5,nntt0,bio,sub,drain,lga,prot,veg,capadT,capadM]=await Promise.all([
    grab(NNTT_SPATIAL,8),
    grab(NNTT_SPATIAL,5),
    grab(NNTT_SPATIAL,0),  /* Schedule of Applications — much broader coverage */
    grab(QLD_SPATIAL,2),
    grab(QLD_SPATIAL,3),
    grab(QLD_SPATIAL,6),
    grab(QLD_SPATIAL,11),
    grab(QLD_SPATIAL,97),
    grab(VEG_SPATIAL,134),
    grab(CAPAD_SPATIAL,0),  /* CAPAD terrestrial — National Parks, IPAs, Nature Refuges */
    grab(CAPAD_SPATIAL,1),  /* CAPAD marine — Commonwealth marine parks (GBRMP, Coral Sea) */
  ]);

  /* ── Marine spatial enrichment (ParksMarineProtectedAreas) ──
     Only runs when the record is from a marine/coastal collection and
     has coordinates within QLD marine extent.
     Layers queried:
       1  = GBR Coast Marine Park zones
       2  = Moreton Bay Marine Park zones
       3  = Moreton Bay MP designated areas
       7  = Fish habitat area
       10 = Great Sandy MP designated areas
       15 = Great Sandy MP zones
       30 = Great Sandy benthic habitat
       35 = Moreton Bay marine habitat */
  const marine=isMarine(r);
  let mZone=null,mFHA=null,mBenthic=null,mBathymetry=null;
  if(marine){
    /* GA Bathymetry: raster identify — returns pixel value (depth in metres) */
    const grabBathy=async()=>{
      try{
        const u=`https://services.ga.gov.au/gis/rest/services/Bathymetry_Topography/MapServer/identify?geometry=${lng},${lat}&geometryType=esriGeometryPoint&sr=4326&layers=all:0&tolerance=1&mapExtent=${lng-0.01},${lat-0.01},${lng+0.01},${lat+0.01}&imageDisplay=100,100,96&returnGeometry=false&f=json`;
        const res=await fetch(u);
        if(!res.ok)return null;
        const j=await res.json();
        if(j.results?.length){
          const val=j.results[0]?.attributes?.['Pixel Value']??j.results[0]?.value;
          const num=parseFloat(val);
          return isNaN(num)?null:num;
        }
        return null;
      }catch(e){return null}
    };
    const [mpGBR,mpMB,mpMBda,fha,mpGSda,mpGS,gsHab,mbHab,bathy]=await Promise.all([
      grab(MARINE_SPATIAL,1),   /* GBR Coast MP zones */
      grab(MARINE_SPATIAL,2),   /* Moreton Bay MP zones */
      grab(MARINE_SPATIAL,3),   /* Moreton Bay MP designated areas */
      grab(MARINE_SPATIAL,7),   /* Fish habitat area */
      grab(MARINE_SPATIAL,10),  /* Great Sandy MP designated areas */
      grab(MARINE_SPATIAL,15),  /* Great Sandy MP zones */
      grab(MARINE_SPATIAL,30),  /* Great Sandy benthic habitat */
      grab(MARINE_SPATIAL,35),  /* Moreton Bay marine habitat */
      grabBathy(),              /* GA Bathymetry raster identify */
    ]);
    /* Resolve best marine park zone hit */
    const zoneHit=mpGBR||mpMB||mpGS;
    const daHit=mpMBda||mpGSda;
    if(zoneHit||daHit){
      mZone={
        zoneName:clean(zoneHit?.zone_name)||clean(daHit?.da_name)||clean(daHit?.zone_name),
        parkName:clean(zoneHit?.mp_name)||clean(daHit?.mp_name)||(mpGBR?'Great Barrier Reef Coast':mpMB?'Moreton Bay':mpGS?'Great Sandy':null),
        zoneColour:clean(zoneHit?.colour)||null,
      };
    }
    /* Fish habitat area */
    if(fha){
      mFHA={
        name:clean(fha.res_name)||clean(fha.fha_name)||clean(fha.ww_name),
        management:clean(fha.mgt_area)||clean(fha.management),
      };
    }
    /* Benthic / marine habitat */
    const benHit=gsHab||mbHab;
    if(benHit){
      mBenthic={
        habitat:clean(benHit.habitat)||clean(benHit.CATEGORY)||clean(benHit.hab_type)||clean(benHit.HABCLASS),
        source:gsHab?'Great Sandy':'Moreton Bay',
      };
    }
    /* Bathymetry — negative values = below sea level */
    if(bathy!=null){
      mBathymetry={
        depth:bathy,
        depthLabel:bathy<0?Math.abs(bathy).toFixed(0)+' m depth':(bathy===0?'Sea level':bathy.toFixed(0)+' m elevation'),
      };
    }
  }

  /* Resolve traditional owner name: layer 8 (determination) → layer 0 (application) → RNTBC → curated dictionary */
  const nnttDetName=clean(nntt8?.Name);
  const nnttAppName=clean(nntt0?.Name)||clean(nntt0?.Applicant_Name)||clean(nntt0?.Application_Name);
  const rntbcName=clean(nntt5?.RNTBC_Name);
  const curatedResult=_lookupTraditionalOwner(lat,lng);

  r._spatial={
    loading:false,
    /* Traditional owner — cascading: determination → application → RNTBC → curated dictionary */
    traditionalOwners:nnttDetName||nnttAppName||(rntbcName?rntbcName.replace(/\s*(Aboriginal|Torres Strait)?\s*(Corporation)?\s*R?N?T?B?C?\s*$/i,'').trim():null),
    traditionalOwnerSource:nnttDetName?'determination':nnttAppName?'application':rntbcName?'rntbc':null,
    tribunalId:clean(nntt8?.Tribunal_ID)||clean(nntt0?.Tribunal_ID),
    ntOutcome:clean(nntt5?.Determined_Outcome),
    rntbc:clean(nntt5?.RNTBC_Name),
    ntDate:nntt5?.Determination_Date?new Date(nntt5.Determination_Date).toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'}):null,
    /* Curated fallback */
    curatedOwner:curatedResult?.people||null,
    curatedLanguage:curatedResult?.language||null,
    ancestralName:curatedResult?.place||null,
    curatedSource:curatedResult?.src||null,
    bioregion:clean(bio?.q_reg_name),
    subregion:clean(sub?.q_sub_name),
    drainageBasin:clean(drain?.basin_name),
    lga:titleCase(clean(lga?.adminareaname)),
    lgaCode:clean(lga?.lga_code),
    protectedArea:clean(prot?.estatename),
    estateType:clean(prot?.esttype),
    legislated:clean(prot?.legislated),
    iucnCode:clean(prot?.iucncode),
    ijma:clean(prot?.ijma),
    /* CAPAD — Commonwealth/National protected areas */
    capadName:clean(capadT?.NAME)||clean(capadM?.NAME)||null,
    capadType:clean(capadT?.TYPE)||clean(capadM?.TYPE)||null,
    capadIUCN:clean(capadT?.IUCN)||clean(capadM?.IUCN)||null,
    capadAuthority:clean(capadT?.AUTHORITY)||clean(capadM?.AUTHORITY)||null,
    capadMarine:capadM?{name:clean(capadM.NAME),type:clean(capadM.TYPE),zoneType:clean(capadM.ZONE_TYPE)}:null,
    /* Regional Ecosystem (from VegetationManagement layer 134) */
    reCode:clean(veg?.re1)||clean(veg?.re),
    reStatus:reStatusLabel(clean(veg?.vm_status)),
    reBdStatus:bdStatusLabel(clean(veg?.bd_status)),
    /* Marine spatial enrichment (ParksMarineProtectedAreas) */
    marine:marine,
    marineZone:mZone,
    marineFHA:mFHA,
    marineBenthic:mBenthic,
    marineBathymetry:mBathymetry,
  };

  /* Derive human-readable vegetation description from RE code landzone */
  if(r._spatial.reCode){
    r._spatial.reDesc=landzoneDesc(r._spatial.reCode);
  }

  if(S.modalIdx===idx) renderSpatialSection(r);
}

/* ── Curated traditional owner dictionary for Queensland ──
   Each entry carries a `src` field citing the specific published source.
   This is NOT a legal or native title resource — it reflects commonly acknowledged
   custodianship as published by the cited institutions. Boundaries are approximate. */
const _qldTraditionalOwners=[
  /* SEQ — Brisbane / Moreton Bay region */
  {latS:-27.6,latN:-27.3,lngW:152.8,lngE:153.2,people:'Turrbal',language:'Turrbal',place:'Meanjin',
   src:'Queensland Museum, Acknowledgement of Country, qm.qld.gov.au'},
  {latS:-27.7,latN:-27.4,lngW:152.9,lngE:153.5,people:'Jagera / Yuggera',language:'Yuggera',place:'Meanjin',

function _lookupTraditionalOwner(lat,lng){
  /* Find best (most specific = smallest area) curated entry containing this point */
  let best=null, bestArea=Infinity;
  for(const e of _qldTraditionalOwners){
    if(lat>=e.latS&&lat<=e.latN&&lng>=e.lngW&&lng<=e.lngE){
      const area=(e.latN-e.latS)*(e.lngE-e.lngW);
      if(area<bestArea){bestArea=area;best=e}
    }
  }
  return best;
}

/* Map raw vm_status codes to readable labels */
function reStatusLabel(raw){
  if(!raw)return null;
  const lo=raw.toLowerCase().replace(/[_\s]+/g,'');
  if(lo.includes('endang'))return'endangered';
  if(lo.includes('ofconc'))return'of concern';
  if(lo.includes('leastc')||lo.includes('noconcern'))return null; /* unremarkable — skip */
  if(lo.includes('nonrem'))return null;
  return null;
}
function bdStatusLabel(raw){
  if(!raw)return null;
  const lo=raw.toLowerCase().trim();
  if(lo==='e'||lo==='endangered')return'endangered';
  if(lo==='oc'||lo.startsWith('of concern'))return'of concern';
  return null; /* nc / least concern / unknown — skip */
}

/* Queensland landzone lookup — the middle number of an RE code (e.g. 12.3.3 → landzone 3) */
const _landzones={
  1:'Tidal flats and coastal wetlands',
  2:'Coastal dunes and sand plains',
  3:'Alluvial plains and river flats',
  4:'Clay plains',
  5:'Old loamy and sandy plains',
  6:'Inland sand dunes',
  7:'Ironstone plateaus and laterite',
  8:'Basalt plains and hills',
  9:'Undulating sedimentary landscapes',
  10:'Sandstone ranges and plateaus',
  11:'Metamorphic hills and lowlands',
  12:'Granitic hills and lowlands',
};
function landzoneDesc(reCode){
  if(!reCode)return null;
  const parts=reCode.split('.');
  if(parts.length<2)return null;
  /* Handle combined landzones like "9-10" */
  const lzStr=parts[1];
  const lz=parseInt(lzStr,10);
  if(_landzones[lz])return _landzones[lz];
  /* Try combined */
  if(lzStr.includes('-')){
    const nums=lzStr.split('-').map(Number);
    const descs=nums.map(n=>_landzones[n]).filter(Boolean);
    if(descs.length)return descs[0];
  }
  return null;
}

function renderSpatialSection(r){
  const el=$('#spatialCtx');if(!el)return;
  const sp=r._spatial;
  if(!sp){el.innerHTML='';return}
  if(sp.loading){el.innerHTML='<div class="spatial-loading">Loading geographic context…</div>';return}

  const lines=[];

  /* Strip trailing "people/peoples/nation" from NNTT names so we can append our own suffix */
  const cleanPeople=(s)=>s?s.replace(/\s+(?:peoples?|nation)\s*$/i,'').trim():null;

  // Traditional Custodians — NNTT determination/application → curated dictionary
  const rawName=sp.traditionalOwners;
  const peopleName=cleanPeople(rawName);
  const curatedPeople=sp.curatedOwner;
  const ancestral=sp.ancestralName;
  const curatedLang=sp.curatedLanguage;
  
  if(peopleName){
    /* NNTT returned a result */
    let line=`Country of the <strong>${esc(peopleName)}</strong> people`;
    if(ancestral)line+=` (<strong>${esc(ancestral)}</strong>)`;
    else if(curatedPeople&&curatedPeople!==peopleName&&ancestral)line+=` (<strong>${esc(ancestral)}</strong>)`;
    line+='.';
    if(curatedLang&&curatedLang.toLowerCase()!==peopleName.toLowerCase())line+=` <span style="font-size:11px;color:var(--muted)">${esc(curatedLang)} language</span>`;
    lines.push(line);
  }else if(curatedPeople){
    /* No NNTT result, but curated dictionary matched */
    let line=`Country of the <strong>${esc(curatedPeople)}</strong> people`;
    if(ancestral)line+=` (<strong>${esc(ancestral)}</strong>)`;
    line+='.';
    if(curatedLang)line+=` <span style="font-size:11px;color:var(--muted)">${esc(curatedLang)} language</span>`;
    lines.push(line);
  }else{
    lines.push(`<span style="color:var(--muted);font-style:italic">Traditional custodians not identified for this location. <a href="https://native-land.ca" target="_blank" rel="noopener" style="color:var(--blue)">native-land.ca ↗</a></span>`);
  }

  // Bioregion + subregion
  if(sp.bioregion){
    let geo=`<strong>${esc(sp.bioregion)}</strong> bioregion`;
    if(sp.subregion)geo+=` (${esc(sp.subregion)})`;
    lines.push(geo+'.');
  }

  // LGA + drainage — clean, no codes
  const admin=[];
  if(sp.lga)admin.push(`LGA: <strong>${esc(sp.lga)}</strong>`);
  if(sp.drainageBasin)admin.push(`${esc(sp.drainageBasin)} drainage basin`);
  if(admin.length)lines.push(admin.join(' · ')+'.');

  // Protected area — QLD state (Layer 97)
  if(sp.protectedArea){
    lines.push(`Protected area: <strong>${esc(sp.protectedArea)}</strong>${sp.estateType?' ('+esc(sp.estateType)+')':''}.`);
  }

  // CAPAD — Commonwealth/National protected area (when different from QLD layer)
  if(sp.capadName&&sp.capadName!==sp.protectedArea){
    lines.push(`National protected area: <strong>${esc(sp.capadName)}</strong>${sp.capadType?' — '+esc(sp.capadType):''}.`);
  }
  // CAPAD Marine — Commonwealth marine park (separate from QLD state marine parks)
  if(sp.capadMarine&&sp.capadMarine.name){
    let cmLine=`Commonwealth marine park: <strong>${esc(sp.capadMarine.name)}</strong>`;
    if(sp.capadMarine.zoneType)cmLine+=` (${esc(sp.capadMarine.zoneType)})`;
    lines.push(cmLine+'.');
  }

  // Vegetation / Regional Ecosystem — natural language
  if(sp.reCode){
    let veg='';
    if(sp.reDesc)veg=`<strong>${esc(sp.reDesc)}</strong>`;
    const status=sp.reStatus||sp.reBdStatus;
    if(status)veg+=(veg?' — ':'')+`${esc(status)} vegetation`;
    if(veg)veg+='.';
    veg+=` <a href="https://apps.des.qld.gov.au/regional-ecosystems/details/?re=${encodeURIComponent(sp.reCode)}" target="_blank" rel="noopener" style="color:var(--blue);font-size:10px">REDD ↗</a>`;
    if(sp.reDesc||status)lines.push(`Vegetation: ${veg}`);
  }

  // Marine spatial enrichment (QLD ParksMarineProtectedAreas)
  if(sp.marine){
    const marineParts=[];
    if(sp.marineZone){
      let mz=`<strong>${esc(sp.marineZone.zoneName)}</strong>`;
      if(sp.marineZone.parkName)mz+=` — ${esc(sp.marineZone.parkName)} Marine Park`;
      marineParts.push(mz);
    }
    if(sp.marineFHA){
      let fha=`Fish Habitat Area: <strong>${esc(sp.marineFHA.name||'unnamed')}</strong>`;
      if(sp.marineFHA.management)fha+=` (${esc(sp.marineFHA.management)})`;
      marineParts.push(fha);
    }
    if(sp.marineBenthic){
      marineParts.push(`Benthic habitat: <strong>${esc(sp.marineBenthic.habitat)}</strong> (${esc(sp.marineBenthic.source)})`);
    }
    if(sp.marineBathymetry){
      marineParts.push(`<strong>${esc(sp.marineBathymetry.depthLabel)}</strong>`);
    }
    if(marineParts.length){
      lines.push(`<span style="color:var(--blue)">⚓</span> ${marineParts.join(' · ')}.`);
    }else{
      lines.push(`<span style="color:var(--blue)">⚓</span> <span style="color:var(--muted);font-style:italic">Marine record — no marine park or fish habitat area at this location.</span>`);
    }
  }

  if(!lines.length){
    el.innerHTML='<div class="spatial-loading">No spatial data returned for this location.</div>';
    return;
  }

  el.innerHTML=`<div style="font-size:12px;line-height:1.6;color:var(--ink);padding:4px 0">${lines.join('<br/>')}</div>`;
}

function openModal(idx){
  try{
  const r=S.res[idx];if(!r)return;S.modalIdx=idx;S.navIdx=idx;
  /* Update nav buttons */
  $('#navPrev').disabled=idx<=0;
  $('#navNext').disabled=idx>=S.res.length-1;
  /* Title: species name + catalog number */
  const catBit=r.cat?` <span style="font-style:normal;font-weight:600;color:var(--green-d);font-size:14px">${esc(r.cat)}</span>`:'';
  $('#mSci').className='m-sci'+(shouldItalic(r.sci)?' it':'');
  $('#mSci').innerHTML=`${esc(displaySci(r.sci))}${catBit}`;
  $('#mCom').textContent=(r.vern&&r.vernRank!=='generic')?singularize(r.vern):'';
  S.modalPhotos=r.media?.length?[...r.media]:[];S.modalPhotoIdx=0;updateModalImg();

  renderModalDetails(r);
  /* If spatial/wiki already loaded from a previous view, render immediately
     (renderModalDetails wipes the DOM, so these need re-populating) */
  if(r._spatial&&!r._spatial.loading) renderSpatialSection(r);
  $('#modal').classList.add('open');
  S._preFocusEl=document.activeElement;
  /* Focus trap: move focus into modal */
  setTimeout(()=>{$('#mX')?.focus()},60);
  /* Scroll both panels to top */
  $('#mImgWrap').scrollTop=0;
  const rb=document.querySelector('.mod-right-body');if(rb)rb.scrollTop=0;

  // Spatial context — fires in parallel for any record with coordinates
  if(r.lat!=null&&r.lng!=null) fetchSpatialContext(r,idx);

  // For ALA records, fetch full occurrence to get ALL fields
  if(r.uuid&&!r._enriched){
    fetchFullAlaRecord(r.uuid).then(fields=>{
      if(!fields||S.modalIdx!==idx)return;
      enrichRecord(r,fields);
      // Update images
      if(fields.images?.length){
        S.modalPhotos=dedupImgs([...S.modalPhotos,...fields.images]);
        updateModalImg();
      }
      // Re-render modal with enriched data
      renderModalDetails(r);
      // Re-populate spatial section if already loaded
      if(r._spatial) renderSpatialSection(r);
      // If coords appeared after enrichment, fetch spatial now
      if(r.lat!=null&&r.lng!=null&&!r._spatial) fetchSpatialContext(r,idx);
      // Update title with authorship if found
      const catBit2=r.cat?` <span style="font-style:normal;font-weight:600;color:var(--green-d);font-size:14px">${esc(r.cat)}</span>`:'';
      $('#mSci').className='m-sci'+(shouldItalic(r.sci)?' it':'');
      $('#mSci').innerHTML=`${esc(displaySci(r.sci))}${catBit2}`;
      // Now fetch wiki + vern AFTER re-render so elements exist
      fetchWikiSummary(r);
      if(vernNeedsEnrich(r))fetchVernacular(r);
      else $('#mCom').textContent=singularize(r.vern);
      if(!r.authorship)fetchAuthorship(r,idx);
      try{updateGalleryCard(idx,r)}catch(e){}
      enrichClassificationChain(r,idx);
    }).catch((err)=>{
      console.error('[ALA] Enrichment failed:',err);
      // Even on error, still fetch wiki
      fetchWikiSummary(r);
      if(vernNeedsEnrich(r))fetchVernacular(r);
      if(!r.authorship)fetchAuthorship(r,idx);
      enrichClassificationChain(r,idx);
    });
  }else{
    // Non-ALA or already enriched — fetch wiki immediately
    fetchWikiSummary(r);
    if(vernNeedsEnrich(r))fetchVernacular(r);
    if(!r.authorship)fetchAuthorship(r,idx);
    enrichClassificationChain(r,idx);
  }
  }catch(err){
    console.error('[openModal] Error:',idx,err);
    $('#modal').classList.add('open');
    const d=$('#mDetails');if(d)d.innerHTML=`<pre style="color:#ea3d41;font-size:11px;white-space:pre-wrap;padding:12px">${esc(err.message)}\n${esc(err.stack||'')}</pre>`;
  }
}

const _wikiCache=new Map();

/* Enrich a record's intermediate taxonomy (superfamily, subfamily, tribe)
   via GBIF's /species/{key}/parents classification chain.
   Mutates record in-place and re-renders modal if values are found. */
const _classChainCache=new Map();
async function enrichClassificationChain(r,idx){
  if(r.superfamily&&r.subfamily&&r.tribe)return;
  const lookupName=r.species||r.genus||r.family;
  if(!lookupName)return;
  const ck=lookupName.toLowerCase();
  try{
    let parents=_classChainCache.get(ck);
    if(parents===undefined){
      /* Try GBIF first */
      let gbifOk=false;
      try{
        let key=_gbifKeyCache.get(ck);
        if(!key){
          const mr=await cachedFetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(lookupName)}&strict=false`);
          if(mr.ok){const md=await mr.json();if(md.usageKey){key=md.usageKey;_gbifKeyCache.set(ck,key)}}
        }
        if(key){
          const pr=await cachedFetch(`https://api.gbif.org/v1/species/${key}/parents`);
          if(pr.ok){parents=await pr.json();gbifOk=true}
        }
      }catch(e){console.warn('[ClassChain] GBIF failed for',lookupName,e.message||e)}
      /* Fallback: iNaturalist — search → get ID → fetch /taxa/{id} for full ancestors */
      if(!gbifOk){
        try{
          const ir=await cachedFetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(lookupName)}&per_page=3`);
          if(ir.ok){
            const id=await ir.json();
            const hit=(id.results||[]).find(t=>(t.name||'').toLowerCase()===ck);
            if(hit?.id){
              const tr=await cachedFetch(`https://api.inaturalist.org/v1/taxa/${hit.id}`);
              if(tr.ok){
                const td=await tr.json();
                const taxon=(td.results||[])[0];
                if(taxon?.ancestors?.length){
                  parents=taxon.ancestors.map(a=>({rank:(a.rank||'').toUpperCase(),canonicalName:a.name||''}));
                }
              }
            }
          }
        }catch(e){console.warn('[ClassChain] iNat failed for',lookupName,e.message||e)}
      }
      _classChainCache.set(ck,parents||null);
    }
    if(!parents)return;
    let changed=false;
    for(const p of parents){
      const rank=(p.rank||'').toUpperCase();
      const name=p.canonicalName||p.scientificName||'';
      if(!name)continue;
      if(rank==='SUPERFAMILY'&&!r.superfamily){r.superfamily=name;changed=true}
      if(rank==='SUBFAMILY'&&!r.subfamily){r.subfamily=name;changed=true}
      if(rank==='TRIBE'&&!r.tribe){r.tribe=name;changed=true}
    }
    if(changed&&S.modalIdx===idx){
      renderModalDetails(r);
      if(r._spatial&&!r._spatial.loading)renderSpatialSection(r);
    }
  }catch(e){console.warn('[ClassChain]',e)}
}

/* Validate that a Wikipedia extract is actually about the right taxon.
   Rejects results that mention a contradicting higher taxonomy. */
function wikiRelevant(extract,r){
  if(!extract)return false;
  const ex=extract.toLowerCase();
  /* Build set of the record's taxonomy for positive matching */
  const own=[r.order,r.family,r.class_,r.phylum,r.genus].filter(Boolean).map(s=>s.toLowerCase());
  /* If extract mentions any of our own taxonomy, it's relevant */
  if(own.some(t=>ex.includes(t)))return true;
  /* Check for contradicting orders/classes — signs of a wrong-taxon article */
  const alienOrders=['lepidoptera','coleoptera','diptera','hymenoptera','hemiptera','orthoptera',
    'odonata','araneae','decapoda','squamata','anura','passeriformes','chiroptera','rodentia',
    'testudines','crocodilia','primates','carnivora','cetacea','psittaciformes','accipitriformes',
    'strigiformes','charadriiformes','pelecaniformes','gruiformes','columbiformes',
    'perciformes','salmoniformes','siluriformes','cypriniformes'];
  const alienClasses=['insecta','arachnida','malacostraca','gastropoda','bivalvia','cephalopoda',
    'mammalia','aves','reptilia','amphibia','actinopterygii','chondrichthyes'];
  const alienFamilies=['corvidae','accipitridae','felidae','canidae','bovidae','muridae',
    'scarabaeidae','formicidae','apidae','vespidae','nymphalidae','papilionidae'];
  const allAliens=[...alienOrders,...alienClasses,...alienFamilies];
  const myOwn=new Set(own);
  for(const alien of allAliens){
    if(myOwn.has(alien))continue; /* it's our own taxonomy, not alien */
    if(ex.includes(alien))return false; /* mentions a different group */
  }
  /* Common English group words that signal a wrong match */
  const groupWords={insecta:'insect',aves:'bird',mammalia:'mammal',reptilia:'reptile',
    amphibia:'frog',arachnida:'spider',actinopterygii:'fish',chondrichthyes:'shark'};
  const myClass=(r.class_||'').toLowerCase();
  for(const [cls,word] of Object.entries(groupWords)){
    if(cls===myClass)continue;
    /* Only flag if the word appears in a taxonomic context */
    const pat=new RegExp('\\b(?:is a|genus of|family of|species of|order of)\\s+'+word,'i');
    if(pat.test(extract))return false;
  }
  return true; /* no contradictions found */
}

async function fetchWikiSummary(r){
  const wb=$('#wikiBox'),wc=$('#wikiContent');
  if(!wb||!wc)return;
  wb.style.display='none';wc.innerHTML='';
  const terms=[r.species,r.genus,r.family].filter(Boolean);

  /* Try Wikipedia for each term: exact → search fallback, with relevance validation */
  for(const term of terms){
    if(_wikiCache.has(term)){
      const d=_wikiCache.get(term);
      if(d){showWiki(d,wb,wc,term);
        return}
      continue;
    }
    try{
      let d=await wikiSummary(term);
      /* Validate: reject if the extract is about a completely different taxon */
      if(d&&!wikiRelevant(d.extract,r))d=null;
      if(!d){
        const sr=await cachedFetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term+' taxonomy')}&srnamespace=0&srlimit=3&format=json&origin=*`);
        if(sr.ok){
          const sd=await sr.json();
          for(const hit of(sd.query?.search||[])){
            const snip=(hit.snippet||'').toLowerCase();
            if(/genus|species|family|insect|animal|arthropod|moth|beetle|fish|bird|reptil|mammal|frog|spider|crab|taxonom|phylum|order|plant|coral|mollusc|worm|fly|wasp|ant|bug/.test(snip)){
              d=await wikiSummary(hit.title);
              if(d&&wikiRelevant(d.extract,r))break;
              d=null; /* failed relevance check */
            }
          }
        }
      }
      if(d){_wikiCache.set(term,d);if(S.modalIdx>=0)showWiki(d,wb,wc,term);
        return}
      _wikiCache.set(term,null);
    }catch(e){_wikiCache.set(term,null)}
  }

  /* Fallback: ALA BIE species profile */
  for(const term of terms){
    const cKey='bie:'+term;
    if(_wikiCache.has(cKey)){
      const d=_wikiCache.get(cKey);
      if(d){showBie(d,wb,wc,term);
        return}
      continue;
    }
    try{
      const r2=await cachedFetch(`https://bie-ws.ala.org.au/ws/search?q=${encodeURIComponent(term)}&fq=idxtype:TAXON&pageSize=1`);
      if(!r2.ok){_wikiCache.set(cKey,null);continue}
      const bd=await r2.json();
      const hit=(bd.searchResults?.results||[])[0];
      if(hit&&(hit.description||hit.commonName||hit.name)){
        _wikiCache.set(cKey,hit);
        if(S.modalIdx>=0)showBie(hit,wb,wc,term);
        return;
      }
      _wikiCache.set(cKey,null);
    }catch(e){_wikiCache.set(cKey,null)}
  }
}
async function wikiSummary(title){
  try{
    const resp=await cachedFetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title.replace(/ /g,'_'))}`);
    if(!resp.ok)return null;
    const d=await resp.json();
    return(d.type==='standard'&&d.extract)?d:null;
  }catch(e){return null}
}

function showWiki(d,wb,wc,fromTerm){
  const ex=d.extract.length>300?d.extract.slice(0,297)+'…':d.extract;
  let h='';
  if(d.thumbnail)h+=`<img src="${d.thumbnail.source}" alt="" style="float:right;max-width:80px;max-height:80px;margin:0 0 4px 8px;border-radius:4px"/>`;
  const src=fromTerm?` <span style="color:var(--muted);font-size:10px">(${esc(fromTerm)})</span>`:'';
  h+=`<span>${esc(ex)}</span> <a href="${d.content_urls?.desktop?.page||'#'}" target="_blank" rel="noopener" style="color:var(--blue);font-size:11px">Read more ↗</a>${src}`;
  wc.innerHTML=h;wb.style.display='block';
  wb.querySelectorAll('[data-label]').forEach(el=>el.remove());
  const lbl=document.createElement('div');lbl.dataset.label='1';lbl.style.cssText='font-weight:700;font-size:11px;color:var(--muted);margin-bottom:3px';lbl.textContent='📖 Wikipedia';
  wb.insertBefore(lbl,wc);
}
function showBie(hit,wb,wc,fromTerm){
  let h='';
  if(hit.smallImageUrl)h+=`<img src="${hit.smallImageUrl}" alt="" style="float:right;max-width:80px;max-height:80px;margin:0 0 4px 8px;border-radius:4px"/>`;
  const desc=hit.description||'';
  const clean=desc.replace(/<[^>]+>/g,'');
  const ex=clean.length>300?clean.slice(0,297)+'…':clean;
  if(ex)h+=`<span>${esc(ex)}</span> `;
  if(hit.commonName)h+=`<br><b>Common name:</b> ${esc(hit.commonName)} `;
  const guid=hit.guid||hit.id||'';
  if(guid)h+=`<a href="https://bie.ala.org.au/species/${encodeURIComponent(guid)}" target="_blank" rel="noopener" style="color:var(--blue);font-size:11px">ALA profile ↗</a>`;
  h+=fromTerm?` <span style="color:var(--muted);font-size:10px">(${esc(fromTerm)})</span>`:'';
  wc.innerHTML=h;wb.style.display='block';
  wb.querySelectorAll('[data-label]').forEach(el=>el.remove());
  const lbl=document.createElement('div');lbl.dataset.label='1';lbl.style.cssText='font-weight:700;font-size:11px;color:var(--muted);margin-bottom:3px';lbl.textContent='📖 Atlas of Living Australia';
  wb.insertBefore(lbl,wc);
}

/* Normalize scientific names for API lookups:
   - Strip subgenus: "Echinochalina (Echinochalina) intermedia" → "Echinochalina intermedia"
   - Fix ALL_CAPS: "ASCIDIACEA" → "Ascidiacea"
   - Trim whitespace */
function cleanTaxonTerm(term){
  if(!term)return'';
  let t=term.trim();
  /* Strip subgenus parenthetical: Genus (Subgenus) species → Genus species */
  t=t.replace(/\s*\([A-Z][a-z]+\)\s*/,' ').replace(/\s+/g,' ').trim();
  /* Fix ALL_CAPS: "ARANEOMORPHAE" → "Araneomorphae" */
  if(t===t.toUpperCase()&&t.length>2)t=t.charAt(0)+t.slice(1).toLowerCase();
  return t;
}
